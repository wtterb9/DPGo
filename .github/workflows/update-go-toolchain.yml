---
name: Update Go Toolchain

"on":
  schedule:
    - cron: '0 6 25 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-go-toolchain:
    runs-on: ubuntu-24.04
    env:
      BASE_BRANCH: master
      PR_BRANCH: automation/update-go-toolchain
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect latest stable Go release
        id: detect
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs')

            const response = await fetch('https://go.dev/dl/?mode=json')
            if (!response.ok) {
              const statusText =
                `Failed to fetch Go releases: ${response.status} ` +
                response.statusText
              throw new Error(
                statusText,
              )
            }

            const releases = await response.json()
            const stable =
              releases.find((release) => release.stable) || releases[0]
            if (!stable?.version) {
              throw new Error(
                'No stable Go release found in go.dev download metadata',
              )
            }

            const latestVersion = stable.version.replace(/^go/, '')
            const updates = [
              {
                path: 'go.mod',
                apply: (content) => content
                  .replace(/^go\s+\d+\.\d+(?:\.\d+)?$/m, `go ${latestVersion}`)
                  .replace(
                    /^toolchain\s+go\d+\.\d+(?:\.\d+)?$/m,
                    `toolchain go${latestVersion}`,
                  ),
              },
            ]

            let changed = false
            for (const update of updates) {
              const original = fs.readFileSync(update.path, 'utf8')
              const next = update.apply(original)
              if (next !== original) {
                fs.writeFileSync(update.path, next)
                changed = true
              }
            }

            core.setOutput('version', latestVersion)
            core.setOutput('changed', changed ? 'true' : 'false')

      - name: Set up Go
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ steps.detect.outputs.version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Refresh modules
        if: steps.detect.outputs.changed == 'true'
        run: go mod tidy

      - name: Validate Go code
        if: steps.detect.outputs.changed == 'true'
        run: make validate

      - name: Run Go tests
        if: steps.detect.outputs.changed == 'true'
        run: go test -race ./...

      - name: Commit and push update branch
        if: steps.detect.outputs.changed == 'true'
        env:
          BRANCH_NAME: ${{ env.PR_BRANCH }}
          PUSH_URL: >-
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{
            github.repository }}.git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          remote_sha=""
          if git ls-remote --exit-code \
            --heads origin "$BRANCH_NAME" >/dev/null; then
            git fetch --depth=1 origin \
              "$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME"
            remote_sha="$(git rev-parse "refs/remotes/origin/$BRANCH_NAME")"
          fi
          git switch -C "$BRANCH_NAME"
          git add go.mod go.sum
          git commit -m \
            "deps: update Go toolchain to ${{ steps.detect.outputs.version }}"
          if [ -n "$remote_sha" ]; then
            git push \
              --force-with-lease="$BRANCH_NAME:$remote_sha" \
              "$PUSH_URL" \
              "HEAD:$BRANCH_NAME"
          else
            git push \
              "$PUSH_URL" \
              "HEAD:$BRANCH_NAME"
          fi

      - name: Create or update pull request
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY_FILE: /tmp/update-go-toolchain-pr.md
          PR_TITLE: >-
            deps: update Go toolchain to ${{ steps.detect.outputs.version }}
        run: |
          cat >"$PR_BODY_FILE" <<'EOF'
          ## Summary

          Updates the repository's pinned Go version in `go.mod` to
          `${{ steps.detect.outputs.version }}`.

          Other Go toolchain consumers derive their version from `go.mod`.

          ## Validation

          - `go mod tidy`
          - `make validate`
          - `go test -race ./...`
          EOF

          pr_url="$(gh pr list \
            --base "$BASE_BRANCH" \
            --head "$PR_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url')"

          if [ -n "$pr_url" ]; then
            gh pr edit "$pr_url" \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE"
          else
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$PR_BRANCH" \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE"
          fi

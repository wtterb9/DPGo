title: An Underwater Courtyard
description: |-
  The courtyard floor is slightly uneven and your travel to the west or
  north is blocked by a large rock wall. Looking upwards, you can see the
  remains of a tree, somehow preserved against the ravages of the salt water
  and cold temperatures.

title: The Elemental Chamber
description: |-
  The chamber floor is smooth and cold to the touch, as is the chamber wall.
  You run your hands over the numerous arcane symbols and a great power courses
  through your body. Looking around the chamber, you notice that everything
  seems to revolve around the column in the middle as if it played a key role
  in the function of the chamber.

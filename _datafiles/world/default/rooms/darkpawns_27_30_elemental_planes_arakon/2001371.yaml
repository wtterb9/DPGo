zone: DarkPawns (27-30) Elemental Planes (Arakon)
title: The Elemental Chamber
description: |-
  The chamber floor is smooth and cold to the touch, an almost pristine
  environment. Arcane symbols cover the walls, the odd one or two glowing
  softly in various colors. Small, pulsing spheres materialise in the corner
  of the chamber and make their way to the large column to the east before
  disappearing in a puff of light.

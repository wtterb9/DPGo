title: A Lava Pool
description: |-
  You stand within a column of fire which marks the center of a small island.
  Created by some form of volcanic activity, the island is the only solid ground
  within viewing distance - lava surrounds it making travel anywhere else
  impossible. The island also appears to be enclosed within some kind of sphere,
  but from your vantage point you can't be too sure.

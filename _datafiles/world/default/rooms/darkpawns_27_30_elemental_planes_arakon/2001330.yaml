title: High Among the Clouds
description: |-
  You walk towards the edge of the cloud and reach out, inspecting the sphere
  that surrounds this cloud. It is soft to the touch and moves freely with your
  touch, yet its purpose is still unknown. It ripples softly as you remove your
  hand and you watch in awe as the ripples spread across the spheres' surface.

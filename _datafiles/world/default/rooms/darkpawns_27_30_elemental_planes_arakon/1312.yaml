zone: DarkPawns (27-30) Elemental Planes (Arakon)
title: An Underwater Courtyard
description: |-
  To the south, several steps lead up to what remains of a gate while the
  underwater courtyard lies to the north and east. Climbing a few of the steps,
  you look back upon the courtyard and marvel at what it must have been like in
  the past. The are four short pillars nearby but there is nothing to provide
  clues as to what they are for.

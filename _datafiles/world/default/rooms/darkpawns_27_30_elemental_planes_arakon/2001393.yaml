zone: DarkPawns (27-30) Elemental Planes (Arakon)
title: The Temple of Elements
description: |-
  There are a number of pews lining the temple wall, each appears to have
  an elemental symbol etched into. You take the time to sit down on a couple of
  them and images of places far beyond this world enter your mind. Some you
  recognise, most you do not - it is a very therapeutic experience.

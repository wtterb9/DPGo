title: A Lava Pool
description: |-
  The island surface, although solid enough, is rather brittle and you
  break through it several times. You cast your eye westwards, out upon the
  sea of lava and find nothing. Flames dance along the surface of the lava
  while huge plumes leap into the sky at irregular intervals.

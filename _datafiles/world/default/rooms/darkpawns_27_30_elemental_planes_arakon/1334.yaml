title: High Among the Clouds
description: |-
  From the base of the cloud, four small pillars rise up as if pushed from
  below. The pillars themselves are nothing more than mist, but they retain
  a somewhat solid form. Above each, a small sphere materialises and glows
  softly with a rhythmic pulse.

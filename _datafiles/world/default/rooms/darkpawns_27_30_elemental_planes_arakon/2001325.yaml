title: The Earthly Plane
description: |-
  You stand on a single platform of rock in a place far beyond any you have
  travelled before. There is no sky, nor is there any ground...all around you
  is darkness. There are several similar rocky platforms but they all lie
  beyond your reach. In the center of the platform is a strange column that
  rotates slowly.

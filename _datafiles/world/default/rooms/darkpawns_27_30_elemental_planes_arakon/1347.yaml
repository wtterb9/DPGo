title: The Fiery Plane
description: |-
  You stand on a slab of cooled, volcanic lava that seems quite isolated
  from anything else. You look around and discover there almost is nothing else
  apart from similar slabs at very locations around you. Other than that, there
  is only darkness. In the middle of the slab is a strange column that rotates
  slowly.

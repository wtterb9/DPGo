title: The Temple of Elements
description: |-
  You stand before a great altar to the elements, a symbol of their union
  and place within this world. Steps lead down in the four cardinal directions
  to a small area surrounding the altar, an area to worship and pay homage.
  There is a narrow opening in the temple ceiling which leads into the darkness.

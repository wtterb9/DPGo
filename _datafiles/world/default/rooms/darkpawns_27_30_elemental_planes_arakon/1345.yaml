title: A Lava Pool
description: |-
  The sphere that surrounds the island has the unique ability to distort
  light that provides for an interesting effect. There is an eerie orange glow
  created by the bursts of flames that leap from the lava pool. Any flames
  that reach the surface of the sphere create a rippling effect that spreads
  out around the sphere.

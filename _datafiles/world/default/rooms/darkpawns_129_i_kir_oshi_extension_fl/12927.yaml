title: "A Cavernous Room"
description: |-
  This is the northwestern corner of this immense room.  There is 
  virtually no light here at all, and you find yourself maneuvering around 
  figures in the near darkness -- who knows what they might be doing 
  here.  The room continues around the pillar to your east, and also to 
  your south.  The air here is very still, and you can hear people 
  whispering in the darkness in a language you don't comprehend.

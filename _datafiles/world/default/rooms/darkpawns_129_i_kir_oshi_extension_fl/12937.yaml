title: "A Dark Passageway"
description: |-
  You are definitely further underground than you were before; the air 
  here feels like it hasn't been disturbed for a century or more, yet there is 
  no dust, no cobwebs.  No evidence of life at all, as near as you can tell.  
  Only blackness perfected.  The cold stone passage continues to the 
  north and south, with no trace of an ending.

title: "A Dark Hallway"
description: |-
  The limited lighting that the foyer received from the upstairs 
  reception is gone now, forcing you to provide light sources of your own.  
  The walls and floor here are rough-cut stone, which is cold to the touch.  
  You find yourself having to walk slowly to avoid tripping on any nooks 
  in the rock floor.  At first, this hallway appeared to be a mine tunnel of 
  some sort, but now you notice the lack of man-made structural support.  
  Whatever made this tunnel carved it through solid rock.  The passage 
  turns north here, and east returns you to a dim foyer.

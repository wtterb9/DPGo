title: "A Dark Passageway"
description: |-
  The passageway seems to even out here, continuing west and east into 
  utter darkness.  To the south, there is a heavy looking iron door.  The 
  doorframe for it has a moderately high lip on it, as if it were designed to 
  keep liquid from the other side of the door from entering this passage.

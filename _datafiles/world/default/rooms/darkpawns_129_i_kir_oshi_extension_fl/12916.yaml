title: "A Dark Passageway"
description: |-
  You stare off into seemingly infinite darkness as you attempt to 
  navigate down this tunnel, the side walls and floor barely illuminated 
  by your light.  The cold, damp air is beginning to press against you, its 
  staleness heavy on your nostrils.  There must be virtually no circulation 
  down here.  The passage continues to the north and south.

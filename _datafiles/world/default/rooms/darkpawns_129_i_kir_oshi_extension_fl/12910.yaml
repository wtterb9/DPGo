title: "A Dark Passageway"
description: |-
  You stand at the entrance of a long hallway that seems to extend 
  straight in front of you.  It is, however, completely dark here, with no 
  torches on the walls, and so you find yourself stumbling about on the 
  nooks in the rough cut stone floor as you attempt to walk in semi-
  darkness.  The walls here seem to be made of cut stone that has been 
  smoothed and polished.  You notice that they are cool to the touch.  
  There is also a chamber directly to your south.

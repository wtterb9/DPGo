description: |-
  At the very center of the gardens there is a large, circular bench made of
  dark ebonstone.  In the center of the bench is a large hole from which waves
  of hot air rush from time to time, heating this room.  Paths lead off in all
  directions and beautiful, rare plants grow around this area.

title: Magical Cell
description: |-
  You are in a strange, magical cell; the walls of black stone seems to hum
  with vast amounts of magical energy.  Large symbols have been burned into
  the floor and ceiling, smaller runes burned into each individual stone.
  On the southern wall is a glowing energy vortex which flickers and lights
  up this entire room.  Evidently someone found a way to penetrate the magic
  of this cell and escaped very recently.  The vortex seems to be losing
  its strength... I'd suggest you leave before you are trapped!

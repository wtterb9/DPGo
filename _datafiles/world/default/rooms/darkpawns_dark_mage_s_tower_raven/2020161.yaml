title: Dark Mage's Summoning Room
description: |-
  This is a large, secluded chamber with runes of power etched into the walls
  and floor. Apparently this is where the Dark Mage comes to summon dangerous
  creatures from this world and others. Although you do not understand the
  magical symbols carved all around, you are fairly certain they are to protect
  the caster and tower from the wrath of aggressive beasts. The only exit is to
  the west.

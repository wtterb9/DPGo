title: A White Square
description: |-
  You are on a some kind of a large game board.  There is either no ceiling or
  it is simply so high overhead that it is obscured by darkness.  The squares
  are about ten square feet in size, the white ones made of fine white marble,
  the black ones made of polished ebonstone.  You note that between the squares
  there is a fine, thin line of gold embedded in the huge board.  This appears
  to the the southern edge of the board.  From here you may go north, west or
  east.

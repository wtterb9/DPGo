title: Labyrinth Passageway
description: |-
  You are in a dark, twisty little passageway in a maze designed to confuse
  and frustrate the impatient adventurer.  The walls here are made of highly
  polished black ebonstone but they seem to absorb the light in this area
  rather than reflect it.  A larger passageway leads north into the darkness,
  another continues to the west.

title: Labyrinth Passageway
description: |-
  This is a small, dark passage that threatens to confuse you with its numerous
  twists and turns.  The walls of black ebonstone are highly polished and your
  torchlight reflects off them brilliantly.  The floor is made of hard, rough
  stone.  Two passages intersect here and you can go in any cardinal direction.

title: The Crystal Hallway
description: |-
  You are standing in a vast hallway with walls, floor and ceiling made of
  living black crystal.  Under your feet the floor gently hums and shakes
  as currents of magic race through the crystal all around.  Every so often
  bolts of energy leap between the floor and ceiling and cause the air to
  crackle.  The hallway leads east-west.

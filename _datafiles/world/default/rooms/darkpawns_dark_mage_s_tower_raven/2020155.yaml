zone: DarkPawns Dark Mage's Tower (Raven)
title: The Perch
description: |-
  This is a small stone ledge outside the tower.  You look down for a second
  and are instantly very dizzy and frightened.  Far below you are the black
  waters of Tower Lake.  There is only one exit -- through the small window
  in the eastern wall.  Don't look down!

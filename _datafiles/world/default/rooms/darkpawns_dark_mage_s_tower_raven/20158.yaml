title: Living Room
description: |-
  You are in a comfortable room, richly decorated and cozy at the same time.
  A pleasant fire burns in a stone hearth and gives heat to the large chamber.
  The walls are made of a beautiful substance you have never seen before; it
  shimmers and radiates beautiful light.  Just as you are beginning to think
  that it is odd that no furniture is in this room, a comfortable chair appears
  beside you -- neat!  Exits lead in every direction.

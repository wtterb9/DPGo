title: The Marble Hallway
description: |-
  You are in a wondrous hallway somewhere inside the tower.  Huge pillars of
  blackened marble hold up a high ceiling.  The floor here is tiled in with
  squares of different colored marble arranged in a pattern.  Breath taking
  artwork decorates the walls here and a fine, crystal window is set in the
  north wall.  The hall continues both east and south from here.

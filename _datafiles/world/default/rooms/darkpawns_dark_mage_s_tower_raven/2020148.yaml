title: Eastern Balcony
description: |-
  This perch commands a magnificent view of the lands to the east of the dark
  tower.  A railing has been bolted into place here to prevent you from falling
  but the stupid Thralls have knocked it loose.  As you gaze down at the cold
  lake, hundreds of meters below, you see large-bones skeletons shattered on
  the rocky shore.  The only exit is back to the west.

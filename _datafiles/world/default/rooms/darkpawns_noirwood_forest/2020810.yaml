description: "This large, dark woodland is called Noirwood -- which, in \norcish,
  means Black Woods.   You notice that the tall, mystical \ntrees in this general
  area seem to be old and seem to fill the \nthick air with a rotten-grey fine dust.
  \  A thick, white fog rises \nfrom the moss covered ground into the thick air in
  this area.   \nThese mystical woods seem to stretch to the horizon in any \ndirection
  you look."

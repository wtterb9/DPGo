title: Noirwood Forest
description: "The seemingly endless, gloomy woodland in which you stand is \nknown
  as Noirwood by the locals.   The enchanted, lofty trees in \nthese parts seem to
  emit a smelly, yellowish mist.   You may be \ncrazy but now and again you believe
  you hear singing and \nwhispering far away.   Noirwood Forest seems to continue
  in any \ndirection you look for as far as you can see."

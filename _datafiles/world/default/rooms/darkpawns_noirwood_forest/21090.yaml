description: "The air here near the middle of the seemingly boundless, \nevil woodland
  is insect-filled and foul-smelling.   You perceive \nthat the strong, shadow-filled
  trees in this area look ancient and \nseem to fill the hot air with a green mist.
  \  A thin, grey mist \nswirls and turns in the hot, rank air in this general area.
  \  The \ntall, gloomy trees in every direction are just as thick as those \nin these
  parts."

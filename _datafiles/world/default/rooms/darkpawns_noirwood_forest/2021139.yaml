title: Noirwood Forest
description: "This immense, shadow-filled forest is known as Noirwood -- \nwhich,
  in orcish, means Black Woods.   The lofty trees which \nstretch up towards the sky
  here are enchanted and seem to be very \nold.   Every once in a while you think
  you feel a small creature \nstalking you far away.   In this vast, evil forest the
  lofty trees \nseem to continue forever in any direction you look."

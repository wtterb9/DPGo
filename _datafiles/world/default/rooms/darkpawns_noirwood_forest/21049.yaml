title: Noirwood Forest
description: "The air here at the heart of the seemingly boundless, \nshadow-filled
  woodland is hot and smelly.   The tall trees in this \nvicinity completely block
  out the light and fill the insect-filled \nair with pollen making it difficult to
  breathe.   A thin, whitish \nmist rises from the rocky ground into the insect-filled
  air around \nhere.   This seemingly boundless forest seems to continue forever \nall
  around you."

title: Noirwood Forest
description: "The air here at the heart of the seemingly endless, evil \nwoodland
  is hot and foul-smelling.   The strong trees here stretch \nup towards the sky and
  fill the heavy air with dust making it \nrank.   A thick, grey mist swirls and turns
  in the insect-filled, \ndifficult to breathe air around here.   Noirwood Forest
  seems to \ncontinue in every direction for as far as you can see."

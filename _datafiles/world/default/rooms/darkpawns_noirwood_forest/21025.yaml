description: "Here, somewhere at the heart of Noirwood forest, the evil \ntrees grow
  strong and utterly obstruct the light.   The enchanted, \nlofty trees in this vicinity
  seem to emit a smelly, brown-green \nfine dust.   You may be crazy but so often
  you think you hear \nsinging and dancing in the trees.   In this immense, dark forest
  \nthe lofty trees seem to continue forever in any direction you \nlook."

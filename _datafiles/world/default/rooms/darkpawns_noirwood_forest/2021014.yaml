title: Noirwood Forest
description: "You are standing somewhere in the center of the vast, \nenchanted forest
  called the Noirwood.   You perceive that the \nlofty, enchanted trees in this general
  area look ancient and seem \nto fill the hot air with a brown-green fine dust.   You
  may be \ncrazy but few minutes you swear you hear merry-making and musical \ninstruments
  far away.   In this seemingly boundless, enchanted \nwoodland the strong trees seem
  to continue forever in every \ndirection."

title: Noirwood Forest
description: "This seemingly boundless, shadow-filled forest is called \nNoirwood
  -- which, in orcish, means Black Woods.   The lofty trees \nwhich tower above you
  in this area are gloomy and seem to be very \nold.   There are some odd-looking
  marks on the soggy forest floor \nin this general area.   These enchanted woods
  seem to stretch to \nthe horizon in any direction you look."

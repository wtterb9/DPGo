title: Noirwood Forest
description: "The seemingly boundless, gloomy forest in which you stand is \nknown
  as Noirwood by the locals.   The strong trees here \ncompletely block out the light
  and fill the heavy air with mist \nmaking it foul-smelling.   You may be mistaken
  but once in a while \nyou believe you hear merry-making and musical instruments
  in the \ntrees.   In this immense, mystical forest the lofty trees seem to \ncontinue
  forever in every direction."

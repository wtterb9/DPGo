title: Noirwood Forest
description: "You stand amidst the strong, gloomy trees in the enchanted \nforest
  the orcs call Noirwood.   You notice that the strong, \nmystical trees in this part
  of the forest appear to be ancient and \nseem to fill the heavy air with a brown-green
  fine dust.   A \nthick, white mist rises from the leaf covered forest floor into
  \nthe hot air here.   This seemingly endless forest seems to \ncontinue forever
  in any direction you look."

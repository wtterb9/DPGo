description: "You stand amidst the lofty, shadow-filled trees in the black \nforest
  the orcs call Noirwood.   The shadow-filled, lofty trees in \nthis general area
  seem to emit a foul-smelling, brown-green \npollen.   A heavy, white mist rises
  from the moss covered earth \ninto the sultry air around here.   For as far as the
  eye can see \nthese black woods continue all around you."

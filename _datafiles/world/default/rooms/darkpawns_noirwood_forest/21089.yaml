description: "Here, somewhere in the center of Noirwood forest, the \nshadow-filled
  trees grow tall and completely block the light.   \nThe tall trees which tower above
  your head in these parts are \nmystical and look old.   A thick, dark mist swirls
  and turns in \nthe insect-filled, difficult to breathe air in these parts.   In
  \nthis huge, shadow-filled forest the tall trees seem to continue \nforever in any
  direction you look."

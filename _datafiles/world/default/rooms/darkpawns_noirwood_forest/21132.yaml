title: Noirwood Forest
description: "This huge, evil woodland is called Noirwood -- which, in \norcish, means
  Black Woods.   You notice that the strong, mystical \ntrees here seem to be old
  and seem to fill the thick air with a \nblack fine dust.   There are many strange
  bushes on the soggy \nground in these parts.   The strong, black trees in every
  \ndirection are just as thick as those here."

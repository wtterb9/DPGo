title: Noirwood Forest
description: "You stand amidst the lofty, gloomy trees in the gloomy \nwoodland the
  orcs call Noirwood.   You perceive that the tall, \nblack trees in this part of
  the forest appear to be very old and \nseem to fill the thick air with a rotten-grey
  fine dust.   Every \nonce in a while you perceive a little forest animal cowering
  in a \ngloomy tree.   In this vast, dark forest the strong trees seem to \ncontinue
  forever all around you."

title: Noirwood Forest
description: "This seemingly endless, evil woodland is known as Noirwood \n-- which,
  in orcish, means Black Woods.   You notice that the \nlofty, evil trees here appear
  to be ancient and seem to fill the \nsultry air with a yellowish fine dust.   You
  may be mistaken but \nso often you swear you hear merry-making and musical instruments
  \nin the trees.   The tall, mystical trees in every direction are \njust as thick
  as those here."

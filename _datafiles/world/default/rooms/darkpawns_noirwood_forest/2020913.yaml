title: Noirwood Forest
description: "This seemingly boundless, dark forest is called Noirwood -- \nwhich,
  in orcish, means Black Woods.   The tall trees in this area \ntower above your head
  and fill the sultry air with fine dust \nmaking it foul-smelling.   Every now and
  again you think you hear \nsomething following you in the distance.   The strong,
  dark trees \nall around you are just as thick as those in this area."

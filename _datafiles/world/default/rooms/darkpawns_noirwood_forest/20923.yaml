description: "The vast, shadow-filled woodland in which you stand is \ncalled Noirwood
  by the locals.   The shadow-filled trees growing \nin this area look very old and
  hearty.   You may be wrong but so \noften you think you hear talking and musical
  instruments behind \nyou.   This seemingly boundless forest seems to continue forever
  \nall around you."

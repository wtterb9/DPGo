title: Noirwood Forest
description: "The large, evil forest in which you stand is called Noirwood \nby the
  locals.   The evil, lofty trees in this part of the forest \nseem to emit a difficult
  to breathe, brown-green pollen.   There \nare some odd tracks on the leaf covered
  earth in this area.   In \nthis immense, gloomy forest the strong trees seem to
  continue \nforever in any direction you look."

title: Noirwood Forest
description: "This large, evil woodland is known as Noirwood -- which, in \norcish,
  means Black Woods.   The strong trees here tower above you \nand fill the hot air
  with mist making it difficult to breathe.   A \nthick, dark mist rises from the
  soggy ground into the hot air in \nthis vicinity.   Noirwood Forest seems to continue
  in any \ndirection you look for as far as you can see."

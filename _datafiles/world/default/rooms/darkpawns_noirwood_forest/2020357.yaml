description: "You are standing somewhere near the middle of the seemingly boundless,
  dark \nforest called the Noirwood.  You perceive that the strong, black trees in
  \nthis area seem to be old and seem to fill the insect-filled air with a \nrotten-grey
  mist.  You may be crazy but so often you think you hear \nmerry-making and dancing
  in the distance.  In this seemingly endless, \nblack forest the lofty trees seem
  to continue forever in any direction \nyou look."

title: Noirwood Forest
description: "You stand amidst the lofty, black trees in the shadow-filled \nforest
  the orcs call Noirwood.   The strong trees which reach up \ntowards the heavens
  in these parts are enchanted and appear to be \nold.   Every so often you think
  you sense a large creature \nfollowing you far away.   In this huge, mystical woodland
  the \nstrong trees seem to continue forever in any direction you look."

title: Noirwood Forest
description: "This immense, mystical forest is known as Noirwood -- which, \nin orcish,
  means Black Woods.   The mystical, tall trees in these \nparts seem to emit a smelly,
  black mist.   You may be wrong but \nnow and again you believe you hear singing
  and dancing behind you. \nIn this vast, gloomy forest the strong trees seem to continue
  \nforever all around you."

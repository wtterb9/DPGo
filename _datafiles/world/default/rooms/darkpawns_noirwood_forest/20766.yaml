title: Noirwood Forest
description: "The large, dark forest in which you stand is called Noirwood \nby the
  locals.   The black trees growing here look very old and \nhearty.   You may be
  mistaken but once in a while you think you \nhear talking and musical instruments
  far away.   The strong, evil \ntrees all around you are just as thick as those in
  this part of \nthe forest."

description: "This huge, mystical forest is called Noirwood -- which, in \norcish,
  means Black Woods.   You perceive that the strong, black \ntrees in this vicinity
  look old and seem to fill the heavy air \nwith a green dust.   Every so often you
  think you hear a large \ncreature sneaking around behind you in the distance.   This
  vast \nforest seems to continue forever all around you."

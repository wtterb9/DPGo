description: "Here, somewhere at the heart of Noirwood forest, the gloomy trees grow
  strong \nand utterly obscure the light.  You notice that the tall, enchanted trees
  \nin these parts appear to be ancient and seem to fill the heavy air with a \nyellowish
  mist.  A thin, silvery fog rises from the hard forest floor into \nthe heavy air
  in this area.  In this seemingly endless, gloomy woodland the \ntall trees seem
  to continue forever all around you."

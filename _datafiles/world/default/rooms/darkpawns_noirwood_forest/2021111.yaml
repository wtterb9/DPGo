description: "The seemingly boundless, mystical woodland in which you \nstand is known
  as Noirwood by the locals.   Some kind of green \npollen in the sultry air in these
  parts make it foul-smelling.   \nYou may be mistaken but now and again you think
  you hear talking \nand musical instruments in the distance.   For as far as the
  eye \ncan see these mystical woods continue in any direction you look."

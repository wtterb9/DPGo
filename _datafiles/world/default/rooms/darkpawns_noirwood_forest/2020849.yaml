description: "This seemingly endless, enchanted woodland is called \nNoirwood -- which,
  in orcish, means Black Woods.   The \nshadow-filled trees growing around here look
  very old and strong.  \nEvery once in a while you think you feel a large creature
  \nfollowing you in the distance.   Noirwood Forest seems to continue \nin any direction
  you look for as far as you can see."

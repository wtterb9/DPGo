description: "You stand amidst the lofty, black trees in the enchanted \nwoodland
  the orcs call Noirwood.   Some kind of brown-green pollen \nin the heavy air around
  here make it smelly.   You may be crazy \nbut now and again you swear you hear merry-making
  and musical \ninstruments behind you.   This immense forest seems to continue \nforever
  in any direction you look."

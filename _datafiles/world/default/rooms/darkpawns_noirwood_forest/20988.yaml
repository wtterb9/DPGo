title: Noirwood Forest
description: "Here, somewhere at the heart of Noirwood forest, the evil \ntrees grow
  lofty and completely obstruct the light.   The gloomy, \ntall trees in this area
  seem to emit a difficult to breathe, \nrotten-grey fine dust.   A thick, dark mist
  rises from the hard \nground into the sultry air in this part of the forest.   For
  as \nfar as the eye can see these mystical woods continue in every \ndirection."

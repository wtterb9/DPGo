title: Noirwood Forest
description: "This vast, gloomy woodland is called Noirwood -- which, in \norcish,
  means Black Woods.   The enchanted, strong trees in these \nparts seem to emit a
  difficult to breathe, brown-green dust.   \nEvery few minutes you note a quick forest
  creature playing in a \nmystical tree.   The tall, shadow-filled trees all around
  you are \njust as thick as those in these parts."

description: "Here, somewhere in the center of Noirwood forest, the evil \ntrees grow
  lofty and totally obscure the light.   You notice that \nthe tall, dark trees here
  appear to be very old and seem to fill \nthe sultry air with a black pollen.   Every
  couple of hours you \nnote a small forest animal running about in a enchanted tree.
  \  In \nthis immense, mystical woodland the lofty trees seem to continue \nforever
  all around you."

title: Noirwood Forest
description: "The large, evil woodland in which you stand is known as \nNoirwood by
  the locals.   You notice that the tall, black trees in \nthese parts look very old
  and seem to fill the sultry air with a \nbrown-green fine dust.   You may be wrong
  but so often you swear \nyou hear merry-making and musical instruments in the distance.
  \  \nIn this immense, mystical woodland the tall trees seem to continue \nforever
  all around you."

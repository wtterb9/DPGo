title: Noirwood Forest
description: "You stand amidst the tall, black trees in the gloomy forest \nthe orcs
  call Noirwood.   Some kind of black fine dust in the hot \nair in this area make
  it rank.   You may be wrong but now and \nagain you believe you hear merry-making
  and musical instruments \nbehind you.   In this immense, dark woodland the lofty
  trees seem \nto continue forever in every direction."

title: Noirwood Forest
description: "This seemingly boundless, enchanted woodland is known as \nNoirwood
  -- which, in orcish, means Black Woods.   You notice that \nthe strong, shadow-filled
  trees around here seem to be very old \nand seem to fill the insect-filled air with
  a green dust.   There \nare some weird bushes on the moss covered ground in this
  vicinity. \nIn this large, gloomy woodland the lofty trees seem to continue \nforever
  all around you."

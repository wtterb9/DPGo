title: Noirwood Forest
description: "You stand amidst the lofty, shadow-filled trees in the \nmystical woodland
  the orcs call Noirwood.   Some kind of \nbrown-green fine dust in the sultry air
  in these parts make it \nsmelly.   You may be wrong but couple of hours you believe
  you \nhear singing and whispering behind you.   The tall, mystical trees \nin every
  direction are just as thick as those in this part of the \nforest."

title: Noirwood Forest
description: "Here, somewhere at the heart of Noirwood forest, the gloomy \ntrees
  grow lofty and utterly obscure the light.   You perceive \nthat the strong, evil
  trees around here look old and seem to fill \nthe hot air with a black pollen.   Every
  so often you note a quick \nforest mammal eyeing you in a black tree.   In this
  vast, mystical \nwoodland the tall trees seem to continue forever in any direction
  \nyou look."

title: Noirwood Forest
description: "The air here near the middle of the seemingly endless, \nmystical woodland
  is heavy and rank.   The tall trees here \ncompletely block out the light and fill
  the hot air with pollen \nmaking it rank.   A heavy, grey fog rises from the moist
  ground \ninto the thick air in this area.   For as far as the eye can see \nthese
  enchanted woods continue in any direction you look."

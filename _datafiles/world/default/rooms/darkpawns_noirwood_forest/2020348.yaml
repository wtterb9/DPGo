description: "You stand amidst the strong, enchanted trees in the dark forest the
  orcs \ncall Noirwood.  You perceive that the strong, gloomy trees around here look
  \nancient and seem to fill the sultry air with a rotten-grey fine dust.  A \nthin,
  silvery mist rises from the soft ground into the insect-filled air \nhere.  In this
  immense, enchanted woodland the tall trees seem to continue \nforever in any direction
  you look."

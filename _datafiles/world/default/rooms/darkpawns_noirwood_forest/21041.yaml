title: Noirwood Forest
description: "The seemingly boundless, shadow-filled woodland in which you \nstand
  is called Noirwood by the locals.   Some kind of rotten-grey \ndust in the hot air
  in this vicinity make it rank.   A thick, \nsilvery mist swirls and turns in the
  heavy, foul-smelling air in \nthis general area.   The lofty, black trees in every
  direction are \njust as thick as those in this area."

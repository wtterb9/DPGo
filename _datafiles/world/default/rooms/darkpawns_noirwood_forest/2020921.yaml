title: Noirwood Forest
description: "This vast, mystical forest is known as Noirwood -- which, in \norcish,
  means Black Woods.   Some kind of rotten-grey mist in the \nhot air in this vicinity
  make it foul-smelling.   A thin, whitish \nmist swirls and turns in the insect-filled,
  foul-smelling air \nhere.   In this immense, gloomy forest the tall trees seem to
  \ncontinue forever all around you."

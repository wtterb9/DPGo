description: "Here, somewhere at the heart of Noirwood forest, the evil \ntrees grow
  strong and totally obstruct the light.   The dark trees \ngrowing here look very
  old and healthy.   You may be mistaken but \nso often you think you hear merry-making
  and musical instruments \nin the distance.   This seemingly endless forest seems
  to continue \nforever all around you."

title: Noirwood Forest
description: "The air here in the center of the huge, gloomy woodland is \ninsect-filled
  and foul-smelling.   You perceive that the lofty, \nmystical trees in this part
  of the forest appear to be very old \nand seem to fill the thick air with a brown-green
  pollen.   You \nperceive a tiny woodland mammal looking at you in a strong tree
  \nabove your head.   Noirwood Forest seems to continue in any \ndirection you look
  for as far as you can see."

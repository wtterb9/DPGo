description: "This seemingly endless, black woodland is called Noirwood -- \nwhich,
  in orcish, means Black Woods.   The lofty trees around here \ntower above your head
  and fill the insect-filled air with pollen \nmaking it difficult to breathe.   You
  perceive a quick forest \nanimal looking at you in a tall tree above your head.
  \  For as far \nas the eye can see these shadow-filled woods continue in every \ndirection."

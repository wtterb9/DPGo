description: "You are standing somewhere in the center of the vast, \nmystical forest
  known as the Noirwood.   The strong trees around \nhere tower above your head and
  fill the hot air with pollen making \nit smelly.   You may be wrong but so often
  you think you hear \nsinging and musical instruments in the trees.   Noirwood Forest
  \nseems to continue in any direction you look for as far as you can \nsee."

title: Noirwood Forest
description: "This immense, gloomy forest is known as Noirwood -- which, \nin orcish,
  means Black Woods.   Some kind of green fine dust in \nthe thick air in this vicinity
  make it smelly.   A thick, white \nfog rises from the moss covered forest floor
  into the thick air in \nthis vicinity.   Noirwood Forest seems to continue in any
  \ndirection you look for as far as you can see."

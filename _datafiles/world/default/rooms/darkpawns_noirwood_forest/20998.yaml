title: Noirwood Forest
description: "This seemingly endless, black forest is called Noirwood -- \nwhich,
  in orcish, means Black Woods.   The dark, lofty trees \naround here seem to emit
  a foul-smelling, rotten-grey mist.   \nEvery now and again you note a quick woodland
  mammal playing in a \nshadow-filled tree.   In this immense, shadow-filled woodland
  the \nstrong trees seem to continue forever in every direction."

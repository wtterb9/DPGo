description: "This immense, gloomy forest is known as Noirwood -- which, \nin orcish,
  means Black Woods.   The tall trees in this general \narea tower above your head
  and fill the insect-filled air with \nmist making it rank.   Every once in a while
  you note a small \nforest creature looking at you in a dark tree.   These \nshadow-filled
  woods seem to stretch to the horizon in any \ndirection you look."

description: "You are standing somewhere near the middle of the immense, \nshadow-filled
  forest called the Noirwood.   The strong trees which \ncompletely block out the
  light in this part of the forest are \nshadow-filled and seem to be old.   You may
  be mistaken but few \nminutes you believe you hear singing and musical instruments
  \nbehind you.   In this seemingly endless, evil forest the lofty \ntrees seem to
  continue forever in any direction you look."

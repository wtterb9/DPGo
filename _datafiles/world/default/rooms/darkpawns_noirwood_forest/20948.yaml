title: Noirwood Forest
description: "You stand amidst the lofty, dark trees in the enchanted \nwoodland the
  orcs call Noirwood.   You perceive that the lofty, \nshadow-filled trees in these
  parts appear to be old and seem to \nfill the sultry air with a rotten-grey fine
  dust.   Every once in \na while you perceive a quick forest animal playing in a
  black \ntree.   This seemingly endless forest seems to continue forever in \nany
  direction you look."

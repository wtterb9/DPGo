description: "The air here near the middle of the seemingly endless, \nshadow-filled
  woodland is hot and smelly.   The tall trees in \nthese parts stretch up towards
  the sky and fill the heavy air with \nmist making it smelly.   Every few minutes
  you think you sense a \nlarge creature stalking you far away.   For as far as the
  eye can \nsee these enchanted woods continue all around you."

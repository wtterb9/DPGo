description: "The large, enchanted forest in which you stand is called \nNoirwood
  by the locals.   The lofty trees here tower above you and \nfill the hot air with
  fine dust making it smelly.   Every couple \nof hours you think you feel a large
  creature following you in the \ntrees.   In this immense, enchanted forest the strong
  trees seem \nto continue forever in any direction you look."

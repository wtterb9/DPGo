title: Noirwood Forest
description: "You stand amidst the strong, black trees in the gloomy \nforest the
  orcs call Noirwood.   The tall trees in this area \nstretch up towards the sky and
  fill the insect-filled air with \nfine dust making it rank.   You may be mistaken
  but couple of \nhours you think you hear merry-making and whispering far away.   \nThis
  seemingly endless forest seems to continue forever in every \ndirection."

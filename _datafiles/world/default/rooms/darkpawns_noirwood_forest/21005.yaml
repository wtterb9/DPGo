title: Noirwood Forest
description: "This seemingly endless, enchanted forest is known as \nNoirwood -- which,
  in orcish, means Black Woods.   The gloomy, \nstrong trees in this part of the forest
  seem to emit a smelly, \nrotten-grey fine dust.   You note a tiny woodland animal
  eyeing \nyou in a lofty tree above your head.   In this vast, shadow-filled \nforest
  the strong trees seem to continue forever in any direction \nyou look."

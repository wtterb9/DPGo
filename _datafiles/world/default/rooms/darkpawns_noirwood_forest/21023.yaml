description: "This huge, enchanted woodland is known as Noirwood -- which, \nin orcish,
  means Black Woods.   The lofty trees which completely \nblock out the light in this
  general area are gloomy and look \nancient.   A heavy, dark mist swirls and turns
  in the heavy, \ndifficult to breathe air in this vicinity.   The lofty, evil trees
  \nall around you are just as thick as those in this vicinity."

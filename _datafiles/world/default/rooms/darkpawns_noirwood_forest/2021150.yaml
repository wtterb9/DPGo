description: "You are standing somewhere in the center of the large, dark \nwoodland
  called the Noirwood.   You perceive that the strong, evil \ntrees around here appear
  to be very old and seem to fill the heavy \nair with a yellowish dust.   A thin,
  silvery fog swirls and turns \nin the sultry, foul-smelling air in this general
  area.   For as \nfar as the eye can see these mystical woods continue in any \ndirection
  you look."

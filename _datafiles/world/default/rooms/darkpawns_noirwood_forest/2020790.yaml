description: "You stand amidst the strong, gloomy trees in the dark forest \nthe orcs
  call Noirwood.   You note that the tall, gloomy trees in \nthis part of the forest
  look ancient and seem to fill the heavy \nair with a yellowish pollen.   A thick,
  whitish fog rises from the \nrocky ground into the sultry air in this general area.
  \  In this \nseemingly boundless, enchanted forest the lofty trees seem to \ncontinue
  forever in any direction you look."

title: Noirwood Forest
description: "The air here near the middle of the large, shadow-filled \nforest is
  heavy and smelly.   The tall trees in this part of the \nforest completely block
  out the light and fill the thick air with \npollen making it smelly.   A heavy,
  dark mist rises from the soft \nground into the hot air here.   In this seemingly
  boundless, \nenchanted woodland the tall trees seem to continue forever in \nevery
  direction."

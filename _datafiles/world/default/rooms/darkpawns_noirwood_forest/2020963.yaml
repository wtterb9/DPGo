title: Noirwood Forest
description: "This seemingly endless, shadow-filled woodland is called \nNoirwood
  -- which, in orcish, means Black Woods.   The lofty trees \nwhich reach up towards
  the heavens in this part of the forest are \nevil and seem to be old.   Every now
  and again you notice a quick \nwoodland mammal cowering in a black tree.   Noirwood
  Forest seems \nto continue all around you for as far as you can see."

title: Noirwood Forest
description: "This huge, dark woodland is known as Noirwood -- which, in \norcish,
  means Black Woods.   You notice that the tall, enchanted \ntrees in this part of
  the forest appear to be very old and seem to \nfill the insect-filled air with a
  black pollen.   Every once in a \nwhile you notice a quick woodland creature cowering
  in a enchanted \ntree.   Noirwood Forest seems to continue in any direction you
  \nlook for as far as you can see."

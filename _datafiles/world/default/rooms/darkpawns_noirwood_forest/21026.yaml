title: Noirwood Forest
description: "This seemingly endless, shadow-filled forest is called \nNoirwood --
  which, in orcish, means Black Woods.   Some kind of \nblack fine dust in the heavy
  air around here make it difficult to \nbreathe.   There are a couple of odd plants
  on the moist ground \nhere.   Noirwood Forest seems to continue in any direction
  you \nlook for as far as you can see."

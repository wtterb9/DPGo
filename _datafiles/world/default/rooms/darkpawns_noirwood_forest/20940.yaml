title: Noirwood Forest
description: "This large, mystical woodland is called Noirwood -- which, \nin orcish,
  means Black Woods.   The black, lofty trees in this \npart of the forest seem to
  emit a rank, rotten-grey fine dust.   \nYou notice a small forest animal playing
  in a strong tree above \nyour head.   For as far as the eye can see these shadow-filled
  \nwoods continue in any direction you look."

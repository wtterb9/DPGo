description: "The air here near the middle of the seemingly endless, dark \nwoodland
  is sultry and difficult to breathe.   The strong trees \naround here tower above
  your head and fill the thick air with mist \nmaking it difficult to breathe.   You
  may be mistaken but once in \na while you believe you hear merry-making and dancing
  far away.   \nThe tall, gloomy trees all around you are just as thick as those \nin
  this part of the forest."

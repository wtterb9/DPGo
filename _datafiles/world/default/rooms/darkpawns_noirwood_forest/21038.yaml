title: Noirwood Forest
description: "This vast, black forest is called Noirwood -- which, in \norcish, means
  Black Woods.   Some kind of green dust in the sultry \nair in this part of the forest
  make it smelly.   You may be \nmistaken but couple of hours you believe you hear
  merry-making and \nwhispering behind you.   These dark woods seem to stretch to
  the \nhorizon in every direction."

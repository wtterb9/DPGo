description: "Here, somewhere at the heart of Noirwood forest, the \nshadow-filled
  trees grow tall and completely obscure the light.   \nYou note that the strong,
  mystical trees in this part of the \nforest look very old and seem to fill the insect-filled
  air with a \nyellowish mist.   A heavy, grey mist swirls and turns in the \ninsect-filled,
  difficult to breathe air here.   For as far as the \neye can see these enchanted
  woods continue in any direction you \nlook."

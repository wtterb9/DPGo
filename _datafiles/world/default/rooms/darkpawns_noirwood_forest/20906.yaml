title: Noirwood Forest
description: "This large, enchanted woodland is called Noirwood -- which, \nin orcish,
  means Black Woods.   Some kind of black pollen in the \nthick air in these parts
  make it rank.   You may be crazy but few \nminutes you think you hear merry-making
  and dancing in the \ndistance.   The strong, enchanted trees in any direction you
  look \nare just as thick as those in this general area."

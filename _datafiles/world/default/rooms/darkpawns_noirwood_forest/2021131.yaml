title: Noirwood Forest
description: "This huge, dark forest is known as Noirwood -- which, in \norcish, means
  Black Woods.   The shadow-filled, lofty trees in \nthese parts seem to emit a difficult
  to breathe, rotten-grey \npollen.   Every so often you think you hear something
  following \nyou in the distance.   Noirwood Forest seems to continue in every \ndirection
  for as far as you can see."

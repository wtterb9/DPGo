title: Noirwood Forest
description: "The vast, enchanted forest in which you stand is known as \nNoirwood
  by the locals.   The strong trees around here tower above \nyour head and fill the
  heavy air with pollen making it difficult \nto breathe.   A thick, white fog rises
  from the rocky forest floor \ninto the insect-filled air in these parts.   Noirwood
  Forest seems \nto continue all around you for as far as you can see."

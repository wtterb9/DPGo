description: "The large, dark forest in which you stand is called Noirwood \nby the
  locals.   The lofty trees which reach up towards the \nheavens in this vicinity
  are black and appear to be very old.   A \nheavy, grey fog rises from the rocky
  ground into the thick air in \nthese parts.   These dark woods seem to stretch to
  the horizon in \nevery direction."

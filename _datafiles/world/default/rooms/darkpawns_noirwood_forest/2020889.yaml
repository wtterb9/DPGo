title: Noirwood Forest
description: "The large, shadow-filled woodland in which you stand is \nknown as Noirwood
  by the locals.   The strong trees which tower \nabove you around here are mystical
  and seem to be old.   You may \nbe crazy but so often you believe you hear laughing
  and musical \ninstruments far away.   For as far as the eye can see these black
  \nwoods continue all around you."

title: Noirwood Forest
description: "This immense, mystical woodland is called Noirwood -- which, \nin orcish,
  means Black Woods.   The shadow-filled, lofty trees \naround here seem to emit a
  rank, green dust.   A thin, whitish \nmist swirls and turns in the heavy, smelly
  air around here.   The \nlofty, dark trees in any direction you look are just as
  thick as \nthose in this vicinity."

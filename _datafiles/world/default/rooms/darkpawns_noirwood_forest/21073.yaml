description: "The air here near the middle of the seemingly endless, \nenchanted forest
  is thick and rank.   The strong trees which \ncompletely block out the light in
  this general area are evil and \nlook ancient.   You may be mistaken but once in
  a while you \nbelieve you hear voices and dancing far away.   In this seemingly
  \nboundless, shadow-filled woodland the tall trees seem to continue \nforever in
  every direction."

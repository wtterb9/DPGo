description: "The seemingly boundless, black forest in which you stand is called Noirwood
  \nby the locals.  Some kind of rotten-grey pollen in the sultry air in this \ngeneral
  area make it foul-smelling.  You may be crazy but so often you think \nyou hear
  merry-making and dancing in the trees.  For as far as the eye can \nsee these gloomy
  woods continue in every direction."

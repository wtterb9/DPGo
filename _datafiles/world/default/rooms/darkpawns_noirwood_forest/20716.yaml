title: Noirwood Forest
description: "This seemingly endless, mystical woodland is known as \nNoirwood --
  which, in orcish, means Black Woods.   The lofty trees \nwhich stretch up towards
  the sky in this general area are \nshadow-filled and seem to be ancient.   A thin,
  grey mist swirls \nand turns in the hot, difficult to breathe air around here.   The
  \nlofty, dark trees in any direction you look are just as thick as \nthose in these
  parts."

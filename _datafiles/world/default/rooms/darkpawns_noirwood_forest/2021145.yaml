title: Noirwood Forest
description: "The air here in the center of the seemingly endless, \nenchanted forest
  is hot and difficult to breathe.   The lofty \ntrees which reach up towards the
  heavens around here are \nshadow-filled and appear to be very old.   A heavy, whitish
  fog \nswirls and turns in the thick, foul-smelling air in this area.   \nThe strong,
  evil trees in every direction are just as thick as \nthose around here."

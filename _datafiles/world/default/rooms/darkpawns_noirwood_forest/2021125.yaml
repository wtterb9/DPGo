title: Noirwood Forest
description: "This seemingly boundless, gloomy forest is called Noirwood \n-- which,
  in orcish, means Black Woods.   The mystical, tall trees \nin this area seem to
  emit a difficult to breathe, rotten-grey \ndust.   You may be crazy but once in
  a while you think you hear \nvoices and whispering far away.   These enchanted woods
  seem to \nstretch to the horizon all around you."

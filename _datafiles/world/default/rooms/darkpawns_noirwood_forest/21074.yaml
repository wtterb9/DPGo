title: Noirwood Forest
description: "The seemingly endless, gloomy forest in which you stand is \nknown as
  Noirwood by the locals.   You note that the lofty, gloomy \ntrees in this part of
  the forest seem to be old and seem to fill \nthe thick air with a rotten-grey fine
  dust.   A heavy, grey fog \nrises from the moss covered earth into the heavy air
  here.   \nNoirwood Forest seems to continue in any direction you look for as \nfar
  as you can see."

title: Noirwood Forest
description: "This immense, enchanted forest is known as Noirwood -- \nwhich, in orcish,
  means Black Woods.   The gloomy, strong trees in \nthis area seem to emit a smelly,
  green fine dust.   Every so often \nyou note a small woodland mammal hiding in a
  gloomy tree.   This \nseemingly boundless forest seems to continue forever in any
  \ndirection you look."

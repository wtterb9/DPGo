title: Noirwood Forest
description: "The seemingly boundless, gloomy forest in which you stand is \ncalled
  Noirwood by the locals.   Some kind of brown-green fine \ndust in the insect-filled
  air around here make it difficult to \nbreathe.   A thin, grey fog rises from the
  moss covered ground \ninto the heavy air in this area.   These black woods seem
  to \nstretch to the horizon in any direction you look."

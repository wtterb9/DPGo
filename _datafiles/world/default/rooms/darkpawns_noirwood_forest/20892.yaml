title: Noirwood Forest
description: "This seemingly endless, black woodland is known as Noirwood \n-- which,
  in orcish, means Black Woods.   You note that the lofty, \nmystical trees in this
  part of the forest look very old and seem \nto fill the sultry air with a rotten-grey
  pollen.   A heavy, \nsilvery fog rises from the moist forest floor into the thick
  air \nin this part of the forest.   These enchanted woods seem to \nstretch to the
  horizon in every direction."

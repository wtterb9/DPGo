description: "You are standing somewhere at the heart of the seemingly \nendless,
  mystical forest called the Noirwood.   You note that the \nlofty, shadow-filled
  trees in this part of the forest appear to be \nvery old and seem to fill the thick
  air with a black fine dust.   \nA heavy, grey mist rises from the moist earth into
  the thick air \nhere.   In this immense, gloomy woodland the lofty trees seem to
  \ncontinue forever in every direction."

description: "The huge, shadow-filled forest in which you stand is called \nNoirwood
  by the locals.   You perceive that the strong, evil trees \nhere seem to be old
  and seem to fill the insect-filled air with a \nyellowish dust.   Every once in
  a while you think you glimpse a \nlarge creature following you behind you.   Noirwood
  Forest seems \nto continue all around you for as far as you can see."

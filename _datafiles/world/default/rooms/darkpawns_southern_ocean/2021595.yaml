title: On the Ocean
description: "The wide sea spans across your sight, making you lose all sense \nof
  direction.  You marvel at the schools of tuna that streak \nthrough the sea as though
  they were birds flying in the air.  On \nthe water's surface, you note driftwood
  floating at the mercy of \nthe sea beside you."

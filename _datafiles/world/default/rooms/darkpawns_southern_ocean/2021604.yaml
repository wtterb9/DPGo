title: On the Ocean
description: "You are floating above the restless surface of the sea.  Your \nnostrils
  sting as the foam condenses on you, soaking you with a\nsalty moisture.  Gusts rush
  past you, blasting you with crests\nand bits of flotsam that seem to have fallen
  off the tall cliffs\nof the island to the east.\n   The cliffs, unfortunately, offer
  no place in which to land."

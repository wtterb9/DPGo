title: On the Ocean
description: "The wide ocean spans across your vision, making you lose all \nsense
  of direction.  You marvel at the schools of trout that \nstreak through the water
  as though they were birds sailing in the \nair.  On the ocean's surface, you note
  kelp floating at the mercy \nof the sea beside you."

title: On the Ocean
description: "The wide water spans across your perception, making you lose \nall sense
  of direction.  You marvel at the schools of salmon that \nstreak through the sea
  as though they were birds flying in the \nair.  Breezes rush past you, spraying
  you with froth and bits of \nkelp."

title: On the Ocean
description: "Here, otters and gulls skim, splashing purposely into the \nwater.  You
  marvel at the schools of mackereal that streak through \nthe water as though they
  were birds flying in the air.  Gusts rush \npast you, hitting you with crest and
  bits of flotsam."

title: A Turgid Coast
description: "You are floating above the restless surface of the ocean, just south\nand
  west of a tall stretch of dried land.  Rocks form a tall cliff upon\nwhich you can
  see tall grasses and dunes that occasionally spill over \ninto the ocean around
  you.\n   The ocean continues to the north, south, and west, while it grows\nmore
  calm into a small bay to the east."

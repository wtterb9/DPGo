title: On the Ocean
description: "The wide water spans across your perception, making you lose \nall sense
  of direction.  You marvel at the schools of salmon that \nstreak through the water
  as though they were birds coating in the \nair.  Gales rush past you, hitting you
  with froth and bits of \ndriftwood."

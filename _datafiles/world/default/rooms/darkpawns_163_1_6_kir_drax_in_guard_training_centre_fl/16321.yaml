zone: (1-6) Kir Drax'in Guard Training Centre (FL)
title: "The Indoctrination Centre"
description: |-
  This is apparently where the trainees become fully inducted in to the 
  Kir Drax'in Guard.  There are trainees waiting in line to receive their
  standard issue weapons to the east, and their armor to the west. The 
  main centre extends to the south, and to the north through a heavily
  guarded doorway.  This room is decorated with religious icons and 
  candles, and some new initiates to the guard kneel in prayer before 
  proceeding to the south.

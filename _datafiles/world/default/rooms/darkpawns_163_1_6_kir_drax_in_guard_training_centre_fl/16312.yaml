zone: (1-6) Kir Drax'in Guard Training Centre (FL)
title: "Kir Drax'in Guard Basic Training - Level Three"
description: |-
  You stand at the bottom of stone steps which lead up to the second
  level.  The third level of the training centre stretches out to your
  southwest, with trainees in green outfits practicing combat with the
  typical standard-issue Kir Drax'in Guard sabers.  You notice that the
  sabers appear to have been dulled; they are clearly not meant to wound
  the opponent, mortally or otherwise.

title: "Armor Depot"
description: |-
  This is where the new members of the Kir Drax'in guard are fitted for 
  their standard issue armor.  A young priest hands out the armor to the 
  new initiates that are waiting in line. Written on the wall are the ten 
  commandments of the Kir Drax'in guard, and other religious propaganda.
  The centre continues to the east.

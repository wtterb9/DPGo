title: An Alley
description: "You stand on the crushed basalt and sand of an alley between two\nlarge
  structures.  To the south, the wall of the building seems to be \nmade from great
  slabs of volcanic rock which have been raised to lean\nagainst each other to create
  a solid foundation.\n   To the north, an odd tower rises from the cavern floor to
  stare\nwestward over the guarded wall.\n   The alley continues to the east, where
  it bends sharply northward,\nand west to the main street."

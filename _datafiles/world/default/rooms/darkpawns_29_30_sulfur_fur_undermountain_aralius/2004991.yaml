zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: A Shaft
description: |-
  You can hear nothing as you negotiate the powerful air currents which
  scream past your ears.  Your clothes, wet with the cold mist which rises
  from within the shaft, cling to you, freezing you as the moisture in the
  sodden fabric rubs into your skin.
     The walls of the shaft are smooth and slick with water, making purchase
  impossible.
     Staring down, you notice a faint glow.  A pale, almost sickly, blue
  light seems to radiate from deep within the shaft below you.

zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: A Volcanic Chimney
description: |-
  Flames erupt from below you, shooting past you in yellow spears of
  light.  The walls of the shaft seem to drip inward, streaming into the
  heart of the chimney below.
     The winds are powerful here and you find controlling your movements
  is becoming more difficult as you soar upwards on hot currents or
  plummet on cold ones.

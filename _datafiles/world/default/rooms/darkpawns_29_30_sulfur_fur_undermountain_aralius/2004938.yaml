title: A Misty Tunnel
description: |-
  You are standing in a secret tunnel deep within the fortress.  Strange,
  swirling mists float around you, stinging you with their energy which sets
  your hair on end.  The walls here seem to be whispering for you to turn
  back.
     Heavy breathing seems to be coming from the south, as though some old
  dragon was deep in slumber.

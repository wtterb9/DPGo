title: Pit Of Blackfire
description: "You have entered a black room.  The obsidian walls and floors absorb\nyour
  light, leaving you in near-total blackness.\n   As your eyes adjust to the dim light,
  you can begin to make out a\nfew details in the chamber.  Before you, a large, deep
  pit has been\ncarved into the floor.  In it, you can hear the crackling of blackfire\nas
  it consumes what appears to be the phosphorescent bones of dead\nfire daemons.\n
  \  Looking around you, you realize that you can see nothing in any \ndirection,
  save for the few torchlights that occupy the hallway to\nthe south."

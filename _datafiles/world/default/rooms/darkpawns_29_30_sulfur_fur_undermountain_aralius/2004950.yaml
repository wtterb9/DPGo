title: A Flawed Corridor
description: |-
  Clearly, an earthquake is responsible for the partial collapse of this
  tunnel.  Powered flakes of obsidian litter the floor amidst the boulders
  of igenous stones that once help up the ceiling.
     A small crawlspace extends through the rubble to the east where you can
  hear a soft moaning.  The corridor leads back toward the exit to the west.

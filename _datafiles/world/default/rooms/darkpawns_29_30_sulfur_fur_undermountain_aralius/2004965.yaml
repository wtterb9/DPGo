title: A Landing
description: |-
  You are standing on a wide landing in the dark tower.  A deathly cold
  chill rises from the stone beneath you and the sounds of heavy breathing
  come from somewhere very near.
     Through your light, you peer over a guardrail - the only defense against
  a fatal fall from the stairs - and see nothing but dust drift past you
  from above.
     The stairs ascend to the east, along a circular path and descend back
  to the west.

zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: A Royal Hall
description: |-
  Fine silks and hides of extradimensional beasts adorn the obsidian walls
  of this marble-tiled corridor.  Easily a hundred feet long, a patrol of ice
  daemon guards stroll along this corridor, their furred tails swishing
  in tune to their steps.
     To the north, the hall seems to empty into some sort of private room,
  though with no door to enclose it, it must have some other function.  To
  the south, a door lies set into the obsidian wall.

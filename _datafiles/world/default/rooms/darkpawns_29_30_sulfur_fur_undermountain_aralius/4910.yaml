zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: A Volcanic Tunnel
description: "You are standing in a smoking tunnel of the active volcano.  The\nstream
  of molten rock flows from out of the northern wall here, \nheading south toward
  the exit of the mountain.  To the east, the\ntunnel continues.\n   As you stand
  still to check the air, you notice a faint breeze of\ncooler air coming from the
  eastern tunnel, as though the heart of the\nmountain itself was dormant.\n   To
  the north and west, cave walls of hardened lava stand before you,\nwhile to the
  south, the rivulet streams toward the exit."

zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: In The Fissure
description: |-
  You stand among fallen slabs of rock, victims of the volcanic tremors
  which tend to occur with regularity in these caverns.
     Above you, out of the reach of your light, you can hear the chirping
  of blood bats who have obviously been awakened by your presence.  Still,
  the tiny flying rodents shouldn't bother with what they cannot swallow.
     The fissure widens and grows deeper as you travel east, narrowing as
  you look back to the west, toward the exit of this part of the cavern.

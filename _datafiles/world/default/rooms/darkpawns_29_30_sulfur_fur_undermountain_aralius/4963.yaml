roomid: 4963
zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: The Master Chamber
description: "You stand in the darkest chamber you have ever seen, as though some\nevil
  god created a hole in the shadows themselves.  Through your feeble\nlight, you can
  make out almost no details, other than a few stone tables\nand shelves which stand
  along the circular stone walls.  \n   A circular dias on which an altar of some
  sort has been built rests\nin the center of the room, a black crystal floating above
  it, seemingly\nabsorbing the light and emitting its own inky colour around you.\n
  \  Through your searching, you come across a door set into the eastern\nwall, its
  stone hinges set to last an eternity.  Its twin, carved with a\nrelief of stars
  and other celestial objects lies in the western wall,\nwhere a damp, almost humid,
  scent of vapour originates."

roomid: 4929
zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: A Council Room
description: |-
  A large bone-legged table dominates the center of this circular chamber.
  All around it, incorporeal mists shout at each other, mentally ordering
  their subordinates to search and seize potential enemies of the Daemon Lord.
     It appears as though you are glimpsing through a window to a different
  dimension as the beings do not seem to notice your presence and appear to
  be mere images of their true selves.
     A door rests in the north wall, exiting the large, domed chamber,
  while a corridor cuts in from a curved doorway to the west.

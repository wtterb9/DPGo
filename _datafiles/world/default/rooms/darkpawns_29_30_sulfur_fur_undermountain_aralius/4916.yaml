title: The Fortress Gate
description: "Though unimpressive, the wrought iron gate leading into the castle's\nmain
  keep appear to be both sturdy and functional.  Flanked by two guards\non each side,
  the gate remains tightly closed and, judging by the stern\nlooks you receive from
  the guards, off limits to anyone who is uninvited.\n   The keep rises high above
  you to the south, while to the north, the\nbustling activity in the bazaar seems
  to be a delightful distraction from\nthe terrors and risks of living in the undermountain.
  \ \n   Beneath you, the street runs to the east and west, away from the keep."

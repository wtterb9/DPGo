zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: The House Of Bones
description: |-
  Bone dice, bone darts, and bone dust are the three biggest games
  of activity in this gaming house.  Looking around, you see creatures
  of all levels of existence here, each gambling vials of blood and
  rare gems against one another on the next roll of the dice or toss
  of a dart.
     A few burly guards, both over nine feet tall, flank the only exit
  to the place to the north, while some sort of overseer, a fire daemon
  from the look of him, wanders from table to table, apparently looking
  for cheaters.

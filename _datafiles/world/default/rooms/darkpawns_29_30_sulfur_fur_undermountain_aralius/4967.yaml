zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: A Bend In The Alley
description: "Here, the alley bends sharply northward into a cavelike cul-de-sac.\nThe
  shadows here are thick, lacking the natural phosphorescence of the\ncavern walls
  around you, making you think twice about entering the area \nto the north.\n   To
  the east and south, the walls of the cavern are marred with large,\nclaw-like scratches,
  evidence of some daemon's hostility and rage, while\nto the west, the alley continues
  toward the main street."

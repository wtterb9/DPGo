title: Outside The Fortress Gate
description: "You can hear nothing though the murmurings and shouts of the daemons\nand
  otherworldly creatures around you.  Tails and wings slap lazily at \nyou while a
  stray horn or spike prods you to move on from behind.\n   The cavern seems to end
  here, with only the gate of the fortress\nto break the monotony of solid walls rising
  above you to the north and \neast.  You can also escape the pack by bolting to the
  south, though\nthe beasts around you form an almost impenetrable barrier to pass."

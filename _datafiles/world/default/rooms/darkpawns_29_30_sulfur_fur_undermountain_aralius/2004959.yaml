title: A Courtyard
description: |-
  You are standing in an underground volcanic cavern.  At some point long
  in the past, a pocket of magma drained away from this place, leaving a flat
  cavern floor and a domed ceiling nearly two hundred feet above you.
     Towers and structures of basalt, obviously constructed rather than natural,
  have turned this cavern into a subterranean city.  Clawed footprints mar
  the courtyard where you have entered, indicating that this is a high-traffic
  area for the inhabitants of this city.
     To the north, you can see the side of a building, while to the south,
  smooth cavern walls rise and slope above you.  As you look west, you
  see the street continue, then turn sharply as it meets the side of another
  building to the west.

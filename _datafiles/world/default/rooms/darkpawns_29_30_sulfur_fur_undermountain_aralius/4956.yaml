title: The Tower Floor
description: "Gravel covers the floor of this monolithic tower which seems to rise\nendlessly
  into the darkness above you.  A set of stone stairs ascend the\ntower along the
  western wall where the gravel seems to pulse and shift,\nperhaps just a trick of
  the light. \n   This circular room boasts only the exit to the east.  No doors or\nwindows
  allow any type of light to enter and even sound seems muffled\nin here."

roomid: 4974
zone: DarkPawns (29-30) Sulfur Fur Undermountain (Aralius)
title: Tower Stairs
description: |-
  You appear to have arrived on the tower's main floor.  As you look
  over the rail, you can see the stairs that descend over a hundred feet
  below into darkness.
     Here, the stairs have opened onto a small landing blocked with a solid
  stone door which seems to radiate an intense, biting cold.  An iron handle,
  wrought and twisted from what appears to have been a dull blade, rests
  firmly attached to the stone, obviously meant to be pulled outward, rather
  than pushed.
     The stone wall of the tower lies unblemished as you cast your eyes
  southward and to the east, while the gaping darkness seems to hold some
  secret as you look over the handrail to the north.

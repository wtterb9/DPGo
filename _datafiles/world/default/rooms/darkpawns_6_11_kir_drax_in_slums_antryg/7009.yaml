title: The Plated Ingot
description: "In direct contrast to the rest of this part of the city, this room is
  \nclean, warm, and well lit. The lighting is provided by what appears to be\nmagical
  globes hung on chandeliers. On the north wall is a fireplace that\nblazes heartily.
  \ To your right, a bar lies along the west wall.  Across\nmany tables and clouds
  of pipe and other smoke is a doorway through which\nyou can hear occasional snatches
  of conversation. The bar continues south."

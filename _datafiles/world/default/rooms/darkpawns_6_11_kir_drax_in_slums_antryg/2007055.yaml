title: Narrow Plank
description: |-
  You teeter upon a wobbly narrow plank which spans the short distance
  between buildings. Looking down into the blackness causes your gluteus
  maximus to pucker, your liver to rise into your throat, and your vision
  to dance a nifty number. Walk nimbly! The plank ends abruptly at a brick
  wall to the west.

title: The Plated Ingot
description: "Most of the people in the tavern have congregated in this end of the\nroom.
  The lighting here is a bit dimmer. Given the nature of this part\nof the town, you
  would expect the patrons to be more wary, yet most look\nfairly relaxed. The bar
  along the west wall is made of sturdy ironwood \nfrom the surrounding forests of
  Kir Drax'in. Behind the bar is a doorway\nthrough which the smells of fine foods
  waft. On the east side of the room\nis a closed door. Along the south wall a set
  of stairs leads up."

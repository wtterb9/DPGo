roomid: 1372
zone: (27-30) Elemental Planes (Arakon)
title: "The Elemental Chamber"
description: |-
  The chamber is quite large and its walls are engraved with all manner of
  arcane symbols. In each corner is a small pedestal but from here, not much
  detail can be seen. There is a rotating column in the middle of the chamber,
  only feet from where you stand - there is a soft hum associated with its
  movement and it radiates an enormous amount of energy.

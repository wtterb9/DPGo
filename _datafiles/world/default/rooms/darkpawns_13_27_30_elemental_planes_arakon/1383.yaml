title: "The Elemental Chamber"
description: |-
  The chamber floor is smooth and cold to the touch, as is the chamber wall.
  You run your hands over the numerous arcane symbols and a great power courses
  through your body. A number of colored spheres appear from nowhere and make
  their way towards the column on an unknown journey. Upon reaching their
  destination, they simply vanish in a puff of light.

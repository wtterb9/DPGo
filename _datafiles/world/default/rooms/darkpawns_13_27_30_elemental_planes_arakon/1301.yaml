title: "Beneath the Surface"
description: |-
  Light filters down through the ocean surface above and is quickly swallowed
  by the depths below. Small groups of fish swim by, obviously cautious of your
  intrusion in their domain. Every direction looks fairly similar so you may
  either swim upwards to the surface and descend into the darkness below.

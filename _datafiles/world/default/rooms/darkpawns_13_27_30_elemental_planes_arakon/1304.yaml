title: "The Depths of the Ocean"
description: |-
  It is surprising that even in the darkness of the ocean depths, the fish
  find a way to adapt and survive. A few of them have developed a phospherescent
  skin that radiates a small amount of light - not enough to see great distances
  but certainly enough to know you've arrived at the mouth of an underwater
  tunnel that leads to the north and south.

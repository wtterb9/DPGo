zone: (15-20) The Haven Lighthouse (Arakon)
title: "A Subterranean Cavern"
description: |-
  You have arrived at the top of a set of stairs that have been carved out
  of the rock wall and floor. A tunnel leads away to the east and you will have
  to step over a large number of assorted items if you wish to travel in that
  direction. The sound and smell of the ocean is quite strong here and eminates
  from the base of the stairs.

zone: (15-20) The Haven Lighthouse (Arakon)
title: "The Necromancers' Laboratory"
description: |-
  Some type of glass contraption occupies this corner of the lab. A strange
  red liquid is taken from one of three barrels before it passes through a
  number of glass containers, some of them heated by a single flame. The
  resultant mixture is combined with other equally strange liquids and empties
  into a vial.

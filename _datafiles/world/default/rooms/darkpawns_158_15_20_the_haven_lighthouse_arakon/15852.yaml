roomid: 15852
zone: (15-20) The Haven Lighthouse (Arakon)
title: "A Torture Chamber"
description: |-
  The sight before you is like none you have ever seen before. If a place
  of eternal torment existed, then this would most likely be it - this room
  is a torture chamber and from the looks of it, has been widely and recently
  used. Wooden and mechanical devices fill the floor space and still contain
  bodyparts and a covering of fresh blood. What remains of one poor creature
  has been stuffed into a barrel in the corner, a makeshift coffin of sorts.
     Before you exit to the west, you are overwhelmed by a sense of torment
  and anguish which, in such a place, is not hard to believe. It's as if the
  lives lost in here have remained, unable to escape into any form of afterlife.

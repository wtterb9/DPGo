title: "The Wine Cellar"
description: |-
  The entry to the second chamber leaves you standing before two doors; one
  to the north and one to the east. Both look fairly solid which is unusual
  given the amount of rotting wood that surrounds you in the form of broken
  wine racks.
     To the west and south, you can access another of the chambers down here
  in the wine cellar.

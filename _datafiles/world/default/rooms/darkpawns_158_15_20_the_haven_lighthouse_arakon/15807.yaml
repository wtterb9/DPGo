zone: (15-20) The Haven Lighthouse (Arakon)
title: "A Narrow Hallway"
description: |-
  You stand in a narrow hallway that runs the length of the house. To your
  south, you can see what looks like a small cloakroam while to the north, you
  can access the lighthouse kitchen. The footprints from the east travel past
  you and up the rickety stairs nearby.
     The remains of carpet line the hallway but the proximity to the sea has
  left little to cover the floor. Cobwebs swing freely from almost every
  corner you can see but their creators are no where to be found.

roomid: 15801
zone: (15-20) The Haven Lighthouse (Arakon)
title: "The Entrance to the Lighthouse"
description: |-
  You are confronted by a medium sized room that appears to have been some
  type of living area at one time. Pieces of broken furniture are scattered
  around you, covered in faded white sheets in an attempt to protect them from
  the layer of dust that now sits on the floor. Footprints leads from the door
  to the east across the room to the west and into what looks like a hallway.
     The floorboards creek under your weight which is a worrying thought as the
  lighthouse sits a good 80 feet above Haven bay and you are unsure as to the
  integrity of the foundation. A flash of movement catches your eye but before
  you realise what it was, it is gone. The room continues to the north, west
  and south or you can walk back down the path to the east to Haven.

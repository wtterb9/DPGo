zone: (15-20) The Haven Lighthouse (Arakon)
title: "A Prison Cell"
description: |-
  You are confronted by a small, dark and musty prison cell. Chains hang
  from the walls, some of them still restrain both living and dead victims.
  Several pairs of beady red eyes stare at you from the darkness but stay just
  out of sight. The passageway lies to the north while the cell continues to
  the east.

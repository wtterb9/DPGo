roomid: 15823
zone: (15-20) The Haven Lighthouse (Arakon)
title: "At the Top of the Lighthouse"
description: |-
  The room is completely enclosed by glass, apart from the roof above you.
  In the center of the floor, a large silver dish rotates slowly powered by a
  mechanical device of sorts. A glowing gemstone sits in front of the dish
  and provides the necessary light, however, it sits high above the floor level
  and you are unable to reach it. Gaps in the roof have allowed numerous
  storms to aid in the deterioration of this room, mainly the wooden floorboards
  which break under your steps.
     A trapdoor set in the floor is the only safe exit from the room.

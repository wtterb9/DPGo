roomid: 15812
zone: (15-20) The Haven Lighthouse (Arakon)
title: "The Study"
description: |-
  Why a lighthouse keeper would have need for a study, you cannot fathom,
  but you stand in one now. Loose sheets of paper lie on the floor, covered in
  the same layer of dust that the remainder of this house contains. You're not
  certain, but what looks like blood is splattered on the far wall and on the
  tattered drapes that hang over another boarded up window.
     What sounds like something being dragged on the floor is coming from the
  room to the north.
mapsymbol: #
biome: house
tags: [dark, indoors]
exits:
  north:
    roomid: 15805
nouns:
  blood: "Certainly a site you are now familiar with, but in a house that's been
deserted for a number of years, the freshness of the stain is a worry."
  desk: ":mahogany"
  mahogany: "The desk is the only piece of furniture that remains in this room and is
rather lavish given the nature of the previous owner's occupation. There's
nothing on the top of it, but it does have a few drawers down one side."
  paper: "They are all blank, probably faded over time."

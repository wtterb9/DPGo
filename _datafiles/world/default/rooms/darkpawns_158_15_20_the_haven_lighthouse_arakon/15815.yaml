roomid: 15815
zone: (15-20) The Haven Lighthouse (Arakon)
title: "Climbing the Spiral Staircase"
description: |-
  You stand at the base of a spiral staircase that undoubtedly leads to the
  top of the lighthouse. There are no windows here and the torches affixed
  to the wall are literally dripping water, ensuring they won't be used again.
     Glancing over your shoulder, you notice a distinct change in the wall
  structure. It is here that the house was attached to the brick lighthouse
  and apparently no one got around to painting the walls a common color, not
  that it really matters now.

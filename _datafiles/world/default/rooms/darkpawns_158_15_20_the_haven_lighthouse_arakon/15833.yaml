title: "The Wine Cellar"
description: |-
  This is the south western intersection of the four wine cellar chambers.
  Wine racks travel from the northern wall to the southern wall within this
  chamber and you find it difficult to move between them. Broken bottles of
  wine still remain in the racks, their contents spilled long ago leaving no
  trace.

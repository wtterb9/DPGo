title: "The Wine Cellar"
description: |-
  You weave and crawl your way through the wine racks and end up in the
  coner of the chamber. The ground is soft and spongy, a carpet of moss having
  grown here over time. You wouldn't have thought the wine could provide
  nutrients to plant life, but perhaps it does...

zone: (15-20) The Haven Lighthouse (Arakon)
title: "A Tunnel System"
description: |-
  You stand at what could be the beginning or the end of a lengthy tunnel
  system, depending on your point of view. Over time, the sea has eroded the
  rocky walls in this place leaving many interconnecting passageways, although
  the majority are too small for any creature to fit into. You can, however,
  access a large cavern to the south or progress further into the tunnels to
  the north or west.

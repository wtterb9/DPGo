zone: (15-20) The Haven Lighthouse (Arakon)
title: "The Wine Cellar"
description: |-
  Barrels and barrels of wine have been stacked against the far wall and
  look precariously close to falling over. Mildew has set in and a few of the
  barrels have become rotten, wine dripping out in numerous places and onto
  the ground. You can weave your way between the wine racks to the north or
  to the east.

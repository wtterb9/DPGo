zone: (15-20) The Haven Lighthouse (Arakon)
title: "The Sea Cave Lagoon"
description: |-
  The lagoon is quite deep here which makes sense given the ship that is
  docked to the west. The cave provides a fantastic hiding place and obviously
  someone has used that to their advantage. You cannot climb onto the ship
  from here, but you can scramble onto the dock to the south or travel further
  around the lagoon to the north or east.

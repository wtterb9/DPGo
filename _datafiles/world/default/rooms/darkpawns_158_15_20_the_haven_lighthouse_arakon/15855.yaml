nouns:
  tome: "It is a journal belonging to the occupant of this chamber. Most of it details
the grisly experiments conducted within this evil place but flicking through
it, you find a small section near the beginning which may be of interest.

...\"and they have provided me with this sanctuary so that I may continue my
work without interruption and fear of discovery until the time is right. In
return, I have summoned the spirits for the levels above to ward off the
adventurous.\""

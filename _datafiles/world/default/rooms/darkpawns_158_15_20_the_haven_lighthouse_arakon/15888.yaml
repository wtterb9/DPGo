zone: (15-20) The Haven Lighthouse (Arakon)
title: "A Tunnel System"
description: |-
  Shadows jump at you from the many openings in the tunnel walls but you
  convince your self they are simply a part of your active imagination and
  a product of the tunnel creation. A blast of fresh sea air hits you from the
  west and you can smell, rather than see, stagnant water to the south.

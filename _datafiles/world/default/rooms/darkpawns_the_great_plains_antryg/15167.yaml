zone: DarkPawns The Great Plains (Antryg)
title: The Plains
description: "You stand on the vast, rolling plains of dor-Sefrith. Ankle to knee
  high grass \nbends gently in the wind and the air is warm and humid. Looking out
  across the \nplains you can see for some distance. The horizon wavers hazily in
  the heat. \nTo the distance in the north you can see the peaks of a mountain range.
  Plains \nsurround you as far as you can see."

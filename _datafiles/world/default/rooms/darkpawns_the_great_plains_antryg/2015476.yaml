zone: DarkPawns The Great Plains (Antryg)
title: The Plains
description: "You stand on the vast, rolling plains of dor-Sefrith. Ankle to knee
  high grass \nbends gently in the wind and the air is warm and humid. The air has
  a definite\nsmell of salt now. Looking out across the plains you can see for some
  distance.\nThe horizon wavers hazily in the heat. Plains surround you as far as
  you can \nsee to the north and west, and to the east a tall lighthouse rises. To
  the\nsouth you can now see the ocean, covering the horizon."

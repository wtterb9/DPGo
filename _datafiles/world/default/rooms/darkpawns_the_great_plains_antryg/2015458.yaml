zone: DarkPawns The Great Plains (Antryg)
title: The Plains
description: "You stand on the edge of the vast, rolling plains of dor-Sefrith. Ankle
  to knee\nhigh grass bends gently in the wind and the air is warm and humid. The
  air has \na definite smell of salt now. Looking out across the plains you can see
  for \nsome distance.  The horizon wavers hazily in the heat. Plains surround you
  as \nfar as you can see to the north, east and west. To the south you can now see
  \nthe ocean."

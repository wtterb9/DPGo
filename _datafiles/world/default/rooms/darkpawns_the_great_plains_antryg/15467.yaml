zone: DarkPawns The Great Plains (Antryg)
title: The Coastal Plains
description: "You stand atop the towering sea cliffs along the southern edge of the
  vast\ndor-Sefrith plains. The steep sand and clay cliffs plummet straight down and\nare
  highly unstable.  Best not to get too close.  The air here is very humid\nand the
  sounds of the beach and ocean fills your ears. Plains surround you to\nthe north
  as far as you can see. To the east the cliffs continue. To the \nsouth the ocean
  stretches out into the horizon."

roomid: 15513
zone: DarkPawns The Great Plains (Antryg)
title: The Ocean Road
description: "You stand on the vast, rolling plains of dor-Sefrith. Ankle to knee
  high grass \nbends gently in the wind and the air is warm and humid. The air has
  a definite\nsmell of salt now. Looking out across the plains you can see for some
  distance. \nThe horizon wavers hazily in the heat. To the distance in the northwest
  you can\nsee the peaks of a mountain range. Plains surround you as far as you can
  see. \nTo the distance in the north is a forest. To the south you can now see the
  \nocean. The road continues west and east."

zone: DarkPawns The Great Plains (Antryg)
title: The Coastal Plains
description: |-
  The plains have given way to a wide sandy beach. It lies on the shores of
  a protected bay off the ocean. The cry of gulls fills your ears and the smells
  of the ocean fill your senses. There is some seaweed on the beach. To the
  north are plains as the beach curves inland, west the plains stretch endlessly,
  south the beach continues and east is the bay.

title: The Ocean Road
description: "You stand on the vast, rolling plains of dor-Sefrith. Ankle-to-knee-high\ngrass
  bends in the wind, the air, warm and humid with a faint hint of brine\nand salt.
  \ Looking out across the plains, you can see to the horizon that\nwavers hazily
  in the heat of day and the dew of night. Plains surround you \nas far as you can
  see.\n   The road continues north and south, and the plains extend to the west."

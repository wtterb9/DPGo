zone: DarkPawns The Great Plains (Antryg)
title: The Plains
description: "You stand on the vast, rolling plains of dor-Sefrith. Ankle to knee
  high grass \nbends gently in the wind and the air is warm and humid. The air has
  a definite\nsmell of salt now, but you cannot see the source yet. Looking out across
  the \nplains you can see for some distance. The horizon wavers hazily in the heat.
  \nPlains surround you as far as you can see. To the east the plains lead to a\nlarge
  structure."

roomid: 2015116
zone: DarkPawns The Great Plains (Antryg)
title: The Foothills of the Grey Mountains
description: |-
  Dark hills, sparsely covered with stunted trees, rise out of the Plains of
  dor-Sefrith, the vanguard of the forbidding Grey Mountains.  Sheer cliffs block
  any possible path to the north, to the east are more foothills, and to the west
  and south the hills slowly blend into the plains.

title: The Plains
description: "You stand on the edge of the vast, rolling plains of dor-Sefrith. Ankle
  to knee\nhigh grass bends gently in the wind and the air is warm and humid. The
  air has \na definite smell of salt and you can hear the sounds of the ocean. Looking
  \nout across the plains you can see for some distance. The horizon wavers hazily
  \nin the heat. Plains surround you as far as you can see to the north, to the is\nKir
  Oshi, west are more plains. To the immediate south you can now see the \nocean."

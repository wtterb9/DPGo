title: The Ocean Road
description: "You stand on the vast, rolling plains of dor-Sefrith. Ankle to knee
  high grass \nbends gently in the wind and the air is warm and humid. You can detect
  a hint \nof salt in the breeze. Looking out across the plains you can see for some
  \ndistance. The horizon wavers hazily in the heat. Plains surround you as far as\nyou
  can see. To the southeast the plains lead to the city of Kir Oshi. The road\ncontinues
  north and south."

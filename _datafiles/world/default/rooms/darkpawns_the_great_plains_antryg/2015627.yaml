title: The Coastal Plains
description: "The plains have given way to a wide sandy beach. It lies on the shores
  of\na protected bay off the ocean. The cry of gulls fills your ears and the smells\nof
  the ocean fill your senses. There is some seaweed on the beach. To the\nwest the
  plains stretch endlessly, south and north the beach continues, and \neast is the
  bay."

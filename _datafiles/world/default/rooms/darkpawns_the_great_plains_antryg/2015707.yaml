roomid: 2015707
zone: DarkPawns The Great Plains (Antryg)
title: The Plains
description: |-
  You stand on the vast, rolling plains of dor-Sefrith. Ankle to knee high grass
  bends gently in the wind and the air is warm and humid. The air has a definite
  smell of salt now. Looking out across the plains you can see for some distance.
  The horizon wavers hazily in the heat. Plains surround you as far as you can
  see to the north and west. To the south you can now see the ocean.

title: "Before The Fortress Keep"
description: |-
  You stand at the corner of the fortress street where the cavern wall
  meets the main keep.  Looking above you, you can see great black blocks
  of volcanic stone comprising the wall of the keep, its pitch sheen, 
  probably obsidian, absorbing the flickering torchlights and wispglows
  of the bazaar.
     To the east, the street continues toward the main gate of the keep,
  while to the north, the street leads past the bazaar.

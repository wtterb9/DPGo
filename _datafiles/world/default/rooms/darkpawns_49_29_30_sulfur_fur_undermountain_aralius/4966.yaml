title: "Cul-de-sac"
description: |-
  You have entered a dead-end cave.  Flawed, unnatural stone walls
  rise above you to the north and west, a few cracks betraying the 
  outlines of a door in the eastern wall.
     To the west, a solid steel door provides entry into a tower that
  scrapes the cavern ceiling above you.  The dark stone of the tower
  seems to blend in suitably with the surrounding cavern walls.

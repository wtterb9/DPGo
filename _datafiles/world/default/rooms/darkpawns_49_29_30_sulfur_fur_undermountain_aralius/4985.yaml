roomid: 4985
zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "In The Chimney"
description: |-
  You are floating, buffeted by streams of superheated air and ash.  As
  you rise and fall, you feel that you can manipulate the currents, riding
  the cooler ones to descend into the chimney while floating on hotter ones
  to rise.
     All around you, the walls of the chimney are scarred with a blackened
  crystal amidst the dense black rock that composes the core of the mountain.
     Below you, you can see nothing but are aware of the occasional geyser
  of ash that disrupts the currents and spins you around.

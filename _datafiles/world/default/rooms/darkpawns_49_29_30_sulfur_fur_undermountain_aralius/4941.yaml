title: "Deep Within A Fissure"
description: |-
  You are tripping over fall rocks as you negotiate a path through the
  rubble here.  The area is warm, probably heated by volcanic activity
  from further in the fissure below.
     A few slithering animals reside here, sidling away from the foreign
  scent of your body.
     The fissure continues to the west, where it rises steeply and to the
  east, where it seems to drop off sharply.

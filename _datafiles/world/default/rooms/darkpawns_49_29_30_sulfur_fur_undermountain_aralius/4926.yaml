title: "Before The Fortress Keep"
description: |-
  You are standing at the base of the keep's front wall.  A few spires
  add decorations to the otherwise stark fortress, but the entire structure
  still looks as though it was carved from the soul of an evil god.
     To the north, you can see the bazaar where trading and bickering seems
  to be the rule, while to the east and west, the street continues.
     Off to the west however, you notice the main gate to the keep.

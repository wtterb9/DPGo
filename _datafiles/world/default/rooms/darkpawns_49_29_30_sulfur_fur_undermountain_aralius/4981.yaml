roomid: 4981
zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "A Burning Corridor"
description: |-
  You are standing in what could only be a volcanic vent.  Smoke and fire
  rises up from the smouldering floor, filling the air with a burning, choking 
  ash.  The walls themselves boast crystals of hot sulfur and seem to melt
  in the intense heat.
     The corridor continues to the south, where it grows even hotter.  To the
  north however, a cold mist seeps from under the door, creating a vortex of
  roiling steam at its base.

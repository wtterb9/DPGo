title: "Tower Stairs"
description: |-
  Reptilian footprints mar the otherwise undisturbed dust on the stairs
  here.  A few dried scales have flaked off some unknown creature as it
  molted, leaving its ovular dead skin behind.
     The stairs wind around the tower, ascending in their circular climb
  which seems to turn southwest as you go upward.  A landing can be seen
  just west of here, still in the range of your light.

zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "A Volcanic Vent"
description: |-
  A trail of lava burns into the igneous floor here, winding its way
  northward from the bend to the east to exit the chamber in a rivulet of
  molten rock.  The walls to the west and south emit a sulfurous steam,
  obscuring your vision in the vent as hot air blasts by you, rushing to
  escape to the outside.
     Your ears are beginning to pop a bit, and you know that the pressure
  will only get worse as you venture deeper into the volcano.

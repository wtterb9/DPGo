roomid: 4993
zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "Deep Within The Shaft"
description: |-
  You are surrounded by a yellowish mist which sems to drag you down
  toward the bluish light.  The sky-coloured luminescence seems to grow
  a sickly green as you descend and the stench of sulfur begins to mix
  with the ozone scent of the surronding mist.
     You are easily a quarter mile or more from the top of the shaft and
  judging from the congealing moisture on the shaft walls, you have the
  odd sensation that you are no longer within the mountain.
     You can descend toward the greenish light or ascend toward the 
  dark top of the shaft.

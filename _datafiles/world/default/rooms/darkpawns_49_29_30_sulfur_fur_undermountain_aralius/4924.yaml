title: "An Infernal Bazaar"
description: |-
  Like most bazaars in the overworld, this one features different beings
  from foreign lands coming together to trade their native goods.  Here,
  gems, silks, rare stones, vials of blood, bones, and other interplanar
  wares are bought and sold, each item bringing a fair price to its seller.
     The bazaar extends to the west and south, stretching across the area
  to the southwest as well.

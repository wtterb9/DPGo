roomid: 4995
zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "Blistering Cold"
description: |-
  Frozen red liquid hangs in slanted streaks on the shaft walls, victim to
  the gusts which blast from the sickly yellow-green light below.  The misty
  tendrils are still writhing here, oblivious to the winds and to your touch
  as you pass through them.
     The glow beneath you turns pale yellow as you grow closer to it.
     Examining your options, you know that you are half a mile below the
  top of the shaft which is far out of sight in the darkness above you.
  Below you, you can see the mists swirl and you catch a strong scent of
  sulfur.

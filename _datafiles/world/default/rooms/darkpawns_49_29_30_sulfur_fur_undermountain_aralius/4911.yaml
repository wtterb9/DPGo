title: "A Volcanic Tunnel"
description: |-
  You cover your mouth and nose as you enter this tunnel of volcanic
  smoke and ash.  The smooth walls bear the scars of intense heat which
  blackened the stone itself as magma flowed eastward here from the north.
  A trickle of lava flows in the middle of the tunnel, streaming eastward
  toward the exit.

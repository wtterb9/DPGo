zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "Amidst The Crowd"
description: |-
  You are being bounced and buffeted against leather-skinned creatures
  that rush past you as they go about their own business.  Before you,
  an ice daemon slaps a forked, lizardlike tongue against your cheek,
  stinging you with its cold, as though telling you to get away from
  him.
     As you look around, trying to exit the crowd, you notice that the
  cavern wall rises high to the east and slopes above you to form the
  dome of the undermountain itself.  To the west, the fortress wall
  stands tall, patrolled by tailed, weaponed beasts at its peak.
     The street continues to the south, away from the beings and the
  mob that threatens to crush you under their scaly heels.

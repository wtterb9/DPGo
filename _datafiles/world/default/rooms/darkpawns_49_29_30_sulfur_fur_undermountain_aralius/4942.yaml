zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "Outside The Fortress Gate"
description: |-
  You can hear nothing though the murmurings and shouts of the daemons
  and otherworldly creatures around you.  Tails and wings slap lazily at 
  you while a stray horn or spike prods you to move on from behind.
     The cavern seems to end here, with only the gate of the fortress
  to break the monotony of solid walls rising above you to the north and 
  east.  You can also escape the pack by bolting to the south, though
  the beasts around you form an almost impenetrable barrier to pass.

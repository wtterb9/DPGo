title: "The Overlord's Chamber"
description: |-
  Piles of gems, chests of valuables, and stacks of rare carpets and
  tapestries blanket most of this vast chamber.  Measuring some fifty feet
  square, the long obsidian walls of this domed chamber absorb your light,
  dimming the room to a dusky orange, making the gems seem dull and
  lackluster.
     A grand central table dominates the room, though it is empty and 
  seems to have been carved from mahogany.
     You can see only the exit you came from here.

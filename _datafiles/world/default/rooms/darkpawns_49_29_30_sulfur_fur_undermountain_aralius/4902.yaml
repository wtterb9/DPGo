title: "A Street Corner"
description: |-
  You stand at the junction of two tiled streets.  A few elemental beings,
  ooze elementals judging by the muddy texture of their bodies, shamble past
  you in their lumbering gait, completely ignoring the lesser beings in their
  path.
     The street continues to the south, where you can see the wall of the
  fortress keep at the end, and to the east where beings stroll in and out
  of a gaming house.

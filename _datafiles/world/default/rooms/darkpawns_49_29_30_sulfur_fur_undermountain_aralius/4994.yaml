roomid: 4994
zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "Blood Runs Red"
description: |-
  You are fighting turbulent air currents as you travel this vertical
  shaft.  The wet walls, once slick with cold moisture, seem to drip with
  a bloodlike liquid, as though the sides of the shaft themselves were 
  bleeding from the abusive wind currents that shoot upwards from the
  putrid greenish glow below.
     Tendrils of foul-smelling mist wind and twist around you, somehow
  still cohesive despite the strong constant air currents from below.
     You can continue up or down the tunnel.

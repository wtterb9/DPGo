zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "A Busy Street"
description: |-
  Burly daemons of all types mingle here, pushing past each other to
  enter or exit into the main gates of the undermountain fortress.  In
  the distance to the north, the functional double doors of the fortress
  entrance stand open, though heavily guarded as odd, perhaps even
  extradimensional, beings bear sacks and crates of unknown cargo through
  them.
     To the north, you can enter the crowd of beings or head south and
  get away from the rush.

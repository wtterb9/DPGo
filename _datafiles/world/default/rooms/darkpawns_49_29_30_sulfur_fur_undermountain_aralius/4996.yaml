zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "Blood Ice"
description: |-
  The reddish ooze on the shaft walls have frozen into a blood-coloured
  ice here tinting the yellowish tendrils to an ethereal orange.  Below you,
  perhaps a half mile or more, the swirling, pulsing glow grows more intense.
  Already, the sickly fog is becoming more luminous, changing into a bright
  yellowish ochre.
     The shaft continues upwards, far out of sight and descends into frigid
  winds below you.

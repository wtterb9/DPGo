title: "A Tiled Street"
description: |-
  You are strolling along a street that is bordered to the west by a
  massive stone wall.  Horned, devilish guards sport tridents on the
  minarets above you, watching you carefully as you walk past.
     To the east, a small windowless building stands with a missing door.
  The scent of burnt leather and oiled steel emanates from within.
     The street continues to the north, where enormous demon-like beings
  patrol the streets, each bearing broadswords the size of a human leg.

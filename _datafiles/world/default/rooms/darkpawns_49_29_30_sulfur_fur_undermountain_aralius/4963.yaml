roomid: 4963
zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "The Master Chamber"
description: |-
  You stand in the darkest chamber you have ever seen, as though some
  evil god created a hole in the shadows themselves.  Through your feeble
  light, you can make out almost no details, other than a few stone tables
  and shelves which stand along the circular stone walls.  
     A circular dias on which an altar of some sort has been built rests
  in the center of the room, a black crystal floating above it, seemingly
  absorbing the light and emitting its own inky colour around you.
     Through your searching, you come across a door set into the eastern
  wall, its stone hinges set to last an eternity.  Its twin, carved with a
  relief of stars and other celestial objects lies in the western wall,
  where a damp, almost humid, scent of vapour originates.

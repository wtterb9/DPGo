title: "A Flame Geyser"
description: |-
  Bluish fire spews upward from a vent here in the floor, boring a small
  chimney in the tunnel ceiling.  Molten sulfur drips into the flame, creating
  a yellowish gas which chokes you despite your magical protection from the
  hellish elements.
     The tunnel continues southward through the flames and northward into
  an unstable tunnel.

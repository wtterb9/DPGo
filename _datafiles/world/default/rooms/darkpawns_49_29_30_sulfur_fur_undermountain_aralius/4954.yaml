zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "Stone Stairs"
description: |-
  You are standing in a large niche in the wall of the Chamber of the
  Rifts.  Here, a stone stairwell ascends above the chamber and into a
  damp darkness above you.
     You can hear nothing other than the rushing of winds which seem to
  emanate from the east.  The southern and western walls here are slick
  with moisture as are the stairs that lead up.
     Oddly enough, a greenish moss seems to grow on the walls in patches
  here, apparently lacking the need for sunlight to grow.

zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "A Rift"
description: |-
  Swirling gases engulf you as you enter this semi-ethereal corridor.
  There appears to be no floor, no walls, no substance to this vortex
  of mists and vapours.
     To the west, huge bands of magically cold iron reinforce a magical
  door of solid light, preventing entrance from the material world into
  what lies beyond.
     To the east, the corridor seems to lead back to the material world,
  and though you are not certain of your location, you feel sure that 
  you stand in a rift between worlds.

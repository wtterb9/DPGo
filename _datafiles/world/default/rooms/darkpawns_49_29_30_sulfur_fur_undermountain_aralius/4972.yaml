title: "The Top Of The Tower"
description: |-
  You are standing on the top of the black tower.  To the west, you can
  see the rest of the tower peak which stands just out of hand's reach from
  the ceiling of the cavern.
     A few footprints have scuffed the stone on the floor here - guard tracks,
  perhaps, or maybe a curious onlooker who wished to get a better view of
  the cavern from above.
     Looking for exits, you notice that only the west and the stairs back
  into the tower do not offer fatal falls.

title: "Chamber Of The Pits"
description: |-
  Glyphs and magical wards adorn the smooth walls and ceiling of this
  frigid chamber.  In the floor, five shallow pits have been carved, each
  a semi-spherical bowl in which sigils have been scribed.  Power, dark
  power, radiates in this room.  
     A single door lies in the southern wall while a small crevasse can
  be seen flawing the glyphs on the eastern wall.

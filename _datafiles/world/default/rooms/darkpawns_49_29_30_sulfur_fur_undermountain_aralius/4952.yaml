zone: (29-30) Sulfur Fur Undermountain (Aralius)
title: "Tower Overlook"
description: |-
  You are prone on your belly as you peer out over the tower's edge.
  The entire undercity seems to be visible from here, including the dark
  outbuildings and the well-lit bazaar that rests behind the fortress
  wall.
     As you look out from your perch, some 200 feet above the cavern floor,
  you notice the abundance of guards at the fortress gate far to the
  north, as well as the patrols that monitor the activity within.  Far
  over the western wall, you can see daemons haggling the prices of their
  goods as they set up stalls in a bazaar.
     The only non-fatal way to leave here is east, across the top of the
  tower.

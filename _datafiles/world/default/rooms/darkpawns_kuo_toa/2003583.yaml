title: A Sandy Shore
description: "Dark cliffs hang over the cove to the south and curl out to the east,
  \nforming a small lagoon. The cliffs prevent any significant ocean activity, \nallowed
  the formation of this small, sandy inlet. After walking about for \na bit, you notice
  your footprints on the sand's surface, and while doing \nso become aware of others--others
  that, when observed closely, look to be \nfresly made. However, these prints are
  not your own. The prints recede into \na lush jungle to your west."

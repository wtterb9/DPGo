title: Tubular Pass
description: |-
  Gradually, the pasage descends underneath the seafloor's surface, making
  the transparent walls encased with soft earth. You can see fluorescent liquid
  flow through small veins through the glass-like tubing, which reveals a
  labyrinth of hydraulic networks--twisting and winding about--providing light
  for an otherwise dark passage.

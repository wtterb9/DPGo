title: High-pressured Chamber
description: |-
  You hear a slight ringing in your ears due to the extreme pressure in
  this chamber. The whole room is like a hollowed out globe, with the lower
  half submerged in the seafloor and the upper exposed to the waters. The
  seafloor glows bright orange, making the chamber feel like a burning
  sphere of light.

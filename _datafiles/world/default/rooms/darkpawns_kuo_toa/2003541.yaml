title: Northeast within the Hive
description: |-
  The entire chamber ebbs with an orange light that emanates from within the
  shells of the crablike creatures. They cling and traverse the ceiling as well
  as the floor, making the entire cavern move as if it were alive. The creatures
  seem to be familiar with interacting with humanoids, or humanlike beings, for
  they go about their duties without taking notice to your presence.

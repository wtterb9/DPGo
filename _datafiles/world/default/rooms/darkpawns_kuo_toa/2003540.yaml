title: Brachyuraian Hive
description: |-
  Thousands of miniature crablike creatures are scattered about the chamber,
  some half burried in crevices, others skittering about, transporting food and
  material from above to create and sustain their hive. They don't seem to notice
  you, and continue with their reproductive process.

zone: DarkPawns Kuo-toa
title: A Sandy Shore
description: "To your east a calm lagoon has been formed by the island's cradling
  \nrock formation, and outstretched here at the shore of the lagoon is a \nsmall
  black-sand beach. West of here, outlining the beach, is a thick \ntropical jungle.
  Glancing further west you can see the cliffs circle \naround the fringes of the
  jungle in the form of a circle. From this \nobservation you realize that the only
  way into the heart of the isle \nis through the small opening into the lagoon."

title: A Sandy Shore
description: "Black cliffs rise out of the sand to the north, and curve out to the
  \neast like a demon's horn. The tide swells inland, then quickly rolls back \ninto
  the small lagoon to the east. A tropical jungle outlines the beach to \nyour west
  that, upon further notice, appears to have been trimmed somewhat. \nSlash marks
  cover the palms, and whole bushels of various plant life have \nbeen mutilated,
  allowing a crude passage."

zone: DarkPawns Kuo-toa
title: Within the Hive
description: |-
  Infant crabs align all sections of the wall to the north, and when the
  pulsating glow fades it looks as if the wall is alive. A profusion of crabs
  pour out from a hole in the ceiling, and soon after they quickly seal it.
  These creatures' disgusting habitat and mode of living is repulsive, and for
  a moment you become nauseated with the overwhelming stimulus of their life-
  sustaining activities.

title: A Lagoon
description: "There's an abundance of beautiful fish, including harmless sand-sharks,
  \nthat glide about within the clear lagoon. You see a thin, white fish with \nyellow
  bands and silky threaded fins dart underneath some rocks on the \nlagoon's floor
  as you pass. To the west is a black-sand beach that \nstretches across to each crags'
  base."

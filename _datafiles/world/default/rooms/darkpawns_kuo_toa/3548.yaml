zone: DarkPawns Kuo-toa
title: Center of the Hive
description: |-
  It seems as if the creatures avoid walking within the midst of their
  breeding grounds, for there is an invisible symmetric circle that they
  avoid crossing, leaving a bare patch of earth beneath your feet. There is
  no obvious explanation for the purpose of avoiding the center, though there
  must be some reason they do not cross here. Then, around the fringes of the
  circle, you notice a carcass from one of the crabs and you see many skeletal
  remains from these creatures scattered about beneath your feet.

title: Within the Hive
description: |-
  It seems that these creatures are being bred for the sole purpose of
  reproducing the glowing substance they produce naturally, for this substance
  can be used as a natural light source. A self-sufficient creature that can
  secrete such a substance is fascinating, though the other beings who have
  also discovered this would not appreciate you leaving with this discovery.

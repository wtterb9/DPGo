title: A lush Jungle
description: "A boar's hide has been strung up on a tree here to dry along with some\nkelp.
  To the east you can make out a small clearing, and thin paths are \ntorn through
  the jungle in every other direction. A few ant beds rise up\nfrom the ground, and
  you realize that you've been treading over a bed of \nants the whole while."

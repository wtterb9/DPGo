zone: (25-30+) Avian Temple (Darius)
title: "A Lush Forest Path"
description: |-
  Several luscious fruits and berries adorn the various trees and bushes
  along the path.  In the dirt, rabbit tracks lead to a small hole in the ground
  where a family of rabbits gathers berries for storage.  Strange noises echo 
  through the forest and grow louder and it becomes clear that they are some
  enticing songs of battles long past, sang by numerous enchanting voices.

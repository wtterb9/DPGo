zone: DarkPawns (12-20) The Ogre Emperor's Stronghold (Nimos)
title: Chieftain's Antechamber
description: |-
  This chamber is rounded, with one exit to the east and one to the north. Two
  scarred and strong-looking goblins stand beside the northern exit, which has
  a rich tapestry of elvish designs hung upside-down across it. The ogres snarl
  and draw their weapons as you enter.

zone: DarkPawns Player Castles
title: The Sacrifical Altar
description: "Large, cathedral-styled windows line the walls of this bleak, stone-furnished\nroom.
  \ Instead of the usual primitive religious art staining the glass of these\nwindows,
  black, blood-stained sheets have been crudely nailed into the frames\nand blot out
  nearly all outside light.  Books containing arcane knowledge with\ntitles written
  in forgotten languages seem to be scattered haphazardly around\nthe bare stone floor.
  \ In the center of the room is a granite table marked with\nan array of mysterious
  and ominous symbols.  A thick, red liquid, possibly\nblood, flows down grooves carved
  into the side of the table into a rusted metal\ngrating in the floor.  Through it,
  the screams of tormented souls who met\ntorturous ends at the hands of a skilled
  assassin can be heard.  A flash of\nlightning briefly illuminates the room and a
  message scrawled in \nblood on the far wall helps provide insight into the feverish
  madness of a man\nvainly chasing the specter of immortality."

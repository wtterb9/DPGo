title: A Foreboding Cave Entrance
description: |-
  An unusually dark cave opening looms northward, its walls covered with strange
  writings, apparently in a number of different languages.  You can make out
  one word, which apparently reads: 'Danger'.  You notice two tall spears, one
  on each side of the cave, topped with skulls.  A rather large pile of bones
  has gathered in the area, and perhaps it'd be best to leave before you joined
  them.

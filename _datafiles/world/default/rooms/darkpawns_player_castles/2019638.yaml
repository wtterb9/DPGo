title: A Summoning Pit
description: |-
  The shrieks of daemons and other lesser beings echo throughout the pit while
  the dense stone walls prevent the sounds from reaching the temple.  The pit is
  dark and sinister with only a torch flickering and casting the shadows dancing
  across the room.  The light reveals vicious claw marks and several indentations
  in the walls caused by the vile creatures being summoned here.

title: Entrance to the Caelitis Monastery
description: |-
  An extremely large wrought iron gate blocks the entrance to this sanctified
  monastery.  The beautiful oratory can be seen through the bars of the gate
  while the tops of several other buildings are visible over the surrounding
  wall.  Heavily guarded by two of the toughest monks you have ever seen, you
  find no easy way to break into this sacred realm.

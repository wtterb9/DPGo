title: Outside the Golden Pyramid
description: |-
  You stand at the top of a small trail in the foothills of the Grey Mountains.
  Before you is a squat, golden pyramid that shines with an unnatural light.
  The rune-covered entryway is to your north, while to the south the small,
  rocky trail decends back down the foothills into the open plains.  The Grey
  Mountains loom high above your head in all other directions.

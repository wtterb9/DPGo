title: The Castle Entrance
description: |-
  You stand beneath a giant archway, the entrance to this foul place. The
  floors and walls are made of a cold stone and have been covered with the blood
  from many fearsome battles...some of it looks quite fresh. Large rooms lie to
  the west and east while the exit from the castle lies to the south.

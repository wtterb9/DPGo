title: Inside the Golden Pyramid
description: |-
  You are now inside the golden pyramid. The walls appear to be constructed
  from solid gold. A pungent green smoke fills the air, choking your lungs and
  leaving you confused. You can hear strange singing from an unknown direction,
  some type of folk music. On the floor lay three golden lamps, each emblazoned
  with an apple.

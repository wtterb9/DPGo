title: Azarith's Bedroom
description: "A blinding amount of light streams in from the floor-to-ceiling windows
  of\nthis room overlooking the monastery.  An enormous, ornate bed with gold\nbedposts
  sits against the side wall, complete with a set of red satin bedding.\nThe adjacent
  wall is entirely shelved and covered with a vast array of books\nand manuscripts.
  \ Numerous mahogany dressers, bureaus and wardrobes are\nplaced about the room on
  a spotless, marble-tiled floor, leaving no doubt that\nthe owner of this room enjoys
  a lavish lifestyle.  It is difficult to adjust to\nthe light, but a large, oak-trimmed
  mirror can be distinguished and sits \ndirectly in front of the door.  Shadows dancing
  in the corners of the mirror\ngive the impression that a large man is lurking somewhere
  behind the door."

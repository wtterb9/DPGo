zone: DarkPawns Player Castles
title: Spare
description: |-
  From the north you can hear deep, rhythmic drumming, accompanied by dark
  chanting from several female voices. Blue-tinted light flickers from the south,
  and on the east-wall is a large shield painted with the crest of the Inner
  Sanctum. Thick slabs of white marble make up the flooring, and consistent with
  the contrasting theme, the ceiling is designed with black marble.

title: The Altar of Nat
description: |-
  Upon arriving in this room, you instantly feel at peace. In the center is
  a statue of a radiant woman, eminating pulses of light throughout the room.
  Sacrificial offerings of elaborately crafted treasures of all kinds glitter
  in the ever constant light. Covering the walls are various pictures and other
  relics depicting the Goddess Nat. You feel drawn near to the statue and the
  feeling of relaxation flows through your body. In her presence you are lost
  in the ecstasy of content and you wish time would stop.

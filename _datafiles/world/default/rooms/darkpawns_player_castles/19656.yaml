title: The Fourth Floor of a Tall Tower
description: |-
  The great spiral staircase takes up most of this room, leading down to
  the ground floor and up further into the tower. There are a few comfortable
  chairs scattered around and the walls have been decorated with past heroes,
  some from this clan and others who strived to better themselves within this
  world. The treasure room lies to the south while a strong, wooden door lies
  to the north.

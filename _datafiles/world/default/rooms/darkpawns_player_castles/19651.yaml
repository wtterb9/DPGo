title: The Second Floor of a Tall Tower
description: |-
  The great spiral staircase takes up most of this room, leading down to
  the ground floor and up further into the tower. A flowering garden of assorted
  herbs and perennials surrounds the flowing fountain that takes up the center
  of the room. To the south, an archway opens onto a large balcony while to the
  north, shimmers of light dance around the room.

title: The Room of Solitude
description: |-
  This cozy room is dominated by a large, wooden table which is covered in
  all sorts of maps and plans. Scrolls litter the floor, most filled with the
  statistics of worldly items and the weakenesses of some of the more difficult
  creatures. A window in the northern wall provides a breath-taking view of the
  surrounding mountains while a solid door to the south keeps out all of those
  unwelcome guests.

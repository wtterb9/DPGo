title: A Smoke-Filled Room
description: "As soon as you enter this room the smoke changes from green, to black,
  \nand then to blue and the pungent odor changes to a sweet, heavenly aroma. \nThe
  smoke is so dense, you cannot see your light inches from your face, \nbut oddly
  enough, you see the ground and walls clearly. Suddenly the room \nswirls and you
  feel like you are floating. You can't discern up from down \nbut you see peculiar
  arrangements of stones everywhere you look."

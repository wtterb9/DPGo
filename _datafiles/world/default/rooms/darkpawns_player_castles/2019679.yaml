title: A Cold, Damp Dungeon
description: |-
  You enter the darkness and immediately notice the chill in the air.
  Water drips from an unknown source and moss grows on the brickwork despite
  the lack of light. A pile of treasure sits in the corner surrounded by all
  manner of bones, most of which you identify as human. You are tempted to
  steal some of it but the fate of those before you seems obvious enough.

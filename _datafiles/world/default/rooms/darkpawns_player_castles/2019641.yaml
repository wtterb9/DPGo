title: A Harem in the Skyy.
description: |-
  Several oversized pillows wrapped in ivory-coloured silk cases
  lay atop the bed of clouds.  Atop a small table amidst these pillows
  rests an ancient hookah, still smoking from recent use.  White and
  cream-coloured sheets have been loosely draped over the bed, meshing
  the heavenly atmosphere with the sensualness of its inhabitants.  Three
  beautiful women lay scantily-clad on the bed, awaiting their master's
  return to fulfill his every desire.

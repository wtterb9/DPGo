title: Path through the Elven Encampment
description: |-
  Several sets of footprints moving in every direction are impressed all over
  the earth.  The sounds of movement echo throughout the encampment but
  there are no visible signs of life.  Perhaps the sounds are just a figment of
  your imagination running wild.  To either side are large, silken tents in which
  you can see numerous signs indicating a sizeable number of stationed troops.

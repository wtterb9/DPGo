title: An Overgrown Path
description: |-
  Several massive tree branches have fallen in such a way as to impede travel.
  The forest itself appears to make the life of explorers quite harsh.  The signs
  of wildlife and vegetation have disappeared almost completely.  The strange
  noises echoing through the forest grow louder and it becomes clear that they
  are some sort of ritualistic chanting.

title: A Forgotten Trail
description: |-
  A faint dirt path winds through the underbrush of the forest.  No one has
  taken this path in a long time as evident by the tree roots and shrubbery
  growing over the trail.  The shrill howl of a wolf pierces the calm of the
  forest and provides an ominous pretense as to where this path leads from.

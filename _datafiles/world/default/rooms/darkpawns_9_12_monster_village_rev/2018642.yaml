title: A Trail in the Cold Village
description: |-
  You stand before the broken door of a small building to your east. The
  door has claw marks on it and what looks like puddles of coagulated blood
  lie on the ground.
     The trail continues to the north and to the west. To the north you can
  see another building similar to the others. To the south, you can see
  the edge of some mountains a short distance away.

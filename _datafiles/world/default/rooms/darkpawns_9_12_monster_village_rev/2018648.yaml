zone: DarkPawns (9-12) Monster Village (Rev)
title: A Ransacked Storehouse
description: |-
  This small, shack-like building seems to have been used for storage.
  Long poles are placed in the walls protruding from one wall to its opposite.
  The poles are situated near the ceiling and a bloody hook hangs from one.
  Wooden boxes lie broken and splintered on the floor along with strips of
  leather and more hooks. Dried blood covers everything and bits of dry meat
  can be seen amid the rubble.
     The door leading out of this horrible storehouse is to your west.

title: A Short Pass
description: "You stand on a trail which winds confusingly through a short pass into
  \nthe mountains. To the north you see what looks like an abandoned village \nin
  a small valley. To the south, a forest opens up before you. Wait..what \nwas that?
  Something howling...sounds like it came from the village. It's \nnot abandoned after
  all. A tree to the side of the path here is inscribed\nwith some kind of warning
  in crude common."

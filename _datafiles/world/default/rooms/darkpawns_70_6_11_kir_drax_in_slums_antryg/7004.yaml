title: "A Blocked Street"
description: |-
  As the road continues, little changes beside the direction you are 
  going.  Ahead, the burnt remains of a building are piled in the street
  blocking your way south. From all appearances, houses have been built
  haphazardly upon the ruined foundations of others.

description: |-
  Almost all light is blocked out by the towering buildings crowding the
  street. In addition, the street has narrowed considerably, though it does
  not seem as filthy.  However, for what the street lacks in refuse, it makes
  up in smell. A mixture of urine, vomit, and congealed blood make even the
  heartiest stomachs turn sour.

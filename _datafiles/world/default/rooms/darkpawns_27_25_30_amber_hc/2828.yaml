nouns:
  door: "The front doors close to form an arch. They are 15 feet high and 8 feet
wide when together, and they are made of a dark, heavy wood that Oberon
brought out of shadow. Although not especially ornate, they are carved
with several designs. The central design is a unicorn, half on each door.
When the doors are closed, the Unicorn seals the castle."

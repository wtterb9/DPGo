title: "A Cliff Above A Deep Pool"
description: |-
  This is a beautiful and peaceful little clearing. The grasses are soft and
  inviting. The imposing face of Mt. Kolvir is to the north. An overgrown drop
  to the stream is to the south. The edge of the cliff is west of here.  Water
  falls into a deep pool below there.

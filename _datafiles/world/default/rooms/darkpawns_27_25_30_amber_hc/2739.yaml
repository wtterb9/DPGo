title: "The Top Of Mount Kolvir"
description: |-
  The path ends here at the broad roundtop of Mount Kolvir. To the north
  the mountain slopes downward into a saddle, invisible from all angles
  except this one.  There appears to be a fairly large town and a castle
  secreted in the woods at the top of the mountain here.

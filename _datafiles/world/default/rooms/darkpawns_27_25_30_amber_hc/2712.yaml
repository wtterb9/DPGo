nouns:
  shrine: "A small shrine to honor Julian, a Prince of Amber. Julian is a large,
powerful man who spends much of his time hunting in these woods. He is
Arden's self-proclaimed guardian. He can often be seen riding his horse,
Morgenstern, who he formed from the stuff of shadow, and wearing his
mystical white scale armor. His other shadow creatures, the hellhounds,
are never far from his side."

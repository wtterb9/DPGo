nouns:
  shrine: "This is a shrine honoring Corwin, a Prince of Amber. Corwin once tried
to forcibly take the kingship of Amber from his brother Eric (but only
after Corwin's receiving a communication from Oberon that he should rule).
He spent several years in the dungeon below the castle thereafter, he
later became King until the Unicorn chose Random for the position.
Corwin wields the mystical Grayswandir, the nightblade, which he forged
from the stuff of shadow, and he wears silver and black."

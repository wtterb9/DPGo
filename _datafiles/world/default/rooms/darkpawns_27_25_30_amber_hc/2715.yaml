nouns:
  log: "You see a brushy dropoff to a stream, too steep to climb down."
  shrine: "This is a small shrine honoring Random, the King of Amber. Random was
once known for his irresponsibility and lack of interest in family
politics. After spending hundreds of years playing the drums, gambling,
and wenching throughout shadow, however, he married and settled down.
He was selected to rule Amber by the unicorn itself. He possesses the
powerful and mysterious Jewel of Judgement, which is rumoured to impart
great powers upon its wearer at a great price"

nouns:
  device: "This device looks like it is an artifact of some kind, a large circular
piece of wrought metal with two pendulums and several counterweights.
Various astrological symbols have been etched onto the surface of the
circle, and you surmize that the device is meant to be used to track
the positions of stars.  You can't imagine taking it however, it is
bolted to the wall and looks far to heavy to move besides."
  door: "You look towards Merlin's sitting room."

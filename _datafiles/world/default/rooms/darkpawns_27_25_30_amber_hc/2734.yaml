title: "A Precarious Path Along The Precipice of Mount Kolvir"
description: |-
  This is a narrow path which allows to to climb northward up the face
  of Mount Kolvir, or southward back into the forest Arden. You are still
  not high enough to see over the tall trees of Arden, but you can see that
  the path you are on scales up the mountain as far as you can see.

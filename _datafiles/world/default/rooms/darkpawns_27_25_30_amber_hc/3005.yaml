title: "By The Pattern"
description: |-
  You stand in a narrow space between the wall and some glowing lines on
  the floor to the east that pulse with deadly energy. The room itself is
  large; its ceiling and walls lost in shadows.
     To the west you see a door. A charred bird skeleton lies left to decay 
  at its base, proclaiming that whatever lies outside the pattern is deadly.

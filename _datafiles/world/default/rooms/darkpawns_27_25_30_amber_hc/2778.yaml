roomid: 2778
zone: (25-30) Amber (HC)
title: "Eric Court"
description: |-
  This is a grimy little square honoring Eric. The docks are north.
  Fishmonger's Road is west. Seaward Street is south. There is a statue here.
mapsymbol: .
biome: city

title: A Training Area
description: "There is a large red mat made of out some type of heavy cloth spread
  \nout on the ground here, and many weapons line the walls.  You surmise \nthat this
  area is used by the tong to train their initiates in weapons use.  \nGazing at the
  vast arsenal of hand-to-hand weaponry, you realize that \nthese are not merely training
  weapons, these are the real thing!  \nSuddenly, you remember the cloth mat underneath
  your feet.  With \nhorror, you realize that you now know why it is colored red."

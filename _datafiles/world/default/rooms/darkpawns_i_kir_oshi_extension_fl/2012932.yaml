title: By A Surface Pool
description: "As you continue around this room, you notice that the floor is really
  \nrather slick; you should watch you step so that you don't fall head first \ninto
  the pool with all your armor on.  Looking into the pool you notice \nthat it is
  indeed lit from the bottom by two caged light sources.  It also \nappears to turn
  into an underwater tunnel of sorts several feet below the \nsurface.  The tong must
  have some sort of device to transport black \nmarket goods under the water and bring
  them here.  You notice several \nmechanical apparatus to your south, perhaps they
  have something to do \nwith the actual transportation of the goods?"

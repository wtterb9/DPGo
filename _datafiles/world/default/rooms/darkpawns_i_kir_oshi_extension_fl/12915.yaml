title: A Dark Passageway
description: "You stumble about in the darkness of this cold, black passageway \noccasionally
  bumping into the rough-hewn stone walls.  You also notice \nthat there is some sort
  of linear impression in the stone floor, like \ntreads.  Its almost as if something
  very heavy had been pushed back and \nforth over this floor many times. \nThe passage
  continues to your north and south."

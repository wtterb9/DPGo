title: A Cavernous Room
description: "This is the back centre of the entire cavern, the walls sweep upwards
  \nto your north, and the two stone columns frame the room to the south.  \nThis
  section of the room is well lit and furnished, and several tall \noriental men dressed
  in elaborate clothing sit here smoking and \ndiscussing something in a language
  you do not know.  They seem \nunaware of your presence, as if preoccupied by something
  else."

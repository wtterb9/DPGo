title: A Dark Passageway
description: "This is a somewhat open passage that leads eastward into complete \ndarkness.
  \ To the west, dim candlelight beckons you out into what \nappears to be a larger
  chamber.  The air here is very calm, as if it has \nbeen undisturbed for ages, but
  the lack of musty smell tells you that that \ncannot be so.  In what little light
  there is, you think you can make out \nwhat appears to be parallel grooves in the
  rough stone floor that lead \ninto darkness to the east."

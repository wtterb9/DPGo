title: A Cavernous Room
description: "This is the northwestern corner of this immense room.  There is \nvirtually
  no light here at all, and you find yourself maneuvering around \nfigures in the
  near darkness -- who knows what they might be doing \nhere.  The room continues
  around the pillar to your east, and also to \nyour south.  The air here is very
  still, and you can hear people \nwhispering in the darkness in a language you don't
  comprehend."

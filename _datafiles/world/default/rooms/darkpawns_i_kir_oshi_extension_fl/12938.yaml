title: A Dark Passageway
description: "This section of the passage slants downward to the north at a \nnoticeable
  angle.  The walls here seem to be smoother than the ones to \nthe south, as if the
  texture of the cut rock was changing.  In fact, the \nwalls and floor are noticeably
  slick, as if moisture had accumulated on \nthem.  The stale air in the passage doesn't
  feel like it carries any water \nat all however.  The passage continues in darkness
  to the north and \nsouth."

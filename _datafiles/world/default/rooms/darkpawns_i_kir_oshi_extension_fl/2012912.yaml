title: An Intersection
description: "This is a T-intersection in a labyrinth of cool, dark passageways. \nTunnels
  to the west, south, and east lead into darkness, while there is a \nheavy iron-bound
  oak door to your north.  The dampness in these \npassages has caused the oak to
  swell in the door frame, leaving it \ncracked and blistered.  It has also managed
  to rust the iron bindings, the \nheavy iron knocker, and the iron keyhole. Cool,
  still air hangs heavily \naround you."

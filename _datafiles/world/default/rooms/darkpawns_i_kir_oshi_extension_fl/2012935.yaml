title: In the Surface Pool
description: "Brrrrr! The water IS cold! And it appears very deep as well.  You can
  \njust about hover on the surface, but your attempts to dive down deep \nand inspect
  the tunnel fail -- you just can't hold your breath long \nenough.  You can get on
  to dry land by swimming over to that ladder \nagain, as every other shelf around
  this circular pool is too high for you \nto pull yourself out on.  Aside from the
  fact that you can see in the \nwater pretty clearly because of the two caged lights
  just underneath you, \nthere really isn't anything else interesting here."

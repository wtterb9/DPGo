title: A Cavernous Room
description: |-
  You stand just west of the leftmost column in this massive cavern.
  The walls sweep upward into blackness to your west.  The columns and
  black stone walls absorb what little light there is in here, making it
  very difficult to see, even with your own light sources.  The cavern
  continues to your north and south.

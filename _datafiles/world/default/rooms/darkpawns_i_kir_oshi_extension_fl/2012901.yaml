title: A Dimly Lit Foyer
description: "You can barely see in the dim candlelight of this foyer, but you can
  \nmake out dark, arched passageways which lead in all directions except \nsouth,
  where a narrow flight of stairs leads up to a reception of some \nsort.  Although
  this room appears to be very old, with walls made of \nrough-cut stone, it lacks
  a sense of decay which tells you that this area \nmust see regular use.  You shudder
  to think by what."

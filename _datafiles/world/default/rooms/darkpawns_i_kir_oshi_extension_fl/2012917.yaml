title: A Dark Passageway
description: "The passage here curves to run west to north, and you almost don't \nsee
  the change in topography and nearly run smack into a wall. You \nnotice that the
  passage seems to slope downward to the north, while it \nseems to open up slightly
  to the west.  You notice that there are no \ncobwebs or signs of any non-humanoid
  life at all, perhaps the cold air \nkeeps all the insects and animals away."

zone: DarkPawns (15-20) The Haven Lighthouse (Arakon)
title: The Study
description: |-
  Why a lighthouse keeper would have need for a study, you cannot fathom,
  but you stand in one now. Loose sheets of paper lie on the floor, covered in
  the same layer of dust that the remainder of this house contains. You're not
  certain, but what looks like blood is splattered on the far wall and on the
  tattered drapes that hang over another boarded up window.
     What sounds like something being dragged on the floor is coming from the
  room to the north.

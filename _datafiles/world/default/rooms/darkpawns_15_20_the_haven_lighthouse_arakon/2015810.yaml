roomid: 2015810
zone: DarkPawns (15-20) The Haven Lighthouse (Arakon)
title: The Lighthouse Kitchen
description: |-
  This end of the kitchen contains two large ovens, their combined width
  spanning the entire wall. Cupboards above your head hold what is left of the
  crockery used by the lighthouse residents, the majority of it now in hundreds
  of little pieces.
     The kitchen extends to the east where you can return to the main living
  area or you can travel through the door set in the northern wall, its surface
  having been clawed by an unknown creature. Although this lighthouse has been
  deserted for some years, you hear an occasional groan coming from the floor
  above.

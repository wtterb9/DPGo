zone: DarkPawns (15-20) The Haven Lighthouse (Arakon)
title: The Sea Cave Lagoon
description: |-
  The water is quite pleasant as you swim around near the beach to the east.
  A school of small fish swims nearby, not afraid of your intrusion into
  their domain. The lagoon is shallow here and you can easily stand on the
  bottom but it deepens rapidly to the west.
     You can climb onto a wooden dock to the south or swim further around the
  lagoon to the north and west.

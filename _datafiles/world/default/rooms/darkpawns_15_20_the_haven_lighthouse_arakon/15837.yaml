title: The Wine Cellar
description: |-
  It looks as if someone has been doing work on the sub-structure here
  recently. Large chunks of rock and wood lie in a heap on the ground, the
  eastern wall appearing to be the source. As you move closer, several smaller
  stones drop onto the floor and sound echoes throughout the wine cellar.

title: The Sea Cave Lagoon
description: |-
  You splash around in the shallow waters of the lagoon, a nice sandy beach
  directly east of here. The cave wall blocks any travel to the north and you
  can just see the ocean through the cave mouth to the west. The lagoon extends
  to the south and west.

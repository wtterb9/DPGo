roomid: 15804
zone: DarkPawns (15-20) The Haven Lighthouse (Arakon)
title: In the Keeper's House
description: |-
  A narrow hallway to your west connects the main living area of the house
  to the kitchen. Your footprints now join those which begin at the entrance
  to the east and continue past you into the hallway. A single portrait has
  been left within the room and hangs just to the left of the hallway entrance,
  it's eyes following your every move...or so you think anyway.
     You're having trouble breathing in this area of the house, partly due to
  the dusty environment and the very stale air. All sorts of fungii have
  grown on the floor and walls, thriving in the moisture rich sea air.

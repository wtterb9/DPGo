roomid: 2015805
zone: DarkPawns (15-20) The Haven Lighthouse (Arakon)
title: In the Keeper's House
description: |-
  You almost trip over a few chunks of wood that once upon a time were a
  chair. This area of the room appears to have been where food was served as is
  evident by the round table that sits before you, remarkably still in one
  piece although the damp sea air has slowly eaten it away over time. Chairs
  covered with more sheets have been evenly placed around the table, scraps
  of food still sitting on it.
     A small study adjoins the living area to teh south but before you can look
  further, what feels like a hand rests on your shoulder causing you to spin
  around wildly, only to find nothing there.

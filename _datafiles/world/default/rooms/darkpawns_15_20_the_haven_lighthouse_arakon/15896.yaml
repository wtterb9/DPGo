zone: DarkPawns (15-20) The Haven Lighthouse (Arakon)
title: Swimming in a Stagnant Pool
description: |-
  You swim further into the depths of the pool and arrive at a dead end.
  The cavern walls are covered in a thick layer of the algae and any thought
  you had of climbing out of the pool should be forgotten. The only exit is
  to swim back the way you came.

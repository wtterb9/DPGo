title: The Wine Cellar
description: |-
  You stand at the north western intersection of the four wine cellar
  chambers. From here, you can access the chambers to the south and east or
  travel back into the chamber to the north. Dust falls from the ceiling as
  if someone was walking in the rooms above you, but you can't hear a sound
  except that of your own breathing.

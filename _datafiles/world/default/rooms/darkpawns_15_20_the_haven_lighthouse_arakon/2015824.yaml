roomid: 2015824
zone: DarkPawns (15-20) The Haven Lighthouse (Arakon)
title: The Wine Cellar
description: |-
  Either the lighthouse keeper really loved his wine or this cellar was
  used as a storage area for Haven. This area is quite large and could more
  than easily handle the needs of the family living in the house above you.
     The cellar is divided into four chambers, each sub-divided into a number
  of rows by the wine racks that extend from the floor to the ceiling. The walls
  are made of rock since the cellar has been built into the cliff foundation
  that the lighthouse sits on. Stairs lead up from here to the ground floor
  of the house.

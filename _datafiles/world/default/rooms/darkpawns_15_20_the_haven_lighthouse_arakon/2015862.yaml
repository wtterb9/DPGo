title: A Subterranean Cavern
description: |-
  Standing near the center of the cavern and looking around, you are in awe
  at the sheer size of this place. It's hard to believe that high above you,
  the Haven lighthouse has been constructed. The cavern continues to the south
  and east while to your west, a tunnel disappears into the darkness. You
  have difficulty seeing over the amount of goods stored here.

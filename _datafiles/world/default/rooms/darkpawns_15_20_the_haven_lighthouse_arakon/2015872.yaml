title: A Large Sea Cave
description: |-
  The southern end of the beach meets the cave wall to the east and south
  while a wooden dock stretches into the cave lagoon west of here. Although
  this area may have been naturally created, the dock is a sure sign that
  others visit this place frequently.
     Towards the end of the dock, you can see a medium sized ship.

title: A Tunnel System
description: |-
  The end of the tunnel is littered with what look like human bones. They
  have been neatly sorted according to type, some even packaged ready for
  transport to an unknown destination. You can't imagine what type of creature
  would deal in the trade of human bones but the proof lies before you.
     The tunnel to the north provides the only exit.

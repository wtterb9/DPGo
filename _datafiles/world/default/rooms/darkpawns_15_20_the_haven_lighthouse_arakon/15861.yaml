title: A Subterranean Cavern
description: |-
  You weave your way through several cloth bundles but find nothing of
  interest in this corner of the cavern. Looking above you, the ceiling is
  barely visible and any sound echos quite distinctly around the area. The
  cavern opens out to the north and west while a small tunnel leaves east
  from here.

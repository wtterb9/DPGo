title: A Large Sea Cave
description: |-
  The dock here is only a few feet off the ground and you wonder how the
  ship at the western end could sail in here and not get caught on the sandy
  bottom of the lagoon. The calm waters lap at the base of the dock and onto
  the beach to the east.

zone: DarkPawns (15-20) The Haven Lighthouse (Arakon)
title: The Cloakroom
description: |-
  The room is actually larger than you first thought, large enough at least
  for a person to stand here. The room was used to hang clothes, most likely
  heavy jackets used by the keeper on his continual journey to the top of the
  lighthouse. Now, nothing remains except the metal bars that run between the
  walls.
     A narrow hallway to the north provides access to other areas of the
  combined lighthouse and living area.

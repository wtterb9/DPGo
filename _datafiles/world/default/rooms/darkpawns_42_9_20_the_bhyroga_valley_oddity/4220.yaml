nouns:
  gate: "The north gate"
  sign: "We the people of Bhyroga truly desire to have peace with you, our northern
neighbors. We know that you feel a need to kill us and eat us, but it is our
fondest hope that one day we can unite to the betterment of us both. We offer
much in the way of trade, including many different varieties of fish prepared
in many different ways. If, however you do wish to keep on with your violent
attacks....
FUCK OFF!!"

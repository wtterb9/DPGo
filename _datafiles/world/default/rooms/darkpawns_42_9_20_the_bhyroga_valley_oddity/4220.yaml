roomid: 4220
zone: (9-20) The Bhyroga Valley (Oddity)
title: "At the Northern Entrance to a Small Village"
description: |-
  You stand at the entrance to a small fishing village. The large granite
  wall and the locked gates look very impressive, and not very welcoming.
     To the north, east, and west, the valley you are in is mostly frozen
  tundra, but you can just make out a lake far to the north.  To the south,
  you see the village gates. It's very cold out here.

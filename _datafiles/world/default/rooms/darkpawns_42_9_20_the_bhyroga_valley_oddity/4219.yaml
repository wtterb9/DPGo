title: "Inside a Cozy Inn"
description: |-
  You have entered a cozy little building which seems to be the closest 
  thing this village has to an inn. There are a few pallets on the ground, 
  and this DOES at least seem like a good place to rest your weary bones. There 
  is a bartender here, selling food and beverages. A roaring fireplace keeps 
  the temperature at a point where you almost feel like falling asleep. This
  building seems a bit more modern compared to the rest of the huts.

title: "A Frozen Valley"
description: |-
  You are wandering around in a valley hidden within the Bhyroga mountains.
  The valley is very hilly, and footing is treacherous as you negotiate the
  path.
     All around you, you can see the mountains looming above, a few flakes
  of snow misting the highest peaks.
     You're freezing your ass off.  Better have some damn thick blankets for
  the night.

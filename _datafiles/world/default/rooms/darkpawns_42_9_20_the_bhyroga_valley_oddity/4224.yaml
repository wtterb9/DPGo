title: "A Frozen Valley"
description: |-
  You are wandering around in a valley hidden within the Bhyroga mountains.
  The valley is very hilly, and you have a hard time walking here.
     In all directions, you can see the mountains looming above you. 
     Far to the southwest, you can see the small fishing village known only as
  Bhyroga.
     You're freezing your ass off here.  Better have some damn thick blankets
  for the night.

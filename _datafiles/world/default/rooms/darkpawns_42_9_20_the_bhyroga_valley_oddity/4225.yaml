description: |-
  You are wandering around in a valley hidden within the Bhyroga mountains.
  The valley is extremely hilly, making footing uneasy and treading unstable.
     In all directions, you can see the mountains looming far above you.
     Off to the south, you can see a small fishing village.  
     You're freezing your ass off.  Better have some damn thick blankets for
  the night.

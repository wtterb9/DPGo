roomid: 4283
zone: (9-20) The Bhyroga Valley (Oddity)
title: "A Small Cave"
description: |-
  You are standing in a small cave. All around you, animal hides have
  been made into the shapes of beds - very large beds.  The walls are 
  covered with primitive art and soot.
     A passage leads out to the east.

title: "A Frozen Valley"
description: |-
  You are wandering around in a valley hidden within the Bhyroga mountains.
  The valley is very hilly, and you have a hard time walking here.  All about
  you, the mountains loom, casting their shadows on the valley.
     A cave opens in a mountain wall to the east, offering you shelter from
  the frigid cold.
    You're freezing your ass off.  Better have some damn thick blankets for
  the night.

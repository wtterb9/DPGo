zone: (9-20) The Bhyroga Valley (Oddity)
title: "A Small Cave"
description: |-
  You are standing in a small cave. All around you, animal hides have
  been made into very large beds. The walls are covered with primitive 
  art and soot.
     To the north, the cave connects to an east-west passage.

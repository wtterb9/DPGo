title: "On A Narrow Ledge"
description: |-
  You stand on a narrow ledge. Far below you, in what would be a fatal 
  fall, is the bottom of the mountain. You hug the side of the mountain,
  struggling not to lose your balance.
     After a calming breath, you catch something glimmering out on a limb
  just north of here.

description: |-
  You stand on a slightly elevated dais at the northern end of the top 
  level of the Fire Pagoda.  All around you, flame spirits dance wildly
  around the pillar of flame in the center of this place.  The magical
  nature of this place is certain. This is one of the shrines of the 
  elements that make up this world -- the legendary Fire Pagoda!
     Before you, on a massive golden throne, stands the master and High
  Priest of this pagoda, a soft blue flame outlining his figure.

title: "Fire Pagoda"
description: |-
  The pagoda looks eerie from your angle, the interior light buffeting 
  and reflecting from the glow in the windows, making crazed, jagged-edged
  angles on the walls and columns.  The servants of the Flame move in and
  out of these shadowed angles rapidly, like flies buzzing around a fresh
  corpse, or moths to a flame.

roomid: 19451
zone: (10-20) Shaolin Temple / Fire Pagoda. (FL)
title: "Fire Pagoda"
description: |-
  This floor looks to be much the same as the one below it, teak flooring 
  and basalt columns supporting a flat ceiling.  Torches, braziers, and 
  other open flames burn everywhere, as before.  This level, however, has
  four large windows: two set in the eastern wall, and two set opposite
  them in the western.  The windows look out into the clouds through a
  fiery veil, the same that surrounds the temple from the outside.  The
  chanting of the servants of the pagoda seems louder here than it did 
  before, and the room extends to another upward flight of stairs to the 
  south.

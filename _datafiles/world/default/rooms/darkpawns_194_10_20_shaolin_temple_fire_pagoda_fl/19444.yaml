title: "Entrance To The Pagoda"
description: |-
  You stand just inside what seems to be a magnificently built pagoda.
  The doors are ornately carved from a beautiful teak wood. The walls are
  plain white, but are elegantly tasteful. The floor is constructed from 
  a rich, dark hardwood that has been carefully polished and maintained.
  The room itself is presumably where guests wait to be announced to the
  owner of this fine home.

title: "The Temple Sanctorum"
description: |-
  You stand in the entrance to a long stone chamber. This seems to be a 
  gathering place for prayer and meditation. Each wall is supported by a 
  huge pillar, and on each pillar is a bas-relief of a lion's head. Inside 
  each of the lion's mouth burns an unnatural flame. The eerie chanting 
  of monks seems to endlessly echo off of the vaulted ceiling high above 
  you.

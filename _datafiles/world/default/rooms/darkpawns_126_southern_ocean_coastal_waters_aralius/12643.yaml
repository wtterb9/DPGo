title: "On the Ocean"
description: |-
  Here, dolphins and gulls swim, splashing happily into the 
  water.  As you float above the surface, eddies crash into you, 
  forcing you to pay attention to the water's motion, especially
  where it crashes into tall, vertical cliffs that rise from the
  island to the east.

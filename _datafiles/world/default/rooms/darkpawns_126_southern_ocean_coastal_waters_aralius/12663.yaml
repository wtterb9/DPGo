title: "Lagoon Waters"
description: |-
  You are floating in warm waters where the strong ocean current meet the
  gentle surf leading from a hole in the cliff to the west.  The water here
  is strangely tinted, as the sandy floor below you refracts through the
  clear waters.
     The ocean extends to the northern, eastern, and southern horizons.

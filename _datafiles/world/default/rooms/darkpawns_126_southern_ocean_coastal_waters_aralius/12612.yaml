title: "On the Ocean"
description: |-
  Here, porpoises and manatees skim, splashing happily into the 
  water.  You marvel at the schools of trout that streak through the 
  sea as though they were birds coating in the air.  In the 
  distance, you can see the foam of a broken water currents.

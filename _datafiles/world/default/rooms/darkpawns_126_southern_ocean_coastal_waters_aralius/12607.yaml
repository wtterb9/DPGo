title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the sea.  
  Your lips sting as the foam shimmers you, bringing tears of pain 
  to your eyes.  Zephyrs rush past you, blasting you with the spray
  of crashing wavecrests and bits of seaweed.

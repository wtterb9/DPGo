title: "On the Ocean"
description: |-
  Here, porpoises and manatees skim, splashing happily into the 
  water.  You marvel at the schools of trout that streak through the 
  sea as though they were birds coasting in the air.  In the far
  distance, you can see the foam of broken water currents.

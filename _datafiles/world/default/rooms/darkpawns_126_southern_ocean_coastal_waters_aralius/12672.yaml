zone: Southern Ocean/Coastal Waters (Aralius)
title: "On the Ocean"
description: |-
  Here, porpoises and otters swim, splashing happily into the clear
  water.  You marvel at the schools of sea trout that streak through
  the sea as though they were birds coasting in the air.  
     To the north and west, you see the high cliffs of an island rising
  hundreds of feet into the sky.  The cliffs appear smooth and a bit
  weather-worn as they take the brunt of southern storms.

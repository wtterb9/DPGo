zone: Southern Ocean/Coastal Waters (Aralius)
title: "On the Ocean"
description: |-
  Here, whales and manatees swim, splashing happily into the sea. 
  You marvel at the schools of tuna that streak through the ocean 
  as though they were birds flying in the air.  An old lobster trap
  floats by, rotted with churning water and floating at the mercy of
  the sea.

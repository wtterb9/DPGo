zone: DarkPawns (9-20) The Bhyroga Valley (Oddity)
title: A Narrow Pass Through the Mountains
description: "You are in a narrow pass. On both sides of you, the granite walls climb\nsteeply
  up and out of sight. The ground has been covered with sand in the \nmanner of a
  semi-primitive road. You feel almost trapped in the small space\nthat you have.
  The pass continues to the north, while the entrance to the\npass lies just to the
  south."

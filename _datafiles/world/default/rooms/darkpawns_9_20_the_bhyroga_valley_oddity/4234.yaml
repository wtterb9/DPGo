title: A Frozen Valley
description: "You are wandering around in a valley hidden within the Bhyroga mountains.\nThe
  valley is very hilly, and you have a hard time walking here.\n   In all directions,
  you can see the mountains looming above you, poking\ntheir majestic snow-capped
  spires into the clouds.  To the south, you see\nthe small fishing village known
  only as Bhyroga. \n   You're freezing your ass off.  Better have some damn thick
  blankets for\nthe night."

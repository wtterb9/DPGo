title: A Frozen Valley
description: |-
  You are wandering around in a valley hidden within the Bhyroga mountains.
  The valley is very hilly, and you have a hard time walking here.
     In all directions, you can see the mountains looming above you. To the
  northwest, you see what appears to be a frozen lake.
     You're freezing your ass off.  You better have some damn thick blankets
  for the night.

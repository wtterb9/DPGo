title: The Avenue of the Gods
description: |-
  Stretching out to the east and west of you is Kir Drax'in's famous Avenue
  of the Gods. The statues lining the street are large and forbidding. South
  of here, a sign the says "Post Office of Kir Drax'in" hangs over a small
  building. To the north, you see the outer wall of the guard's barracks.

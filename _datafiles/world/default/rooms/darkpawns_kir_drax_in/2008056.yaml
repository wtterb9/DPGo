title: Kir Drax'in Bank
description: |-
  The Bank of Kir Drax'in, like nearly everything else in the city, is
  ordained and controlled by the church.  The bank itself is rather typical
  of church architecture, built with strong granite walls and kept tidy in
  appearance.  The bank appears to be staffed mainly by old priests and young
  acolytes, but you see a few women walking about, indicating that there must
  be some type of secular position available here.

zone: DarkPawns Kir Drax'in
title: Southern Wall Road
description: |-
  You walk along the narrow wall road in the south of Kir Drax'in. This
  is one of the poorest areas in the city, but people would still prefer
  to live here than risk life outside of the city walls.  The air here is
  thick with smoke from the incinerator at the city dump not far from here.
  The cobblestoned wall road continues to your east and west.

title: Western Wall Road
description: |-
  The cobblestoned wall road runs north and south between the high ramparts
  that compose the city wall of Kir Drax'in and the white washed walls and
  crumbling marble columns of the Kir Drax'in Arena. Despite being narrow and
  slightly unacommodating, the streets here look clean, safe, and relatively
  well trafficked.

zone: DarkPawns Kir Drax'in
title: Southern Wall Road
description: |-
  You walk down the narrow perimeter road that separates the city of
  Kir Drax'in from the thick, towering walls that protect it from the outside
  world.  There is a faded fresco on the wall of an old building to your north,
  its beauty, thought faded, stands in sharp contrast to the bleakness around
  you.  The perimeter road leads east and west.

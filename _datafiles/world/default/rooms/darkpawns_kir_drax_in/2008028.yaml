title: The Star Tavern
description: |-
  Despite its reputation, the Star Tavern seems mostly vacant, its few patrons
  are hollow eyed, elderly souls who dwell in the decrepit housing on this side
  of the city.  As you survey the delapitated tavern, you notice several shifty
  characters walking in and out of a room located down a short hallway in back
  of the tavern.  Wonder what could be going on in there?

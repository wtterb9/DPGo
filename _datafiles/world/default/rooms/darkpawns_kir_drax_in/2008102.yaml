title: The Street of Swords
description: |-
  The crowds walking north and south along this road are mostly men and
  women equipped with swords and a wide variety of other weapons.  You can
  recognize the large building to the west as the guard's barracks, home
  to the city guard that oversees the Church's rule of Kir Drax'in.

title: Southern Wall Road
description: |-
  You walk along the cobblestoned wall road.  The road bends and twists
  occasionally, accounting for differences in the wall and the buildings
  which doubtless predated it.  Here, some religious soul has drawn a large
  symbol of faith in white chalk on the side of a crumbling tenement.
  The perimeter road continues to your east and west.

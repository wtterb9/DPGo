title: Warrior Practice Room
description: |-
  This lonely stone barracks is where young men whose families are not wealthy
  enough to buy them positions in the Holy Guard go to be trained in the art of
  combat.  This school is famous for educating some of the most notorious rebels
  and mercenaries in history.  So famous in fact that the Holy Guard has even
  begun sending acolyte paladins here for the specific training only a
  mercenary school can offer.

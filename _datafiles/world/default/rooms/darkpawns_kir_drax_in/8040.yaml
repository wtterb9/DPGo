zone: DarkPawns Kir Drax'in
title: Western Gate
description: |-
  You stand before the western gate of Kir Drax'in, where the walls that
  protect the city part wide enough to allow the ancient stone road from
  the west to merge with the Market Street, which begins to form to your
  east.  Guards from the church stand ever-vigilant by the gates, inspecting
  each cart, beast and traveler with great care as they pass by.

zone: DarkPawns Kir Drax'in
title: Southern Central Square
description: |-
  Once, this square must have been a beautiful gathering place for the early
  citizens of Kir Drax'in.  Now, a few scant algae-ridden inches of water is all
  that remains in the broken fountain, and the ceramic tiles that must have
  once been so beautiful have been ripped up from the ground and smashed by
  countless vandals.  This square, just like the entire Southern District, seems
  to have fallen into disrepair.

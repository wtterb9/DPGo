title: The Street of Wizardry
description: "Colorful clouds of gases pour out of the apothecary to the west, drifting\nup
  and down the street and burning your nostrils with their acrid odor. The\nworn cobblestone
  street is black here from the heavy traffic that grinds the\nsoot and dirt into
  the stone. To the east rises a small tower, and you see \nmages of every alignment
  going in and out."

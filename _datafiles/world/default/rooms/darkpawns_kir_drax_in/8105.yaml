title: The Street of Wizardry
description: |-
  You are in the section of Kir Drax'in dedicated to the magical practioners
  who live in the city.  This narrow road is lined on both sides with various
  shops and other buildings housing establishments of mystical nature.  South
  of here, the street merges with the Avenue of the Gods.  To the west, wide
  steps lead up to the Temple of the Cross.

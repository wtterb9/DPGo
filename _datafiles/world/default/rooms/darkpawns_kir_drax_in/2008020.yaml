zone: DarkPawns Kir Drax'in
title: Northern Wall Road
description: |-
  You stand on a narrow cobblestone road which separates the city of Kir
  Drax'in from the high ramparts that protect it.  The tall stone tower to
  your southwest seems to mark the edge of the temple district.  You notice
  that the buildings here change from ornate structure to more dull, sterile
  buildings that are a hallmark of a modern city.  The wall road runs east
  and west.

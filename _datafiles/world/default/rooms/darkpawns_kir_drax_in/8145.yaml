title: A Private Garden
description: |-
  You stand in a small square garden which has been secreted away in a court
  of this temple.  High above your head a glass skylight shield this garden from
  the elements.  All of the flowers and trees look fresh and healthy, and the
  air is magically cool.  You may leave the garden through an ivy-covered marble
  arch to the north.

title: Northern Wall Road
description: |-
  You stand on the wall road which separates the city of Kir Drax'in from
  the towering bulwark that protects it.  The road is especially narrow here
  as it passes between the city wall and the walls of the arena.  This road
  must be for pedestrian traffic only.

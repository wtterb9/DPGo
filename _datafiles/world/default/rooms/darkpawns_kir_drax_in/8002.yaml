zone: DarkPawns Kir Drax'in
title: Northern Wall Road
description: |-
  You are at the northern part of the wall that surrounds the city. To
  the south lies the massive spire-topped temple, and to the east and west
  the wall bends southward. The rough, chiseled stone of the wall rises
  high above you, but to the east you can see a few treetops above the
  bits of glass and pottery inset into the wall's top surface.

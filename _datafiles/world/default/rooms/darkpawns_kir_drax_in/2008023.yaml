title: Northern Wall Road
description: |-
  You stand on the northern perimeter road of Kir Drax'in. There is
  relatively little traffic here, as the wall road is usually only used by guard
  patrols and servants on errands.  There seem to be many scantily glad girls
  walking along the wall road though, which makes you think that people may be
  doing other kinds of errands here as well.

zone: DarkPawns Kir Drax'in
title: Eastern Gate
description: |-
  You are standing at the eastern gate of the great city of Kir Drax'in,
  where the massive defensive wall that forms the city's perimeter opens
  enough to allow passage for the steady stream of people who go in and out
  of the city at all hours of the day.  The bustle of the Kir Drax'in Market
  begins just west of here, and to the north and south a narrow wall road
  leads to other sections of the city.

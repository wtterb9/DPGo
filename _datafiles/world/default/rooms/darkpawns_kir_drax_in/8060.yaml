title: Southwestern Wall Road
description: |-
  This is the southwest corner of the wall road that runs the perimeter
  of Kir Drax'in.  Some garbage and other refuse has been piled into a corner
  here, and the walls look as though they were blackened by a fire long ago.
  The narrow and dimly lit wall road leads to the north and east.

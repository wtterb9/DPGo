title: In the Lakeshore Tavern
description: |-
  You are standing before a roaring fireplace in the Lakeshore
  Tavern. The warmth of the fireplace is very comforting, as is the
  general atmosphere of the tavern. It's no mystery as to why so
  many people like to come here.
     Just south of here, the back door of the tavern leads out to
  the docks.

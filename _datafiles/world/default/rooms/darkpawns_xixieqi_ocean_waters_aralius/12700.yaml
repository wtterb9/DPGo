title: On the Ocean
description: "The wide ocean spans across your sight, making you lose all \nsense
  of direction.  As you float above the surface, currents \ncrash into you, forcing
  you to pay attention to the water's \nmotion.  Breezes rush past you, spraying you
  with bits of red\nseaweed.\n   A small pier lies to the south, where the ocean meets
  the\ncoastline.  A city rises high above the pier, where foreign\nships dock and
  disembark, loading and unloading their wares."

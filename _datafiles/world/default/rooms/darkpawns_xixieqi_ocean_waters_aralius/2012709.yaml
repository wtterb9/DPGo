title: A Rocky Coast
description: "Here, otters and terns circle, splashing happily into the \nocean.  You
  marvel at the schools of perch that streak through\nthe ocean as though they were
  birds sailing in the air.  Gales \nrush past you, pummeling you with spray and bits
  of flotsam. \n   To the south a rocky coast emerges, boasting a small city\nthat
  rises high on top of it.  The coastline appears to be \ndangerous, and impossible
  to dock upon, however, especially\nfrom the height of the crashing waves."

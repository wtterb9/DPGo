zone: DarkPawns (25-30) Amber (HC)
title: Stream Under A Fallen Tree
description: |-
  You are splashing around in a shallow stream.  Just above your head is a
  fallen tree that crosses the stream.  The stream gets rockier towards the
  east, where you can see rapids, and seems to be calm west of here.  The
  north and south banks appear to be too steep to climb.

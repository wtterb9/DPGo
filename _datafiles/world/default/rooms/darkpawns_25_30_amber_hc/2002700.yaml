title: A Clearing In The Forest Arden
description: |-
  You stand in a small clearing in the huge and primal forest of
  Arden. All other forests you've ever seen were mere shadows of this
  great wood. It appears dangerous and is rumoured to be the favorite
  hunting grounds of Julian, a Prince of Amber. Beware that you don't
  become his prey.

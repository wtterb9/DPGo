title: Tall Trees In Arden
description: |-
  Beautiful, healthy oaks and pines dominate the woods here.  All around
  you, birds and squirrels chitter in their endless banter as they build
  nests among the tall branches above.  The forest extends in all directions,
  save the south, where a stream cuts through the forest.

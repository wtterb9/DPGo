title: The Grand Lobby
description: |-
  You're in the lobby of the Grand Hotel and you've never seen such a
  lavishly decorated room. Gold curtains hang upon marble columns, large
  oil paintings adorn the walls, the carpet is deep burgundy in color and
  very plush. There is a stair here going up. The Grand Niteclub is west;
  the Grand Dining Room is south.

nouns:
  battered: ":gates"
  door: "There is a small plaque placed upon this door."
  gates: "The gates are huge and imposing."
  plaque: "The plaque reads:
   \"Enter, gentle traveller, to the Hall of Wonders.  This collection
is my gift to you and ALL who would come see it.
-- King Seilon\""

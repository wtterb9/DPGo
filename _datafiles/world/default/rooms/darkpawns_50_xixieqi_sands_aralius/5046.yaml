title: "Caravan Road"
description: |-
  You are standing on a caravan road that winds through the desert.
  Desert winds blow across the sand, carrying the faint scent of the
  blooming cacti and salt.  Even from here, the scent of salt tells 
  you that there must be salt flats nearby.
     The desert continues to the east and west, split only by this
  small road that runs to the north and south.

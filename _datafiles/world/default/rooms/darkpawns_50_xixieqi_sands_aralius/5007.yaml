title: "Saltfall"
description: |-
  You are wading through a sandfall.  Here, flowing salt from the heat-
  risen flats to the south and east flow over the cliff and into the water
  to the west, forming an enormous white sandfall.
     The flats continue to the east and south while the desert becomes more
  sandy to the north.

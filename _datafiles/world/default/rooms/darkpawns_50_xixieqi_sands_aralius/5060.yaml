zone: Xixieqi Sands (Aralius)
title: "Parched Sands"
description: |-
  Strange sandstone monoliths appear just to the east as you trudge
  through this patch of dry sand.  A few bursts of hot wind blast into
  you, filling your nose and stinging your eyes with sand as the desert
  zephyrs draw the energy from your body.
     The desert stretches in all directions, save northwest, where a 
  city appears on the horizon, and the distant west, where a caravan
  road leads north and south through the desert.
     To the north lies a vest stretch of yellowish sand that seems to
  run parallel to the northwestern city and leads to the coast.  Even
  from here you can smell the brine of sea salt.

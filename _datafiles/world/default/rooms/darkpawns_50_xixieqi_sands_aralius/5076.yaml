title: "Parched Sands"
description: |-
  You are standing on the edge of a parched desert.  Desert winds blow
  warmly across the sand, carrying the faint scent of blooming cacti and
  salt.  The scent seems to be stronger from the south.
     The desert continues to the north, south, and west, becoming more
  fertile in the grasslands just east of here.

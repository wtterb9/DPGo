zone: Xixieqi Sands (Aralius)
title: "Parched Sands"
description: |-
  Strange sandstone monoliths appear on the northern horizon as you
  traverse this patch of dry sand.  A few wind clouds blast into you,
  filling your nose and ears with stinging grains as hot winds draw
  the energy from your body.
     The desert continues to the west and south, and seems to slope 
  gently upward as it ends at the hills to the west.

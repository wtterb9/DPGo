zone: Xixieqi Sands (Aralius)
title: "Desert Overlook"
description: |-
  You stand parched amidst the shifting, burning sands of Xixieqi.  Here,
  a few desert cacti provide meager shade for the white, eyeless desert voles
  that live within the spiny, pulpy interior.
     To the north, south, and east, the desert continues, while off to the
  northwest, the burnt-sienna sands stretch toward the ocean, separated only
  by a tall cliff that overlooks the ocean to the west.

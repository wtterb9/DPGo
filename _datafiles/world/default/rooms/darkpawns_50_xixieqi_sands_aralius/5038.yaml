zone: Xixieqi Sands (Aralius)
title: "Salt Flats"
description: |-
  Here, the desert sands and silt have given way to broad flats of
  natural salt.  Chunks of the hardened stones lay caked across the
  desert, some cracked and rising above the surface to form hazardous
  obstacles across which to walk.
     A desert road appears to the east, splitting the salt flats, while
  a grassy field marks the border of the flats to the south.  The flats
  themselves continue to the north and west.

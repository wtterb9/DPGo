roomid: 5031
zone: Xixieqi Sands (Aralius)
title: "Dunes"
description: |-
  Sands shift and move in waves here as the strong desert winds pile
  the burning grains into amorphous dunes.
     Beneath the moving dunes, a few desert rodents leave raised paths
  that make the surface of the sands appear to be alive with pulsing
  veins and arteries.
     Far to the north, you can see a walled city.  The desert sands 
  sloped against it, giving the appearance of a city rising from the
  desert floor.  The desert continues in all other directions, while
  a caravan trail cuts through it to the east.

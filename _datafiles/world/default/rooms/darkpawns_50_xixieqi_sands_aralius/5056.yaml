title: "Parched Sands"
description: |-
  You are just west of a caravan road that winds through the desert.
  Desert winds blow across the sand, carrying the faint scent of the
  blooming cacti and salt.  The scent seems to be stronger from the 
  south.
     The desert continues to the east and west, split only by this
  small road that runs to the north and south just west of here.

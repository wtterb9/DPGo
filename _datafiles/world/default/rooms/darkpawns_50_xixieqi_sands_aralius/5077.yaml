zone: Xixieqi Sands (Aralius)
title: "Salt Flats"
description: |-
  Here, the desert sands and silt have given way to broad flats of
  natural salt and, to the east, wide fields of grass.  Chunks of the
  hardened salt bricks lay caked across the desert to the west and south,
  some cracked and rising above the surface to form hazardous obstacles
  across which to walk.
     The desert continues to the north and northwest while the salt flats
  continues to the south and southwest. 
     A grassy field lies to the east.

title: "Captain's Chambers"
description: |-
  As you enter the cabin's inner sanctum, you see to your right a large
  richly decorated bed, covered in mold and in a terrible state of decay.
  Against the right wall rests what appears to be a broken desk and rotted
  chair setting by it.  Ancient medallions and parchments line the walls and
  floor, either earned or stolen, the truth lost to time.  Your senses tell
  you that you have found the chambers of this vessel's captain...

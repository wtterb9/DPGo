title: "Main Deck"
description: |-
  As far as the eye can see beyond this vessel is an ethereal blue glowing
  mist.  Your every sense tells you to avoid jumping over the edge of the
  boat.  Thank the fates there is an old, rickety wooden barrier to prevent
  your fall into the stygian mists below.  Beside you, a plank is extended
  out toward the strange unknown, and blood is splattered all over the end
  opposite where you are currently standing...

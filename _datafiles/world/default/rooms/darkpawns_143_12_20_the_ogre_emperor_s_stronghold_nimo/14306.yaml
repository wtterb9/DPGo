roomid: 14306
zone: (12-20) The Ogre Emperor's Stronghold (Nimos)
title: "Slave Pens"
description: |-
  This chamber is rectangular, and has clearly been carved out of the living
  rock. There are doors in the north, east and south walls. Huddled in the room
  are several ragged, starved-looking men, chained together and watched over by
  two ogres.

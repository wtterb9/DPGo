roomid: 14309
zone: (12-20) The Ogre Emperor's Stronghold (Nimos)
title: "Beetle Farm"
description: |-
  This narrow chamber is lit by a reddish glow. The floor is covered by a thick
  layer of debris, and you can see several huge beetles -- each nearly a yard 
  long -- moving about in the rubbish. Each beetle has three glowing lights --
  one on either side of the head, and one near the back of it's abdomen.

title: Jungle Foliage
description: "You are standing at the border of a tropical jungle.  Tall, leafy\ntrees
  - typical of rainforests - drip their condensing moisture on the\nground here, forming
  small puddles of water.\n   The elevation seems to rise a bit to the south, as the
  savanna lands\nto the north give way to the mountainous rainforests to the south.
  \ \n   From somewhere to the far southwest, you can hear the rushing of \nwater,
  but you cannot penetrate the jungle to investigate it."

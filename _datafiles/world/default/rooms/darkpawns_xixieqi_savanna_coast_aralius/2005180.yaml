title: Savanna Mounds
description: |-
  You are standing amid buzzing insects that seem to be digilently
  adding mud to the already tall spires of their nests.  The ground
  is moist and fresh, allowing the grasses and trees to grow tall and
  colorful.
     The savanna continues to the north, growing arid as you head to
  the west.  To the east the grasses seem to retain their color, while
  to the south, the foliage becomes extremely dense and jungle-like.

title: Savanna Grasslands
description: |-
  You are wading through a field of tall grass.  The air is dry here,
  the moisture absorbed by the plants around you.  A few patchy mounds
  lie nearby, probably insect-constructed and offering nothing in terms
  of elevation or interest.
     The savanna continues in all directions, growing more colorful and
  bright as you head north toward the coast.

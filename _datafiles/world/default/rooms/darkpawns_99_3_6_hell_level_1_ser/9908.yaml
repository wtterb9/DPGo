title: "Hellish Tarpits"
description: |-
  Ichor bubbles in black pools here, spewing and churning in violent
  eruptions that splatter the cavern floors with an acidic rain.  Minor
  devils and similar semi-living beasts force manes into the bubbling
  pits, driving them to scream in terror and agony as the vanish into 
  the pools.
     Exits lead to the east, west, and south, but none of the exits
  appear to lead to safety.

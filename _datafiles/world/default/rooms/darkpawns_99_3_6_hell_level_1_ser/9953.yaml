title: "A Narrow Tunnel"
description: |-
  To the east this narrow tunnel opens up into a vast cavern, and to the west
  it seems to widen slightly. The sharp tunnel walls tear at your flesh and
  clothes, and under your feet the ground is covered in a fine layer of black
  dust. From the west you can here ecstatic moans mixed with screams of terror.

title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the ocean. 
   As you float above the surface, currents crash into you, forcing 
  you to pay attention to the water's motion.  On the water's 
  surface, you note seaweed floating at the mercy of the sea beside 
  you.

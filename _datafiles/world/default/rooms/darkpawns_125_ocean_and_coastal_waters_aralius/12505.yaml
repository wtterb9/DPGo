title: "On the Ocean"
description: |-
  Here, otters and manatees circle, splashing purposely into the 
  sea.  You marvel at the schools of salmon that streak through the 
  sea as though they were birds coating in the air.  In the 
  distance, you can see the foam of a broken sea waves.

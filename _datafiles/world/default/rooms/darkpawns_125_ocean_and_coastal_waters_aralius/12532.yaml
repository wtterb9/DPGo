title: "On the Ocean"
description: |-
  Here, otters and gulls sail, splashing purposely into the sea.  
  You marvel at the schools of salmon that streak through the water 
  as though they were birds coating in the air.  In the distance, 
  you can see the foam of a broken water eddies.

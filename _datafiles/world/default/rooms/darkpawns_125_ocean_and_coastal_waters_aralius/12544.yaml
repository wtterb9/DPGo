zone: Ocean and Coastal Waters (Aralius)
title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the water. 
   As you float above the surface, eddies crash into you, forcing 
  you to pay attention to the water's motion.  Gales rush past you, 
  spraying you with foam and bits of driftwood.

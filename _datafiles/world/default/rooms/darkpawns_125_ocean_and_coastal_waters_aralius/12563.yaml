title: "On the Ocean"
description: |-
  You are floating above the churning surface of the ocean.  As 
  you float across the sea's surface, you note your reflection 
  below, waving with the eddies.  On the water's surface, you note 
  flotsam floating at the mercy of the sea beside you.

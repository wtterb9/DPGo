zone: Ocean and Coastal Waters (Aralius)
title: "On the Ocean"
description: |-
  Here, otters and terns skim, splashing dutifully into the 
  water.  As you float above the surface, eddies crash into you, 
  forcing you to pay attention to the water's motion.  Gales rush 
  past you, hitting you with crest and bits of seaweed.

title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the sea.  
  Your lips sting as the spray highlights you, bringing tears of 
  pain to your eyes.  Zephyrs rush past you, pummeling you with 
  froth and bits of driftwood.

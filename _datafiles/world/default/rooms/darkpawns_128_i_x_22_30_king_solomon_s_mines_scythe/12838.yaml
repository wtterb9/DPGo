title: "Another Passage"
description: |-
  Once again, you stand in a passageway.  There is plenty of clearance
  on all sides in this passageway and there seem to be some more signs of recent
  life in here.  There are several large holes scattered about in the walls of
  the passage.  There are also some mining instruments lying around on the
  floor.  You wonder if the owner is still around...  Exits lead to the west
  and to the south.

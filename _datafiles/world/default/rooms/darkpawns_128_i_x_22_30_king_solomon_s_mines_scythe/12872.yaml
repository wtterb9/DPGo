title: "A Large Room In The Tomb"
description: |-
  This room is rather large and rather empty.  There are no signs of
  life except for some footprints leading through a door.  You wonder what
  passed through there recently and if it is still alive.  To the east lies a
  large steel door and to the north lies the cockroach room.

roomid: 12841
zone: (I) (X) (22-30) King Solomon's Mines (Scythe)
title: "A Small Cavern"
description: |-
  As you emerge from the passageway, you notice you are in a small
  cavern.  In the corner there are some beds of straw and in the center of
  the cavern is a smoldering campfire.  Whoever was camping here was here
  VERY recently.  Exits lie to the east and to the north.
mapsymbol: #
biome: house
tags: [indoors]
exits:
  north:
    roomid: 12842
  east:
    roomid: 12840
nouns:
  bed: "These beds appear to have been slept in recently.  They do not look very
comfortable."
  campfire: "This smoldering campfire was just put out not too long ago.  Lighting a
campfire inside of a mine with no ventilation is definitely not the sign
of an intelligent being.  Nevertheless, they were here recently."
  fire: ":campfire"
  straw: ":bed"

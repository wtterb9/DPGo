title: "The Entrance To The Demon's Lair"
description: |-
  You stand in a large cavern in front of what looks like a lair of
  some sort.  You feel EXTREMELY uneasy standing here.  The evil power
  emanating from this lair is very strong.  It feels as if it is going to
  engulf you.  There are many skeletons littering the area indicating that
  you are not the only person ever to think of entering this lair.  Obviously
  for these past adventurers that was probably their last thought ever.
  Exits lead to the west and the lair or to the south and back into the passage.
  It is too dark to see into the lair.

roomid: 4313
zone: Rotherwood Manor
title: "A fortified barbican"
description: |-
  You stand within a barbican constructed over the entranceway into
  Cedric's manor.  The room is circular and consists of solid stone,
  except for a series of murder holes in the eastern wall which provide
  a vantage point for archers to defend against potential attackers.
  The furnishings are sparse, in typical military fashion.  Exits lead
  north and south along the wall, and a ladder leads down into the courtyard.
  Two powerful ballistae have been stationed at large murder holes for defense.

roomid: 4322
zone: Rotherwood Manor
title: "A bountiful pantry"
description: |-
  The fruits of Cedric's enforced slave labor abound in this
  corner of the manor complex.  Bales of wheat and sacks of oats,
  grains, and starches are stacked in a chaotic manner about the
  wooden floor, leaving nary a space for proper walking.  There's
  enough food here to last the manor for months if besieged.
  A pulley and a ladder lead up to the scullery, and doors open
  west to the spicery, east to the poultry, and south to the
  saucery.

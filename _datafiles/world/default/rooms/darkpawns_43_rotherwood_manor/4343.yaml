zone: Rotherwood Manor
title: "A Peaceful Green Streamside"
description: |-
  This is a small area of greenery and shade between the manor to the
  south and a stream to the north, flowing alongside the mountains. Men
  fish along the stream, joking and talking.  Serfs have fallen to
  sleep under the cool shade of a few dogwood trees.  You can hear a
  gentle tune being played by a duo somewhere nearby with a mandolin
  and pan flute.  The smell of flowers, the beauty of light reflecting
  off the water, and the grass blowing gently in the wind make you a tad
  inclined toward a rest as well.

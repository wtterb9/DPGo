title: "On top of the wall"
description: |-
  This stretch of wall connects the barbican above the portcullis and the
  guard tower to the south.  The ramparts are strong here, several layers of
  stone able to resist even mangonels.  Although modest in size, Cedric's
  quadrangular castle is compact and sturdy.  A sweeping view of
  the plains beyond Cedric's walls is offered from this spot.

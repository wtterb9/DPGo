zone: Rotherwood Manor
title: "The Saucery"
description: |-
  This is a small area responsible for the preparation of sauces.  The
  ingredients, mixing bowls, and vats of the finished product fill the
  meager open spaces of the room.  Kitchen hands scurry about,
  assisting the saucerer in preparing for the next feast.  The saucery
  smells strongly of ripened herbs, and the air is hot and thick from 
  the smoke of boiling gravy.  Doors lead north to the larder, west to
  the wine cellar, and east to the poultry.

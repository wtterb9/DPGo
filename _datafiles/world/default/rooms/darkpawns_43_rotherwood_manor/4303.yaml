title: "A peaceful vineyard"
description: |-
  You stand within a great assortion of grapevines, arranged in
  perfect rows by the peasantry.  Stands have been erected to guide
  the vineyards to their ultimate growth.  The air smells of sweet grapes,
  fermenting in the golden sun.  A thorny palisade to the north keeps the
  peasants working the fields without hope of a better life, hemming in their
  dreams by blocking the thought of freedom outside the walls.

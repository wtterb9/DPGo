title: "The Main Kitchen"
description: |-
  This is one of the larger rooms in Cedric's manor, and the
  culmination of the ancillary food preparation rooms.  Here,
  the ingredients assembled below are cooked in cauldrons over
  open flames and prepared on a long counter by several kitchen
  hands.  The floor is tiled, clean, and swept frequently.
      A wonderful assortion of smells waft up from the various
  dishes being prepared.  The area is incredibly busy, with
  most of the traffic coming and going through the buttery to the
  west toward the main dining hall.

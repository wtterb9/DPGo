title: "Along the walls of Cedric's manor"
description: |-
  You stand atop a mighty wall of stone which provides the
  exterior protection for the manor of Cedric the Saxon.
  The ramparts along the walls extend outward to project
  maximum firepower upon any besiegers who think themselves
  capable of capturing these noble walls.  The walkway
  exits into guard towers to the east and west.

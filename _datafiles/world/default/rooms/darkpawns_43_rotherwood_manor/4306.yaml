nouns:
  basket: "This is a sturdy wicker basket filled with shiny red apples.  The fruit
is top quality, as any rotten apples have been separated out to be used as
feed."
  trees: "What, you never seen apple trees before?  It's got a trunk, branches, leaves,
and apples.  Go figure!"

zone: Rotherwood Manor
title: "Entranceway to the manor"
description: |-
  The fields of Cedric end here in a small grassy patch before an
  iron portcullis to the west which leads into Cedric's castle.  Sturdy
  walls of stone run north and south, and above the portcullis lies the
  coat of arms of Cedric's family.  Two stone lions flank the gate,
  and a smattering of men stand here guarding it.  To the north, south,
  and east are the manorial lands of Cedric.

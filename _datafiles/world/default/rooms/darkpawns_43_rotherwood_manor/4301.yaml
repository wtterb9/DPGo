title: "A field of wheat"
description: |-
  You stand at the edge of the estate of Cedric the Saxon, just inside the gate.
  A field of wheat lies here, sorted into carefully cultivated rows.  Filthy
  farmhands toil about in quiet solemnity.  Wind whistles through the wheat,
  across the still and endless prairie.  To the east, the gate leads to
  freedom from this place, and in all other directions lie Cedric's lands.

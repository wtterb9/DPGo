roomid: 4325
zone: Rotherwood Manor
title: "The Chandlery"
description: |-
  This area in the underbelly of Cedric's manner is responsible for making 
  candles, and storing candles and wax.  The air is thick with an 
  indistinguishable chemical smell, and dried drops of wax litter the
  floor. All manner of candles rest unlit on the walls, ready to be placed in 
  candelabra throughout the manor, serving the crucial role of providing light 
  in the otherwise dark mansion.  Openings in the wall lead west to the larder 
  and south to the poultry.

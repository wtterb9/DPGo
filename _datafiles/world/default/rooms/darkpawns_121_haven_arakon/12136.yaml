roomid: 12136
zone: Haven (Arakon)
title: "The Vault within the Guild"
description: |-
  You can see why the guild members where uneasy as you approached the door
  to this back room...it's full of loot! Unfortunately, most of it is contained
  in locked chests and you wouldn't have time to grab any of it before you
  were forcibly removed from here. There are a few loose items that you could
  hide on your possession, however.
mapsymbol: #
biome: house
tags: [indoors]
exits:
  west:
    roomid: 12120
    lock:
      difficulty: 5
nouns:
  chests: "All of them are securely locked, some bound with multiple chains and
padlocks...except for that one over there on the floor."
  items: "What you see is what you can get!"
containers:
  oak_12106:
    lock:
      difficulty: 1

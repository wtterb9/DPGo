zone: Haven (Arakon)
title: "The Drunken Jig Inn"
description: |-
  A small group of merchants sits in deep discussion in this corner of the
  inn but unfortunately the noise from the drunk patrons prevents you from
  hearing what is being said. You almost trip over one of the tables as you
  attempt to get closer and decide in the end it's not worth the trouble.
  To the north, sailors continue to stream into the inn from the town and it
  won't be long before it will be standing room only.

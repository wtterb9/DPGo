title: "The Gates of Haven"
description: |-
  A set of iron gates to the south marks the entrance to the coastal town
  of Haven, renowned for its trade prowess, sea-fairing population and chance
  to make some quick gold. Looking to the north, you can see a dirt road
  disappear into the surrounding forest. A cobblestone road begins at the gates
  and extends well into the town.

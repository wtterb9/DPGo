roomid: 12108
zone: Haven (Arakon)
title: "The Town Square"
description: |-
  The town square is central to Haven and provides a meeting place for the
  local inhabitants, as well as a social area for the many creatures that
  frequent the area. Several benches on the perimeter of the square form a loose
  circle around a small, wooden platform in the middle of the street. A number
  of traders have set up makeshift stalls along the edge of the street, each
  trying to get your attention in an effort to sell their goods.
     A signpost on the corner of the square points southward to the town docks
  and east to Guild road.

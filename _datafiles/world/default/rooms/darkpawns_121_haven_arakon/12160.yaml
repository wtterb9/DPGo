title: "Haven Bay"
description: |-
  Something in the water brushes past your leg and you spin around wildly
  trying to see what it was. Unfortunately, the murky depths keep it hidden
  from sight. Ships sail awfully close by as they berth at one of Haven's docks
  which you can climb onto to the north.

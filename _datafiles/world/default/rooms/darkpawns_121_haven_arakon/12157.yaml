roomid: 12157
zone: Haven (Arakon)
title: "An Abandoned Building"
description: |-
  Looking around you could be forgiven for simply walking straight back
  out. The place is an absolute mess! Sunlight hasn't entered this place since
  the roof was put on and a thick layer of dust has settled on the floor. Crates
  are littered throughout, surrounded by a number of footprints that all lead
  to the doorway to the north.
     The curtain covering the doorway must have a purpose, but you cannot see
  an immediate one.
mapsymbol: .
biome: city
exits:
  north:
    roomid: 12156
nouns:
  crates: "The majority of them are rotting and have broken apart, but you pry one of
the newer ones open and are surprised to see it packed full of illicit drugs.
What better place to store them in a rarely frequented area of town."
  curtain: "It is rather thick and heavy, almost acting like a door."

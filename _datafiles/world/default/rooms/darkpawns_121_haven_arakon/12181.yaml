title: "A Gambling Den"
description: |-
  You wander around the casino amidst a mass of frenzied people shouting
  at each other in a myriad of different tongues. In this corner of the room
  there are several craps tables set up, all of them surrounded by eager
  patrons gambling their money away. You can't help but keep checking for your
  coin purse every few minutes or so, thinking that it may have gone missing
  with all these seedy characters around you. Maybe you are too paranoid...maybe
  not.

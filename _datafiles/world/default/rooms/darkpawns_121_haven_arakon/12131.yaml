zone: Haven (Arakon)
title: "The Boardwalk"
description: |-
  The eastern dock extends into Haven bay to the south of here, while the
  boardwalk continues to the west. A set of stairs connects the boardwalk to
  a secluded beach further to the east while another merchant's store lies to
  the north.
     Waves splash into the dock pylons, shaking the boardwalk ever so
  slightly.

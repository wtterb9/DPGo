zone: Haven (Arakon)
title: "On a Beach"
description: |-
  Waves lap softly at the shore of this small beach, only a quick walk from
  the town of Haven. It is not used for recreation, although the waters of
  Haven bay are both warm and sheltered. To the north, two large clay dunes
  provide raw building materials and it is for this reason the beach exists.
  Over time, enough clay has been removed to reach a layer of sand upon which
  you now stand.
     To the west, you can see the port area of Haven which can be accessed by
  a wooden boardwalk.

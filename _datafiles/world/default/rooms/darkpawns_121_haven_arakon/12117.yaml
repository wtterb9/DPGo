zone: Haven (Arakon)
title: "The Guild of the Merchants"
description: |-
  You stand in a small foyer which marks the entrance to the Guild of
  Merchants, a collection of traders from various ports around the world. Your
  intrusion into their lives is tolerated as your explorations are well known
  by the guild members.
     The guild is well furnished and contains all manner of artwork, fine
  pottery and exquisite hand woven rugs, obviously collected from long voyages.
  Small groups of merchants are huddled around the room deep in conversation
  about the next journey to be undertaken. The Guild Road lies through the door
  to the north.

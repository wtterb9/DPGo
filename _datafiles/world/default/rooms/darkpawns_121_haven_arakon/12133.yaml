title: "A Spice Store"
description: |-
  Spices, spices and even more spices. These items have been brought here
  from afar in an attempt to liven up the otherwise staple diet of fish that
  the majority of the citizens and visitors to Haven are treated to. The
  merchant is very enthusiastic about his goods and does everything except
  steal from you to get you to stay in his store. The docks of Haven are through
  the doorway to the south.

zone: Haven (Arakon)
title: "Haven Bay"
description: |-
  You could float here all day, the soothing bay waves lapping at you softly.
  You have to be careful not to get pushed too close to the docks east and
  west of here with all of the loading and unloading of cargo. Glancing down
  into the depths of the bay, you can see where several crates and barrels have
  fallen from above and settled on the sandy bottom.

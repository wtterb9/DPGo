zone: Haven (Arakon)
title: "Haven Bay"
description: |-
  If only you had the time to lounge around in the shallows of Haven bay
  all day...but surely you have other things you could be doing! As you approach
  the breakwater to the east, you can hear the sound of the ocean waves crash
  into the other side, grateful that the bay is protected from such harsh
  conditions.
     You can wade out of the bay if you wish and relax on the beach to the
  north.

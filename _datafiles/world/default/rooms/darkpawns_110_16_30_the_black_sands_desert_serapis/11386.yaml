zone: (16-30) The Black Sands Desert (Serapis)
title: "The Top Of A Hole"
description: |-
  You stand precariously at the edge of a hole slightly larger than your
  shoulders.  You could probably drop yourself down safely, but it would be 
  a rough landing and you would have to be skilled at climbing to get back
  up.  The stone walls are actually glistening with moisture now - the first 
  signs of water you've seen outside the desert.

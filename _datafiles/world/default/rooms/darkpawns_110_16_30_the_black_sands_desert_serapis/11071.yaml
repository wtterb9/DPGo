title: "North of the Enormous Dune"
description: |-
  South of you is an enormous sand dune, not quite tall enough to shelter
  you from the heat of the sun that bakes your skin.  East and west of you
  stand huge marble sphinxes. 
     Oddly, they seem to be watching you.

roomid: 11389
zone: (16-30) The Black Sands Desert (Serapis)
title: "A Dead End"
description: |-
  The tunnel comes to a sudden halt behind the dried up form of a mummified
  elf.  The corpse looks as though it would disintegrate if disturbed. Above the
  head of the figure is some writing carved into the stone.
mapsymbol: #
biome: house
tags: [indoors]
exits:
  west:
    roomid: 11388
nouns:
  writing: "Written in an ancient form of the common language, you see the words:
                      Beware the Uamphyri!
     Your blood is their life, and your life is taken easily.
                      Beware the Pagan Hordes!
     Your possessions are your mark, and their mark is of the Beast.
                      Beware the Cruel Gods!
     Your actions are noted in heaven, and punishment is swift."

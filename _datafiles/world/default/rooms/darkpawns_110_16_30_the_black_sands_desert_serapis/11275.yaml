roomid: 11275
zone: (16-30) The Black Sands Desert (Serapis)
title: "On The Raspberry Moon"
description: |-
  You are on a HUUUGE raspberry, which has a somewhat moon-like appearance.
  It hangs by a particularly thin thread from the nearby firmament.  You get a
  feeling of overwhelming sadness as you notice the complete absence of light,
  fluffy cream.
mapsymbol: #
biome: house
tags: [private]
exits:
  down:
    roomid: 11274
nouns:
  cream: "There is none
>
You sniff sadly."
  firmament: "It stretches unendingly in all imaginable directions. You soon come to the
unavoidable realization that you cannot possibly hope to comprehend even
the minutest fraction of its endless complexity."
  thread: "It hangs from a small pin, loosely fastened in the firmament. The thread is
almost infinitesimally thin, and your mind boggles at the question of how
this intricate construction can possibly maintain its worldly existence,
in defiance of all physical and unavoidable laws ever invented."

title: Inside the Lakeshore Tavern
description: "You are standing just inside the Lakeshore Tavern, gathering place of
  many\nheroes and adventurers of legend. The common room that you are standing in
  \nhas a warm friendly look. The rough stone walls hold portraits of many of the\nfamous
  people who have patronized this place at some time or another. Tables\nand chairs
  surround you to the north and east, some filled with chattering\npeople.  \n   South
  of here, some stairs lead to what must be the guestrooms, while the\nbar lies to
  the southeast."

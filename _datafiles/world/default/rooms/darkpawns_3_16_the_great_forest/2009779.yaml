title: The Forest
description: |-
  You are standing in the great forest. Huge trees tower into the sky in all
  directions. You can see a large lake through the trees to the northeast, and
  a swiftly flowing river to the southwest.
     Occasionally, you can see the head of a beaver poking its head from the
  river's surface.

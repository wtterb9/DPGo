zone: DarkPawns (3-16) The Great Forest
title: The Shores of a Lake
description: |-
  You are on the shores of a lake that spreads out to the north and west
  of you.  Sticking out of the shallow water near the edge of the lake are
  scores of cattails and lilipads.  Every once and a while, a small patch
  of plants moves, revealing the location of scurrying wildlife.

title: The Forest
description: |-
  You are traveling along a small path running through a forest of tall,
  majestic trees that continue as far as you can see. Not far to the west,
  just above the treetops, you can see a rugged mountain range climbing
  into the sky.
     The path continues to the north and east, though you can hack your way
  through the shrubs in any direction.

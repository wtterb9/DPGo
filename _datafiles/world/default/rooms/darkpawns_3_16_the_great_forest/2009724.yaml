title: The Forest
description: |-
  You stand in the midst of a endless forest of tall pines.  The huge trees
  tower into the sky in all directions.  The ground rises immediately to your
  north into sharp cliffs which form the beginnings of a mountain range.
  There seems to be a rather large cave in the cliffs to your north.

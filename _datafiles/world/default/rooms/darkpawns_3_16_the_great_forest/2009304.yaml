zone: DarkPawns (3-16) The Great Forest
title: The Coast
description: |-
  You stand at the edge of the great forest on the coast of an ocean that
  spreads as far as the eye can see. Here, a natural spring bubbles up from
  a jumble of rocks in the forest, trickling into the ocean as a rivulet.
     The coast continues to the north and south.

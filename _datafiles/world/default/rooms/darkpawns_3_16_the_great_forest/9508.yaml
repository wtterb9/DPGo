zone: DarkPawns (3-16) The Great Forest
title: Deep within the Forest
description: |-
  The trees grow thick in this part of the woods, swallowing up any
  luminescence, and plunging you into nigh-eternal green twilight. All
  around, you see a huge mountain range rising into the sky.  To the
  north a break in the trees marks the base of a tall, rocky mountain.

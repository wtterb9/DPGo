title: The Great Western Road
description: |-
  You are traveling on the Great Western Road. The cobblestone road looks
  ancient, but the wear and tear is minimal due to the regular maintenance.
  A forest flanks the road to the north and south, forming an open, alpine
  canyon toward the mountain range that rises to the west.
     A small path leads off the road and into the forest to the north. Some
  animal tracks appear in the dirt of the path.

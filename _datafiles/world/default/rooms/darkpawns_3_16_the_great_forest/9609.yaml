title: The Forest
description: |-
  You are traveling along a small path running through a forest of tall,
  majestic trees.  The peaks of a distant mountain range cover the horizon
  to the west, casting shadows on the pines and swallowing them in a cloak
  of dark green.
     To the south, the path ends at a well-maintained road, while to the
  north, the path continues.

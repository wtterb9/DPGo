zone: DarkPawns (3-16) The Great Forest
title: A Canopied Cove
description: |-
  You are standing under a tall pine tree where the coast meets this
  rocky cove. Leafy branches lie floating atop the briny grasses and mats
  of brown pine needles, forming an ideal nesting site for a family of
  sea ducks.
     The coast continues to the east and south, while the thick forest
  stretches to the west and north.

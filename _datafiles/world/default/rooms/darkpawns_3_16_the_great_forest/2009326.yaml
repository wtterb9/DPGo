zone: DarkPawns (3-16) The Great Forest
title: The Coast
description: |-
  You stand at the edge of the great forest on the coast of the eastern
  ocean that stretches to the horizon. Gulls and terns shriek overhead as
  they vie with the forest jays for nesting space above you, in the canopy
  of trees.
     The wooded coast continues to the west, where it curves southward to
  form a small cove.

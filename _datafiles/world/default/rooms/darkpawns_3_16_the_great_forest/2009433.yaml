zone: DarkPawns (3-16) The Great Forest
title: The Forest
description: |-
  This part of the forest is less thick than the rest, and you can see
  quite clearly through it.  To the west, through the branches, you can
  easily see the shores of a lake while to the east, ironwood trees rise
  high, blanketing the forest floor in shadow.

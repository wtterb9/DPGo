zone: DarkPawns (3-16) The Great Forest
title: The Coast
description: |-
  You stand at the edge of the great forest on the coast of an ocean
  that stretches to the eastern horizon. Otters swim along the tips of
  the coastal grasses, chewing on fish and mussels.
     Water slaps against the rocks below you, drenching the mosses and
  water-worn stones below.

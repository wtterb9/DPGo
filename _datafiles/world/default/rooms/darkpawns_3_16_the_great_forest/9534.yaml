title: Deep within the Forest
description: |-
  The trees grow thick in this part of the woods, swallowing up the
  natural light and plunging you into nigh-eternal green fluorescence.
  Between the occasional breaks in the limbs above, you can sometimes
  make out the peaks of a mountain range rising into a cloudy sky.

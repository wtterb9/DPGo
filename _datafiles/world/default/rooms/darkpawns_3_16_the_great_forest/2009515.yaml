zone: DarkPawns (3-16) The Great Forest
title: Deep within the Forest
description: |-
  The trees grow thick in this part of the woods, limiting your vision
  as your pupils widen to absorb the light in this sickly green twilight.
  Gazing above you, you can barely see the ghostly, misty image of a snowy
  mountain winking through a break in the branches.

title: Deep within the Forest
description: |-
  The trees grow thick in this part of the woods, swallowing up the light
  and plunging you into a world of eerie green luminescence.  Rocks and small
  moss-covered logs jut from the ground to the north and west to form natural,
  effective perimeters of this part of the forest.

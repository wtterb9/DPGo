zone: DarkPawns (3-16) The Great Forest
title: Bhyroga Falls
description: |-
  You gaze in awe as hundreds of gallons of water cascade down the
  mountainous cliff to the west. A large pool of water has formed at
  the base of the waterfall, perfect for swimming or bathing. The pool
  leads out to a river that flows eastward.
     To the north and south, tall trees tower above you.

description: |-
  This small, busy office houses the Kir-Oshi office of weights
  and measures, which takes care of all of the cities bookkeeping.
  There are papers and permits for all kinds of regulated activities
  here, and the stack of completed forms are arranged haphazardly
  in a pile.
  A small sign hangs on the wall.

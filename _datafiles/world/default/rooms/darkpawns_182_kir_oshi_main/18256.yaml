roomid: 18256
zone: Kir-Oshi Main
title: "Kero Row"
description: |-
  This is the main north-south road in Kir-Oshi.  It is not as big or as
  busy as Yokki Way, but most of its traffic tends to come from the pier.
  To the north is the market square, to the west is a small, dimly lit
  curio shop.  The side wall of a building blocks your way to the east.
  To the south is the massive pier gate of Kir-Oshi.

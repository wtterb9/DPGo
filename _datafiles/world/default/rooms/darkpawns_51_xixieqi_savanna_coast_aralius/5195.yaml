zone: Xixieqi Savanna Coast (Aralius)
title: "Jungle Foliage"
description: |-
  You are standing at the border of a tropical jungle.  Tall, leafy
  trees - typical of rainforests - drip their condensing moisture on the
  ground here, forming small puddles of water.
     A tall stone wall rises high to the east, blocking out the rest of
  the savanna from sight as a stone tower soars above you from behind
  the wall.
     The elevation seems to rise a bit to the south, as the savanna lands
  to the north give way to the mountainous rainforests to the south.  
     From somewhere to the far southwest, you can hear the rushing of 
  water, but cannot penetrate the jungle to investigate it.

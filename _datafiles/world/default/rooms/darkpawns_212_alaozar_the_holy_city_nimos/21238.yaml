title: "Walking Cane Shop"
description: |-
  This is a medium sized room devoted entirely to walking canes and wands. They
  line the walls and crystal display cases of this store. Some staves are covered
  with minute, fine carvings while others are wrought in strange metals. While
  you are sure some are ordinary, you recognize a few as being powerful magic
  talismans created by ancient wizards long dead. The only exit is back to the
  west.

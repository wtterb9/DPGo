zone: Alaozar, the Holy City (Nimos)
title: "Twice Sold Tales Bookstore"
description: |-
  You are standing inside a musty little bookstore that, despite its ratty
  appearance and dusty air is quite charming.  The room is packed with dusty
  wooden shelves crammed full of books.  You glance around at the selection
  and are delighted to find everything from tomes of ancient lore to old volumes
  of Elven romance poetry scribed overseas.  You do not doubt that the
  proprietor of this establishment has some valuable ancient manuscripts tucked
  away somewhere in this mess.  Nor do you doubt that you could come across a
  real gem buried in these shelves -- maybe even a magical spellbook.  There is
  a sign on the northern wall right next to the door.

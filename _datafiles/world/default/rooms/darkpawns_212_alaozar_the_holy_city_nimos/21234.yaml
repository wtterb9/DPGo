description: |-
  You are standing inside a small shop that seems almost artificially
  darkened, the blackness is so complete.  This shop seems to be actually
  more of a laboratory, with the standard flasks and decanters, as well
  as some other arcane-looking equipment you do not recognize.  
     A small black sign lies nailed on the back wall.
     The only exit is east, back into Ardyn Park.

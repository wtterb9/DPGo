zone: Alaozar, the Holy City (Nimos)
title: "West Perimeter Road"
description: |-
  This area of town is noticeably different than the rest of Alaozar. Locals call
  this area the Old City -- a group of old buildings that survived the brutal
  invasion of the Dark One's legions. The homes along this roadway are examples
  of the early Lamonto style architecture. The roadway is composed of cobblestone
  and mortar and continues both north and south.

title: "Atop the Northwest Watch Tower"
description: |-
  You are standing atop the northwest watch tower. There is a small pit here
  which guards sometimes build fires in, on very cold evenings. From this
  vantage point, you can see far across the ocean to the north and west, and
  can barely make out the volcano to the south-east. The only exit is down a
  ladder.

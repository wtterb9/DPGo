title: "Main Street"
description: |-
  You are standing on Main Street, the main thoroughfare running through the
  center of Alaozar. To the south you see the golden gates of the Ardyn Park and
  the lovely fountains and wondrous trees beyond. Far north of here you see the
  towering north gate of town. To the west is a large weapon shop and to the east
  is what appears to be an armorer's shop. You may continue in any cardinal
  direction.

title: "A Forest Road"
description: |-
  You are strolling along a forest road that runs to the north and south.
  Birds and unseen, rustling forest creatures scurry about the forest floor
  to the east and west, disturbing the serenity of the pine forest.
     Fallen logs and mossy rocks seem to have been intentionally piled along
  the side of the road to the east and west and prevent passage in those
  directions.

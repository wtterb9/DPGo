title: "Guild Street"
description: |-
  This is a narrower roadway than the other streets of Alaozar. North of here is
  a large building that houses the Mages' Guild while to the south lies the
  Clerics' Guild. Guild Street dead-ends into Perimeter Road just west of here
  while it continues into Ardyn Park far to the east. You may go in any
  direction.

title: "Warriors' Guild"
description: |-
  This building is a large arena; training weapons of all size and shape have
  been carefully arranged in large cases here and mats have been positioned on
  the floor to make mock combat more safe. Weights and conditioning aids are
  over in one corner of the large area while in another are diagrams of anatomy,
  charts showing different weapons, and skematics teaching positioning and
  proficiency during battle. The door back to Guild Street is to the north.

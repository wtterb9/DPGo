roomid: 21205
zone: Alaozar, the Holy City (Nimos)
title: "Atop the Southwest Watch Tower"
description: |-
  You are standing at the very top of the high, southwestern watch tower. This
  is a small room made of black stone. There are openings in the walls at about
  chest level through which the guards on duty can watch the jungle and beyond
  for any signs of an advancing fleet. Someone has chiseled a fire pit into the
  stone floor and you see evidence of small fires having been lit recently. You
  suspect that it becomes very cold up at this height on cold or windy nights.
  The only exit is down a long wooden ladder back to the road far below.

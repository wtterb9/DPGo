title: "Southern Wall Road"
description: |-
  You stand on a narrow cobblestone road that runs the perimeter of the
  city of Kir Drax'in.  This section of the city looks like one of the oldest
  and certainly one of the most decrepit.  Trash and refuse from the crumbling
  buildings line the sides of the narrow road, and scores of indigent people
  huddle in open foyers and doorways on either side of the road.

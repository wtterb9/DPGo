description: |-
  You are standing on the perimeter road that runs along the wall of
  Kir Drax'in.  You are definitely in the temple district of the city, as
  evidenced by the elaborate reliefs on the buildings. You can smell the
  heavy scent of incense coming from several windows and doorways along the
  road, which winds its way to the north and south.

description: |-
  You stand on the perimeter road which winds its way around the city of
  Kir Drax'in.  This section of the city shows signs of age and poor maintenance,
  many of the buildings here look old and decrepit.  However, to your west a
  section of building looks like it has been newly replastered and converted
  into a garrison.  The harrow wall road winds its way to the north and south.

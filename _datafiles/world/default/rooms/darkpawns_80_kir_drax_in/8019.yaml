title: "Eastern Wall Road"
description: |-
  The wall road makes a corner just to the north of here, turning to run
  west towards the city centre.  You are at the edge of the temple district,
  where practioners of lesser faiths keep their houses of prayer.  This area of
  the city is well cleaned and well guarded.  You feel safe here, even on the
  dim, twisty wall road.  The temple district continues to the south.

title: "Southern Wall Road"
description: |-
  The cobblestone perimeter road runs to the east and west here, through an
  ancient district of Kir Drax'in.  It is relatively quiet here, in comparison
  to the bustle of the market and the city centre further to the north. The
  cobblestones have been worn down particularly hard in this section of street,
  allowing potholes to form in several places. The wall road runs to your east
  where it reaches a junction, and west where it winding through more ancient
  architecture.

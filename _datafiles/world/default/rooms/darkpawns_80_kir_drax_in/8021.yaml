title: "Temple Square"
description: |-
  This large square marks the intersections of the Avenue of the Gods which
  leads east and west, and Main Street which heads south.  North of here lies
  the Temple of the Cross.  The entrance to the temple appears to be an atrium
  surrounded by massive columns of marble with ornate carvings.  The sounds
  of the city bring noise from all directions.

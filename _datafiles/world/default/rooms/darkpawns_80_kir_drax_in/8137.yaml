    roomid: 8138
  west:
    roomid: 8136
nouns:
  fresco: "It is a painting of a nude woman reclining on a couch.  It must be very
old, as pieces of the plaster have chipped and flaked off, giving the image
a hollow, weatherbeaten feeling.  Still, it is quite beautiful.  The artist
must have been very talented."

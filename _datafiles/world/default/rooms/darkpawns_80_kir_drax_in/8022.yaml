title: "Northern Wall Road"
description: |-
  You stand on the narrow perimeter road which surrounds the city of Kir
  Drax'in.  Further to the west, the perimeter road intersects with a broader
  street running south, and also continues on to the west.  You are just to
  the north of a large stone tower which is decorated with flags inscribed
  with mystic symbols.  The wall road leads east and west.

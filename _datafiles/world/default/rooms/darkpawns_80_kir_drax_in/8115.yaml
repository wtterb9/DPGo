title: "Western Wall Road"
description: |-
  You are walking along the wall road that is the perimeter of the city 
  of Kir Drax'in.  Part of the mortar casing of the city wall has broken off
  here, revealing the bare stones underneath.  The wall road continues to
  the north and south.

zone: Kir Drax'in
title: "Northern Wall Road"
description: |-
  A proliferation of dingy buildings block your way to the south, and this
  narrow street runs right against the city ramparts to the north. The road
  follows the wall east and west along the northern perimeter of the city, the
  bulk of which lies to the southwest. There you can see a solid-looking tower
  flanked by two temples, one topped with ornate spires, the other seemingly
  made of black crystal.

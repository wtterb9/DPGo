title: A well stocked wine cellar
description: |-
  This room abounds in racks of wine, aged to perfection by
  years of patience.  Some of finest vines of Cedric and his
  ancestors have been resting in the bottles in this cellar for
  decades.  Newer choice selections from every season, climate,
  and vineyard from across the realm complement the aged wines
  in this fine stone cellar, which could well suit the banquet
  of any king.  A wooden wine rack rests against the wall.

title: Among the fields
description: |-
  The wheat field extends north here.  Overseers walk along the palisade,
  keeping serfs in line.  Hands work the land, harvesting a petty crop.
  Grains of wheat sway in the breeze, in their timeless prairie dance.
  The palisade curves around to the west from the south here.

title: Inside a lordly courtyard
description: |-
  You stand within the courtyard of the castle.  The area is abuzz with
  merchants, peasants, and tradefolk walking to and fro toward their assorted
  tasks.  The courtyard features several small gardens and trees to spruce up
  the otherwise cold stone layout.  A stairway leads toward a guard tower above
  the portcullis, and doors lead into the castle to the west, north, and east.

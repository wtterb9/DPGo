zone: DarkPawns Rotherwood Manor
title: The Scalding House
description: |-
  You stand within a house of blood and meat and carcasses, a
  slaughterhouse worthy of simultaneous praise and scorn.
  The great animals collected from the plains are butchered
  here, sliced up into portions and stored in cooled trunks
  in the confines of this already chilly room.  Vents in the
  walls prevent putrefication, and monkey boys scurry about,
  wiping the blood from the floor and walls.  Doors lead
  north and east to the kitchen and chapel.

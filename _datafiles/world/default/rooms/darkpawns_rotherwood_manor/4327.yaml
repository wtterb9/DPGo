zone: DarkPawns Rotherwood Manor
title: The Spicery
description: "This is the area from which spices are called by the main chef to\nbe
  used in the dish du jour.  Racks and racks of spices, both from\nCedric's fields
  and imported from abroad, line the walls on all four\nsides of this quaint room
  of wood and dirt.  \nThe air is resplendent with fragrance from the spice racks,\nshifting
  from an eastern to a northern to a western theme as you\nmove about the room.  The
  spices are stored on the racks in small\nglass bottles and beneath in large wicker
  baskets.  A table in the\ncenter of the room serves to apportion the spices as requested
  by\nthe chefs above."

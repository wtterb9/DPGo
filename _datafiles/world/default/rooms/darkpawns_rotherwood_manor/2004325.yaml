title: The Chandlery
description: "This area in the underbelly of Cedric's manner is responsible for making
  \ncandles, and storing candles and wax.  The air is thick with an \nindistinguishable
  chemical smell, and dried drops of wax litter the\nfloor. All manner of candles
  rest unlit on the walls, ready to be placed in \ncandelabra throughout the manor,
  serving the crucial role of providing light \nin the otherwise dark mansion.  Openings
  in the wall lead west to the larder \nand south to the poultry."

title: The Poultry
description: |-
  This is where Cedric's favorite food is kept.  The purchase and
  preparation of poultry is done here by the poulter.  Chickens hang
  in rows along the walls, having been skinned and cleaned.  The room
  is kept cool by its subterranean location, preventing the chickens
  from spoiling.  Exits lead north to the chandlery and west to the
  saucery.

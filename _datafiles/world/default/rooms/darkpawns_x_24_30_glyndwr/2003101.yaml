title: A Dirt Road through the Forest
description: "The ironwood trees begin to thin out, giving way to huge ancient willows
  \nand oaks festooned with spanish moss.  The effect is eerie.  A trail running\nroughly
  north and south can be barely made out, and a narrow path to the east\nleads behind
  some tall ironwood trees.\n   As you scan the trail to the south, you make out a
  set of gates, mostly\nobscured by the branches that jut out into the path."

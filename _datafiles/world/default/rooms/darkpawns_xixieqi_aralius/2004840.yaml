title: The Constable's Office
description: |-
  You have just entered a busy room.  Here, clerks and other petty
  bureaucrats issue and stamp licenses, keys, and permits to foreigners,
  tradesmen, and nomads who wish to peddle their wares within the city.
     The constable himself is in the back of the room, mercilessly berating
  one of his underlings for some infraction.
     The only exit is to the north.

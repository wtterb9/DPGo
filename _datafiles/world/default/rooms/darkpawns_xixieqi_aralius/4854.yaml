title: Ping Xiao's House Of Pleasure
description: |-
  You stand amidst a crowd in this busy tavern.  All around you, yellow-
  skinned men serve food, drink, and hot, moist towels to the seated patrons
  while avoiding the occasional trip from a stray foot or outset chair.
     To the north, you can see tables, rowdy people, and gamblers playing
  around a bar, each here to enjoy themselves in whatever activity they can
  participate in.

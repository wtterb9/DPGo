title: Nijen's Glass and Lamps
description: |-
  You are standing in the middle of a glassblowers shop.  Piles of
  white sand occupy most of the floor as it spills from holes in burlap
  sacks on the floor.  A broad chimney in the northern wall apparently
  houses the molten glass which the master craftsman blows into bulbs
  for lamps and fashions into shotglasses.
     The exit to this shop is to the south.

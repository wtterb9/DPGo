title: The Herbalist's Back Room
description: |-
  Here, herbs and plants hang in clusters from the ceiling.  Bitter
  and foul-smelling roots and garlic seem to overwhelm the more pleasing
  scents of ginseng and powdered orangeseed which occupy bottles on the
  floor.
     The only apparent exit from this room is back to the west.

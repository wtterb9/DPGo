title: A Dark Warehouse
description: |-
  At first, you think this is nothing more than an old warehouse with
  forgotten crates of mouldy goods.  As you look further, though, you notice
  that the crates are stacked in defensive positions, to give both seclusion
  and secrecy for those behind them.
     In the blink of an eye, a cutthroat appraches you, dagger in reach and
  asks you what you are doing here.

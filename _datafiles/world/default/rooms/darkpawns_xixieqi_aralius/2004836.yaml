title: An Elegant Home
description: "Unlike much of the bamboo city around you, you stand in a home of\nwood,
  brick, and mortar.  Apparently, the owner of this place is\nsufficiently wealthy
  to invest in better, longer lasting materials.\n   A lone fireplace rests against
  the southern wall, and as you \ninvestigate the home, you find similar hearths in
  each of the rooms,\nall apparently connected to a central chimney overhead.\n   The
  only exit appears to be to the north, the way you came in."

title: Maojeng Lane
description: "This is little more than a crudely gravelled road which runs towards\nthe
  seedier section of town.  Homes continue to line the streets, though\nhere and there,
  a warehouse appears between them, throwing shadows on\nthe smaller dwellings around
  them.\n   To the north, you can see a decrepit house, while to the south, you \nsee
  the local law enforcement facility.  The street continues to the \neast and west."

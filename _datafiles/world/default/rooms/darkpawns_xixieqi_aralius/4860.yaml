zone: DarkPawns Xixieqi (Aralius)
title: Xixieqi City Gate
description: |-
  You are standing among a crowd of people.  Merchant caravans and nomads
  speak to the gateguards, occasionally slipping them a few coins as they
  pass into the city from the south.
     Just outside the southern gate, you see a lush grassland, but the dry
  wind that blows through the gate tells you that the desert is not too far
  beyond it.
     To the north, you see an intersection, while you notice you are flanked
  by guardhouses to the east and west.

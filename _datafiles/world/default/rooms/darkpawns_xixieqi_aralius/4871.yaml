title: An Upstairs Hallway
description: |-
  You are standing in the inn's upstairs hall.  Doors to each of the
  available rooms line the southern wall.  To the north, the windows
  look out upon the sea and the incoming ships which ceaselessly enter
  and exit the harbour below.  The hall continues to the east and west.

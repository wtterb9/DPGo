title: Mito Avenue
description: |-
  You are standing on a busy street.  Around you, people, mules, horses,
  and some strange six-legged pack animals bear boxes and crates as they rush
  about their business.
     To the north, you can see a red-brick wall, which strikes you as quite
  out of place in this city of mortar and bamboo.  The brick seems to extend
  to the building to the northeast.  To the south, a small, modest home bears
  the signs of neglect, as though the owner had died or been too old to tend
  it.  The street continues to the east and west, meeting a junction of three
  streets just off to the east.

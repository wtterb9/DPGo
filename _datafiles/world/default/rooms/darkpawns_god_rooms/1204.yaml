title: The Board Room Of The Immortals
description: "This large room is well-decorated, and lit from above by a soft\nmagical
  glow of no particular origin.  Scattered around the room are\ncomforable chairs
  and piles of furs of various dimension, and in the\nvery middle there is a huge
  oaken table that shimmers in an odd manner.\nA large picture window looks down over
  the whole world, showing the\nexploits of the many intrepid mortals.  A spiral staircase
  leads down\nto another part of this room.  There is a sign hovering in the \nawesomeness
  of this room."

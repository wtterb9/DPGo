roomid: 14123
zone: (25-30) The Ruined Temple of Paphoset (Nimos)
title: "The Ballroom"
description: |-
  Apparently, whoever designed this crypt thought that dead men entertained,
  because this room is set up as a nice ballroom. Giant candle chandeliers 
  dangle from the ceiling. The candles are unlit but the candle holders 
  glow with an unearthly, dark light. There are no furnishings in this room
  but the walls are decorated with more faded paintings, showing more of
  Lothar's brave deeds.

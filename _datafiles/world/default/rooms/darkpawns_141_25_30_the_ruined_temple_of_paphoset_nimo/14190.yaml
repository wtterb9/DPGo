zone: (25-30) The Ruined Temple of Paphoset (Nimos)
title: "Inside the Bell Tower"
description: |-
  You are in a small tower made from stone. An ancient staircase spirals down into
  the darkness. The stairs are slick with algae and slime, making your footing
  treacherous. You don't even want to think about what would happen were you to
  fall. The walls are covered with a dark green slime and there is nothing to hold
  on to. Above you is the belfry where the bells are held.

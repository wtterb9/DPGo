zone: (25-30) The Ruined Temple of Paphoset (Nimos)
title: "The Foyer Of The Temple Of Paphoset"
description: |-
  The vast width of this chamber is difficult to determine, even in daylight,
  and the shadowy reaches of the far walls are not revealed by torches. The
  air is thick with dust, making breathing difficult.
     A massive stone head can be seen below against the opposite wall of the
  chamber, partially covered by sand. Most features of the grim countenance are
  worn away, but the figure still reflects great power, and the enormous
  statue is and awe-inspiring creation, indicative of the advancement of the
  culture that created it.

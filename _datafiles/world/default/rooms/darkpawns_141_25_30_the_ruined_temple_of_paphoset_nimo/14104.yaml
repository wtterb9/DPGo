title: "The Trophy Room"
description: |-
  The contents of this room are a testament to the peak of Paphoset's power
  before his descent into madness. Lining the walls are spears, shields and
  other spoils of battle, all of unusual, antiquated design. The heraldry
  and weapon-craft of dozens of long-dead cultures are preserved here. A set
  of stairs leads up.

zone: The Great Plains (Antryg)
title: "The Plains"
description: |-
  You stand on the edge of the vast, rolling plains of dor-Sefrith. Ankle to knee
  high grass bends gently in the wind and the air is warm and humid. The air has 
  a definite smell of salt and you can hear the sounds of the ocean. Looking 
  out across the plains you can see for some distance. The horizon wavers hazily 
  in the heat. Plains rise to the north, and a tall ighthouse lies to the north-
  east.

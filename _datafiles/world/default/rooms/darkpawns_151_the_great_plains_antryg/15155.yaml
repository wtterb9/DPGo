title: "The Foothills of the Grey Mountains"
description: |-
  Dark hills, sparsely covered with stunted trees, rise out of the Plains of
  dor-Sefrith, the vanguard of the forbidding Grey Mountains.  A sheer cliff
  blocks any possible path to the north, to the east are foothills, to the south
  the hills slowly bend into the plains, and a narrow valley leads west.

zone: The Great Plains (Antryg)
title: "The Plains"
description: |-
  You stand on the vast, rolling plains of dor-Sefrith. Ankle to knee high grass 
  bends gently in the wind and the air is warm and humid. You can detect a hint
  of salt in the breeze. Looking out across the plains you can see for some 
  distance. The horizon wavers hazily in the heat. To the distance in the 
  northwest you can see the peaks of a mountain range. To the distance in the
  north you can see a forest. Plains surround you as far as you can see.

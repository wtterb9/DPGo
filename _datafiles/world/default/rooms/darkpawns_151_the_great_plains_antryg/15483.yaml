zone: The Great Plains (Antryg)
title: "The Coastal Plains"
description: |-
  You stand atop the towering sea cliffs along the southern edge of the vast
  dor-Sefrith plains. The steep sand and clay cliffs plummet straight down and
  are highly unstable.  Best not to get too close.  The air here is very humid
  and the sounds of the beach and ocean fills your ears. Plains surround you to
  the north as far as you can see.  To the west and south the ocean stretches 
  out into the horizon.

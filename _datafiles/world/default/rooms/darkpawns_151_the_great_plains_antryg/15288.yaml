zone: The Great Plains (Antryg)
title: "The Plains"
description: |-
  You stand on the edge of the vast, rolling plains of dor-Sefrith. Ankle to knee 
  high grass bends gently in the wind and the air is warm and humid. Looking out 
  across the plains you can see for some distance. The horizon wavers hazily in 
  the heat. To the distance in the north you can see the peaks of a mountain 
  range. Plains surround you as far as you can see.

zone: The Great Plains (Antryg)
title: "The Coastal Plains"
description: |-
  The towering cliffs have slowly become steep, loose, sandy slopes. The land 
  still slopes gently downwards toward the east. The air here is very humid and 
  the sounds of the beach and ocean fills your ears. Plains surround you to the 
  north as far as you can see.  To the west the cliffs rise higher.  To the east 
  are plains leading to a large structure. To the south the ocean stretches out 
  into the horizon.

title: Lady Amber's Bedroom
description: |-
  This room seems to be totally unlike the serious, battle-hardened Lady Amber.
  A huge, four poster bed dominates most of the room, and a window to the east
  looks out over a beautiful landscape. A closet in the west wall is where she
  must store her clothing, and on the wall next to the closet is a huge square
  of silvered glass.

title: Inside the Gate
description: |-
  This side of the huge gate to your south faces what looks like the front of
  a remarkably giant castle made out of grey stone.  The gate itself is made
  of solid stone and looks unopenable.  You are presently standing on a grassy
  patch of land that appears to rim the castle wall to the east and west.

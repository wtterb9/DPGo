title: Before a Massive Gate
description: |-
  Standing before you is the biggest gate you've ever seen, wide enough to let
  three wagons through side by side and tall enough for the tallest of giants to
  walk through while holding his head high.  Unfortunately, the gates appear to
  be made of the same solid stone as the mountains which surround them, and you
  can see no way of opening them.

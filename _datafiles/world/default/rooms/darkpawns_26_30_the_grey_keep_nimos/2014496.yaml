roomid: 2014496
zone: DarkPawns (26-30) The Grey Keep (Nimos)
title: A Strange Cell
description: |-
  This room is strange, the walls are invisible and all you can see behind them
  is white, cloudy space, like you're on some other plane. Occasionally you see
  dark patches move rapidly by your prison, nothing slow or close enough to let
  you make out the forms. The cell is big enough to let you move around, but you
  get the feeling that you won't need to move around for a long while.

title: The Questioning Room
description: |-
  This stone room is barren of all furniture, except for a long, wooden table
  with several chips taken out of it and blood stains all over. This is where the
  alhoon Alhazred interrogates prisoners and spies. Shackles hang every five feet
  on the walls, and, judging from the dried blood that drenches the walls, they
  were used quite recently.

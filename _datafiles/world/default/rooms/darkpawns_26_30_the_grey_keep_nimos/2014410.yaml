title: The Foyer
description: |-
  As you walk into the foyer of the huge castle, balls of light that have been
  inset into the east and west walls light up, dispersing all shadows from the
  room. The room is unfurnished and a tall, thin door is on the east wall. To
  the north is a great hall and to the south is a set of thick, wooden double
  doors.

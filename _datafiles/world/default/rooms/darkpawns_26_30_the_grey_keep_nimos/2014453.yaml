zone: DarkPawns (26-30) The Grey Keep (Nimos)
title: The Anteroom
description: |-
  This is the entryway to Raithir's rooms, it is draped in black and dark crimson
  tapestries and there are comfortable looking benches against the north and
  south walls. Small ceramic pots with different types of mushrooms growing from
  them are in the four corners of the room. From here you can go through either
  the door to the east and back to the hallway, or the door to the west and into
  the rest of Raithir's chambers.

title: The Grey Slayer's Barracks
description: |-
  This is where some of the Grey Slayers sleep when not on duty. It is a long
  room lined with old cots. At the foot of each cot is a trunk in which the
  belongings of the Grey Slayer is kept. A small, glowing sphere is inset into
  the wall over the headboard of each bed.

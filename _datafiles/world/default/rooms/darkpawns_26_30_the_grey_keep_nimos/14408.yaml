zone: DarkPawns (26-30) The Grey Keep (Nimos)
title: At the Entrance to the Castle
description: |-
  A couple wide steps lead up to a big set of wooden double doors that are bound
  in black iron. The walls to the east and west of the doors are lined with thin
  arrow slits in case of attackers. The grass here is a bright green and is not
  worn down much, this place must not get many visitors.

zone: DarkPawns (15-20) Orc Burrows (Arakon)
title: A Tunnel Within the Burrows
description: |-
  The odor grows stronger to the west and you can just hear the faint sounds
  of metal moving against metal. The tunnel in that directions also grows rather
  small so it will be necessary to crawl through it should you wish to travel
  that way. Alternatively, the tunnels to the north and east are more open.

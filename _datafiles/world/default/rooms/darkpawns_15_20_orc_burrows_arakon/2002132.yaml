zone: DarkPawns (15-20) Orc Burrows (Arakon)
title: A Tunnel Within the Burrows
description: |-
  You could swear that there are a number of eyes staring at you but the more
  you try and peer into the darkness, the less you are able to see. You stand
  silently for a moment and hear nothing but your own breathing. You may push on
  to the west, south or north.

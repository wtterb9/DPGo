roomid: 2114
zone: DarkPawns (15-20) Orc Burrows (Arakon)
title: A Tunnel Within the Burrows
description: |-
  As you make your way northward you become even more suspicious that there
  is a reason no one walks this route. You are unsure why because the path to
  the east is covered by large tree roots beyond which you cannot see. However,
  they look flexible enough so you might be able to squeeze through if you
  wanted. Otherwise, you will have to journey back to the south.

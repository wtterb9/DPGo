roomid: 2002148
zone: DarkPawns (15-20) Orc Burrows (Arakon)
title: A Tunnel Within the Burrows
description: |-
  Clumps of dirt fall from the roof and walls as you walk through the burrows.
  Despite the roots that appear to extend in all directions, the tunnels lack
  the moisture necessary to hold this area together. You must be careful as you
  journey to avoid being buried alive. A small source of light can just be seen
  to the east while tunnels continue to the north, west and south.

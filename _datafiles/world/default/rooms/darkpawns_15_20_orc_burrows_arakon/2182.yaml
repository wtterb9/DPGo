title: The Edge of an Underground Lake
description: |-
  The shoreline extends to the east and abruptly ends while a narrow tunnel
  leads off to the north. The calmer waters of this underground lake lie directly
  to the south but you would have to fight the river current if you intended to
  leave this place.

roomid: 2154
zone: DarkPawns (15-20) Orc Burrows (Arakon)
title: At the Bottom of a Pit
description: |-
  No sooner have you made your way through the wall of roots than you stumble
  and fall down a rather deep pit. Cursing silently you realize there is no easy
  way out of here and climbing up the dirt wall would surely result in half of it
  collapsing down upon you. The bones of others as fortunate as yourself rest on
  the ground but you can find nothing that would aid in your escape.

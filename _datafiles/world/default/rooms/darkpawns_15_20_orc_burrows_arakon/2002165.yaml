title: A Tunnel Within the Burrows
description: |-
  A T-junction in the tunnel system allows you to travel to the north, west
  or east. Thoughts of leaving a trail enter your mind as you progress deeper
  into the maze as every part of this area looks exactly the same. Looking down,
  you see a series of footprints and wonder if any of them are actually yours.

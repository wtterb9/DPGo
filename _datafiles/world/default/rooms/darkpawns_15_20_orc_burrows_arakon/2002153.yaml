title: An Open Cave
description: |-
  This corner of the chamber is noticeably smaller than the others and funnels
  into a tunnel that leads to the north. You trip on something and land face
  first into the dirt floor, narrowly missing one of the branches laid out here.
  Looking back, a collection of six animal bones has been painstakingly buried
  into the ground in the shape of a circle for reasons unknown. Ponder as you
  might, you cannot find a reason and decide to continue.

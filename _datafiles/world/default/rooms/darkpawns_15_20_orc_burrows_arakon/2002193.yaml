title: The Center of the Burrows
description: |-
  You have stumbled across the heart of the orc burrows for it is here that
  the numerous raids these creatures carry out are planned. The rotting corpses
  of many unfortunate creatures litter the floor and the stench of death is
  very overpowering. Screams of agony echo around you and you realize not all
  within this chamber is dead. Eyes glow in the surrounding darkness and all
  seem to be focused on you.

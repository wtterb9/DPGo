roomid: 2181
zone: DarkPawns (15-20) Orc Burrows (Arakon)
title: The Edge of an Underground River
description: |-
  If you had been wondering where the many trees of Noirwood got their
  nutrients then the river before you is the most likely of answers. You stand
  on the edge of an underground river that flows to the east and into a small
  tunnel that you cannot clearly see down. The shoreline extends to the west
  and abruptly ends while the tunnel network of the burrows lies to the north
  through a narrow opening.

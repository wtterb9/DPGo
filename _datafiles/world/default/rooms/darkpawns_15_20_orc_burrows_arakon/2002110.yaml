title: A Tunnel Within the Burrows
description: |-
  A T-junction in the tunnel system allows you to travel to the north, west
  or south. Any thoughts of leaving a trail should have been carried out by
  now as you find yourself deep within the maze beneath the surface. Looking
  down, you see a series of footprints, the majority of which lead to the north.

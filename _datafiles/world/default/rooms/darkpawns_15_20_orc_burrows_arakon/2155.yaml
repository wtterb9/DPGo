title: A Tunnel Within the Burrows
description: |-
  Once again you are forced to weave your way through a number of tree roots
  that pierce the surface and continue downward through the dirt floor. With a
  little effort, you could push your way westward or travel to the north and east
  where the roots aren't as thick as they are here.

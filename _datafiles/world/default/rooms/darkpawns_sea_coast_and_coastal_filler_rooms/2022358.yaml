title: Salty Waters
description: |-
  You float in the waters just south of a briny swamp, where the salty
  waters of the northern swamp mingle with the tangy ocean.  Flotsam and a
  few reeds of sea plants float by from the ocean to the east and northeast,
  while a calm bay seems to open to the distant south.

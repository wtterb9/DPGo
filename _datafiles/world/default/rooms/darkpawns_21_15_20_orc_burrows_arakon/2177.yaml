title: "A Tunnel Within the Burrows"
description: |-
  The tunnel bends here and continues to the north and east. The roots that
  have been quite prolific elsewhere are noticeably absent from the roof of
  this section. You notice that its nothing more than a thin layer of dirt
  covered by grass on the surface above. With a little effort, you might be
  able to force your way through the roof and back into the forest.

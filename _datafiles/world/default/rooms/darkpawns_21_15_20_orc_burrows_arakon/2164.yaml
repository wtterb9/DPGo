zone: (15-20) Orc Burrows (Arakon)
title: "A Tunnel Within the Burrows"
description: |-
  A section of the earthen wall has collapsed making it difficult to proceed
  in any direction but you have the choice of north, east or south. The heat
  within the tunnels is almost unbearable as there is virtually no air flow.
  You can imagine this place during the heat of the day as being similar to
  walking through a wall of fire and are thankful at least that the darkness
  keeps the temperature down a little.

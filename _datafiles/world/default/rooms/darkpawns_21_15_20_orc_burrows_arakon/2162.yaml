title: "An Open Cave"
description: |-
  You weave your way through the makeshift beds to another corner of this
  sleeping chamber. The only difference between this area and the tunnels
  through which you arrived is the size. A fair amount of work has gone into its
  construction to provide a suitable area to accommodate a large number of
  creatures, whoever they may be. The cave opens up to the north an west while
  a tunnel leaves to the east.

title: "Entrance to the Burrows"
description: |-
  Light filters through a maze of tree roots above you and illuminates a
  small room carved out of the earth. Tunnels spear off in all directions
  although you can't see more than a few feet into them. Unknown sounds
  occasionally break the silence around you and a shiver runs down your spine
  either in anticipation or fear.

zone: (15-20) Orc Burrows (Arakon)
title: "A Tunnel Within the Burrows"
description: |-
  Dirt, dirt and even more dirt. Not surprising since the tunnel has been
  created beneath the surface of the forest but you're already covered in the
  stuff and it's not pleasant. You duck just in time to miss one of the many
  tree roots that criss-cross the roof and walls and wonder how far this
  tunnel system could possibly extend. You can barely make out a small room to
  the west while the tunnel extends to the south and east.

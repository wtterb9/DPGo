roomid: 2151
zone: (15-20) Orc Burrows (Arakon)
title: "A Tunnel Within the Burrows"
description: |-
  It must have taken years to build this underground network, especially
  since it looks like it was done by hand...or perhaps you could say claw. The
  scratch marks in the walls are very obvious and although the earthen walls
  crumble easily under your touch, it must have taken a lot of work to dig
  through and then remove the tons of dirt. Your only options here are to
  travel to the west or east.

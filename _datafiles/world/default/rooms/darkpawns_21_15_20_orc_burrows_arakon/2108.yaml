title: "A Tunnel Within the Burrows"
description: |-
  You discover the source of the water is in fact numerous tree roots which
  crowd the southern exit from the tunnel. It streams down the roots and forms
  pools of water on the ground, changing the usually dry dirt into mud. You
  could push your way south through the roots or return to the west.

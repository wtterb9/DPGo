title: "A Tunnel Within the Burrows"
description: |-
  You almost get wedged between the narrowing tunnel walls but just scrape
  through. Something similar to a snicker catches your attention but before you
  can register a direction, it is gone. The tunnel opens up to the west and
  continues deeper into the darkness to the east.

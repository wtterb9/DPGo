title: "A Tunnel Within the Burrows"
description: |-
  You must be careful to avoid the tree roots which protrude through the
  tunnel roof. and disappear into the dirt floor upon which you stand. Numerous
  footsteps can be seen on the ground, some of them yours, the majority belonging
  to something else. The tunnel bends here and you can travel to the east or to
  the south.

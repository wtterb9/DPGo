title: "A Tunnel Within the Burrows"
description: |-
  You blink as shafts of light beam through small holes in the roof. You fear
  that anything walking on the surface above you would more than likely come
  through the weakened roof and land on you so perhaps it is prudent to move
  into the tunnel to the west or south. You could also try and climb out onto
  the surface.

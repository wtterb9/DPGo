title: "A Tunnel Within the Burrows"
description: |-
  Clumps of grass have begun to grow on the floor in front of you indicating
  that perhaps the tunnels in this part of the burrows have been here for quite
  some time. You are amazed that the grass can grow without the aid of sunlight
  and water but then again, you don't know what lies beneath your feet if in fact
  the burrows extend that far. You can travel to the west or east.

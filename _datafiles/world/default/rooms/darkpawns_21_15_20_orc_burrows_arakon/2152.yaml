roomid: 2152
zone: (15-20) Orc Burrows (Arakon)
title: "An Open Cave"
description: |-
  You step into the northwestern corner of what appears to be a sleeping 
  chamber within the burrows. The only difference between this area and the
  tunnels you have traveled through is the size, dirt is still everywhere and
  the oppressive heat from lack of air flow is starting to wear you down. Simple
  mats of branches and leaves are scattered haphazardly around the cave and you
  can easily hear the loud slumber of something but you cannot see into the
  darkness. The cave continues to the east and south or you may enter one of
  the tunnels to the north or west.

zone: (15-20) Orc Burrows (Arakon)
title: "The Edge of an Underground River"
description: |-
  The edge of the river is relatively small and you have to be careful not
  to sink too deeply into the mud that has been created. Dirt walls prevent
  further travel to the west or north but you can travel along the shoreline to
  the east. The river to your south simply appears from an opening in the wall
  and flows steadily to the east.

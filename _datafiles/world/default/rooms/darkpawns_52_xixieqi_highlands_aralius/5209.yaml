zone: Xixieqi Highlands (Aralius)
title: "Sloping Hills"
description: |-
  You are standing on a hill of high grass, just west of a dense thicket
  of impenetrable undergrowth.  It appears that this is the eastern border
  of the grassy foothills, where it stops amid a cluster of tall, leafy
  trees and mountain-rainforest-type shrubs.
     To the north you can see the hills merge with rich savanna fields, 
  while to the south, you can barely make out a path through the densely
  covered hills as they rise.  The hills continue at this elevation to the
  west.

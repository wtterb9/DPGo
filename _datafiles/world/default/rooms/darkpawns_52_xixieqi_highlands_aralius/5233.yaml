zone: Xixieqi Highlands (Aralius)
title: "A Carved Cliff"
description: |-
  You stand below a vertical cliff, looking out over the northern
  horizon, across fields and rolling hills of tall grass.  
     Here, someone has taken the time to chisel into the rock the head
  of a serpent - a companion to the one across the road to the east.
  It appears that gems or glass were once in place in the carving's
  eyes, but have long since vanished.
     The hills continue to the west and north, while a road appears
  to scale the mountains to the east.  Only the cliff face appears to
  the south and there seems no way to scale it.

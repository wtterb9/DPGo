zone: Xixieqi Highlands (Aralius)
title: "A Road Through The Hills"
description: |-
  You are travelling along an oft-travelled road that splits the hills
  as it climbs higher into the mountains to the south.  Shrubs and tall
  grasses spring from the moist ground, perhaps tapping some unseen water
  source deep in the ground and away from the harsh desert heat to the
  north.
     The road continues to the north and south, while the hills extend far
  to the east and west.

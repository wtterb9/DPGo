title: Lyratha's House of Lizards
description: |-
  This room is very creepy, the magically created light is dimmed to simulate
  nighttime, and vines hang down from the ceiling. The floor is covered with
  leaves and sprinkled with dirt. A few hollowed out logs make room for the
  inhabitants of the room to sleep and play around in.

zone: Sulfur Fur Mountains (Aralius)
title: "Thick Forest"
description: |-
  You are standing among tall pines.  Firs and hemlocks tower silently
  above you, blocking out both the wind and the snow that may be above
  the branches.  On the ground, you see sulfur-yellow moss on some of
  the rocks nearby while on the trees themselves, pale green patches of
  lichens add contrast to the dark terrain.  Forest surrounds you on all
  sides, but proves impenetrable to the south where tall rocks intermingle
  with the trees.

zone: Sulfur Fur Mountains (Aralius)
title: "A Canyon Floor"
description: |-
  You are standing at the bottom of an ash-filled canyon.  Smooth yellow
  cliff walls rise high to the east and west, forming a smooth north-
  south path.  To the north, you see a trail bend sharply up a mountain
  as it breaks away from the canyon while to the south, the canyon seems
  to continue forever.

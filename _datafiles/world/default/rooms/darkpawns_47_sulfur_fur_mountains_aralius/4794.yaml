title: "A Mountain Cavern"
description: |-
  The cavern seems to be getting cooler as you travel to the west, though
  pools of water on the floor tell you that it is not quite freezing.  
  Solid walls and thick stalagmites impede your travel to the north and south,
  though you can travel westward, deeper into the cave or eastward, toward
  the entrance.

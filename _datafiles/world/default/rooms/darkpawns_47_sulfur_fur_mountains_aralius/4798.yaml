title: "A Canyon Bend"
description: |-
  You are standing at the bend of a canyon.  To the north, south, and east,
  tall canyon walls impede your progress while to the west, the canyon
  continues under the rain of ash and dust.  There appears to be some sort
  of crevasse in the wall to the south, but debris and the sheer narrowness
  of the opening make searching it futile.

roomid: 4704
zone: Sulfur Fur Mountains (Aralius)
title: "A Mossy Cliff"
description: |-
  You stand in a forest surrounded on two sides by tall cliff walls.  Pale
  yellow moss hangs like sulfurous fur off the sheets of vertical rock
  which impede your progress to the east and south.  To the north, the
  pine forest continues, while to the west, underbrush and rocks clutter
  the space between the trunks of the firs around you.

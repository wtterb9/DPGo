title: "A Mountain Cavern"
description: |-
  The cavern seems to be getting cooler as you travel to the west.  Pools
  of frozen water tell you that the air is below freezing.  Solid walls and
  stalagmites impede your travel to the north and south, though you can
  travel westward, deeper into the cave or eastward, toward the cave exit.

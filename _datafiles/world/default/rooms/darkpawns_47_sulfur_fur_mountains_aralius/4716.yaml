zone: Sulfur Fur Mountains (Aralius)
title: "An Open Cavern"
description: |-
  You are standing in a closed canyon.  At one point in the past, this
  place obviously had a ceiling, but it appears to have collapsed into
  the stalagmites around you.  Above you, you can see the dark smoke
  and ash which blots out the sunlight, leaving the area in eternal dusk.
  To the north, south, and west, this cavern continues, while to the
  east, a lichen-covered caven wall blocks your path.

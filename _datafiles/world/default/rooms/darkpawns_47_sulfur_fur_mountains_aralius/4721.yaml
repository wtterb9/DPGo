zone: Sulfur Fur Mountains (Aralius)
title: "A Mountain Fork"
description: |-
  Here, three mountain trails converge on a snowy plateau.  To your north,
  the trail continues, flanked on both the eastern and western sides by 
  tall faces of rock.  To your east, the trail descends down a slope into
  a pine forest, while behind you, the trail leads down into the lowlands.
  You can smell ozone, as if there was a recent lightning storm.

title: "Buried Alive?!"
description: |-
  The world spins and you slowly lose consciousness.  When you awake you find
  yourself trapped in a very small, very dark area -- your light does little
  to illuminate your cell as the stone that imprison you devour the light
  As you feel around you realize, to your horror, that there are no exits
  from this claustrophobic little nightmare.  There is no use in screaming
  but you do it anyway, until the air runs out in the room, that is.

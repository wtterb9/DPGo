title: "The Eastern Hallway"
description: |-
  You are in a hallway dominated by the statue of a wicked Dopsodod who
  stares at in hatred with his plaster eyes.  The walls here are made from
  blocks of ebonstone and contrasting white plaster trim.  The hallway

roomid: 20109
zone: Dark Mage's Tower (Raven)
title: "Dungeon Cell"
description: |-
  A pile of dirty straw rests on the cold, hard floor here and seems to
  be the only thing in this cell.  The walls are made of thick, black stone
  while the cell door to the east is made of a reinforced iron.
     Small scratch marks have been etched into a stone near the straw, but
  offer little other than an indication that some trapped soul was bored
  during his imprisonment.

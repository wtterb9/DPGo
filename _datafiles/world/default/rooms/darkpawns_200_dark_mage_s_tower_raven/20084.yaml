title: "The Eastern Side of the Statue Gardens"
description: |-
  You are at the eastern side of the wondrous indoor gardens.  The trees
  here are so tall that they brush against the crystal roof hundreds of feet
  above your head.  Lovely tropical birds fill the air with song.  A small
  pathway leads westward.

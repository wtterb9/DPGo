title: "The Southern Side of the Reflecting Pool"
description: |-
  You are standing knee-deep in the frigid water of the reflecting pool.  To
  the north of here, in the center of the pool, the water slightly deeper.
  Your way to the south, east and west is blocked by tall, black walls.

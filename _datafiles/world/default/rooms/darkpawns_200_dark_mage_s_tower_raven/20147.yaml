zone: Dark Mage's Tower (Raven)
title: "Hallway"
description: |-
  You are in a large, filthy hallway frequented by the Thralls.  In the center
  of this area they have built a large, ugly statue of stone.  It is poorly
  crafted and worthless, but they seem to revere it as a god -- for there are
  offerings and tributes lying at its feet.  Exits lead in every direction but
  up and down.

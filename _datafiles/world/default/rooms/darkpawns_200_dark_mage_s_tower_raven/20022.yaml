zone: Dark Mage's Tower (Raven)
title: "Falling..."
description: |-
  You nimbly slide over the lip of the pit and begin to scale down the smooth
  sides.  After about two minutes you realize it was a big mistake -- the
  sides of the pit are very hot and offer very little to grab onto.  Ouch,
  you lose your grip and plummet towards the bottom, miles below.  Mercifully
  you pass out before your body is shattered on sharp rocks and consumed by the
  fires of the underworld.

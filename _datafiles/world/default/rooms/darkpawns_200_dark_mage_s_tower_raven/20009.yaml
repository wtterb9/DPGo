title: "Labyrinth Passageway"
description: |-
  You are in a small, confusing hallway.  Although you try to resist, you find
  yourself growing tired, dizzy and frustrated.  Although you carry a light
  source, the walls here seem to absorb much of the light in this room; it is
  very difficult to see here.  Exits lead east, south and north but, as you
  look into the darkness north of here, a powerful feeling of terror
  overwhelms you and you have difficulty maintaining your calm.

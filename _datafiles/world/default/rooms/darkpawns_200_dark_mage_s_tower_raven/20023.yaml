roomid: 20023
zone: Dark Mage's Tower (Raven)
title: "In Furnace Room"
description: |-
  This vast room is some kind of furnace.  A large, deep pit has been drilled
  deep into the ground; indeed, it is so deep that the bottom is lost in
  shadow.  Waves of superhot air rush up from the underworld and into this
  room -- it is so hot here that your skin is beginning to sting.  At the
  top of the chamber there are large conduits which, presumably, bring the
  hot air up to the top levels of the tower.  While you could certainly
  climb down the pit, it looks difficult and very unsafe; the sides are very hot
  and smooth.  A small passageway leads east.

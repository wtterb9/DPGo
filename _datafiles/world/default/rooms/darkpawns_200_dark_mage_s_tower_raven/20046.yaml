roomid: 20046
zone: Dark Mage's Tower (Raven)
title: "Southern End of Entry Hall"
description: |-
  This is a regal, vast hallway with beautiful walls of polished ebonstone and
  a tall, vaulted ceiling.  A rich, deep-red carpeting continues northward, to
  the other end of this large hall.  The elegant, vivid tapestries that adorn
  the walls here appear to be made of fine silk and have been embroidered with
  golden thread.  The hallway continues to the north and, on the southern
  wall, there is a massive ebonstone gate.
mapsymbol: #
biome: house
tags: [dark, indoors]
exits:
  north:
    roomid: 20043
nouns:
  carpeting: ":rug"
  ebonstone: "The walls are made of highly polished blac ebonstone. It must have cost a fortune to
build this tower!"
  gate: "The gate is a huge slab of blackened ebonstone.  It is featureless but
beautiful."
  rug: "It runs north, to the other end of the hall."
  tapestries: "The tapestries here are truly marvelous.  Made from the finest silk
available they have been embroidered with thin, golden thread.  They must be
very valuable but they are hung high up on the walls, far beyond your
reach."
  tapestry: ":tapestries"

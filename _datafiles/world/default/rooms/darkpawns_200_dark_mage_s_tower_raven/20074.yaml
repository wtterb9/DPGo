nouns:
  tables: "The tables, chairs and place settings are made of fine, strong crystal.
They must be quite valuable; as you touch a crystal knife you are shocked
and instantly pull your hand away.  I guess whoever set the table doesn't
want you messing it up."
  wall: "You walk over to the transparent wall and gaze out upon the land.
All that greets your eyes are untold miles of blasted, scortched
landscape, with mountains futher in the distance.  The sky is jet black
and without stars."

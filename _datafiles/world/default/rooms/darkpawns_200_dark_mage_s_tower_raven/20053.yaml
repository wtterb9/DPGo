title: "The Marble Hallway"
description: |-
  You are standing in a grand, beautiful hallway done completely in fine
  marble.  Strong, thick columns reach from the tiled floor up to the heavy
  ceiling far above.  Modern art adorns the walls here and a small doorway
  leads northward.  The hallway itself continues east and west.

title: "Dungeon Cell"
description: |-
  The vile state of this room makes your stomach lurch.  The decomposing
  cadaver of what looks to be an elf rots in the centre of the floor.
  A cot of dirty straw and a rusty basin of water set into the wall are
  the only other things in this wretched little cell.  The only exit is
  to the west through a large, iron bound door.

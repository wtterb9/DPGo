zone: Dark Mage's Tower (Raven)
title: "A Black Square"
description: |-
  You are on a some kind of a large game board.  There is either no ceiling or
  it is simply so high overhead that it is obscured by darkness.  The squares
  are about ten square feet in size, the white ones made of fine white marble,
  the black ones made of polished ebonstone.  You note that between the squares
  there is a fine, thin line of gold embedded in the huge board.  Examining the
  ground here closely, you notice faint bloodstains.  Clearly someone tried to
  clean them but maybe there was so much carnage here that it was impossible to
  purge the ground completely of evidence.  You may go in any direction.

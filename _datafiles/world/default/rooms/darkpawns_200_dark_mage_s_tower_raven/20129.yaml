roomid: 20129
zone: Dark Mage's Tower (Raven)
title: "Apprentice's Laboratory"
description: |-
  Although you have been in the alchemist's shop many times, you have never
  seen such a laboratory as this one.  Indeed, this room makes the alchemist's
  workplace seem small and insignificant.  The room is dominated by a large
  black counter upon which sit a myriad of flasks, beakers and vials.  A
  strange, large table hangs from one wall, the likes of which you have never
  seen before.  Runes of protection have been chiseled into the walls and
  ceiling.  The only exit is back to the east.
mapsymbol: #
biome: house
tags: [dark, indoors]
exits:
  east:
    roomid: 20130
nouns:
  black: ":counter"
  chart: "On one wall of ebonstone hangs a strange table with many entries upon it.
The first four you immediately recognize as basic elements -- Water, Fire
Air and Earth -- any educated person would.  But the table continues
describing many other substances of which you have never heard."
  counter: "The large counter sits in the center of the room.  Its sides are covered
with powerful runes of protection and it's black top has many stains and
chips in its surface.  Atop the workspace sit many glass vials and flasks."
  desk: ":counter"
  flasks: "Inside the many containers on the counter are strange liquids of all colors
and properties.  Some smoke and bubble, others glow and pulse.  Still others
constantly change color and some are simply plain and dull.  You are very
tempted to take a few vials of liquid with you but, since you know nothing
about alchemy, you would be very afraid to quaff any of them."
  periodic: ":chart"
  rune: "The runes have been chiseled everywhere... upon the walls, on the desk,
in the ceiling, even on the stone floor.  Although they are quite archaic
and strange, you sense that they serve to protect the room from and
accidental explosion or fire caused by the mixture of potent chemical
agents."
  runes: ":rune"
  table: ":chart"
  vials: ":flasks"
  wall: ":chart"
  workspace: ":counter"

zone: Dark Mage's Tower (Raven)
title: "Small Kitchen"
description: |-
  This facility is not very clean or well-equipped.  A few filthy pots and
  pans are strewn about, insects crawl around looking for crumbs of the rock
  hard bread this kitchen produces.  A small, rusty faucet spigot is set
  in the eastern wall and a wooden door hangs on the western wall offering
  the only exit.

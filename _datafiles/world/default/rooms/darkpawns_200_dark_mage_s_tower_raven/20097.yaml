roomid: 20097
zone: Dark Mage's Tower (Raven)
title: "Torture Room"
description: |-
  This appears to be where prisoners are taken to be tortured.  A large rack
  bolted solidly into the wall with nasty looking spikes and strong leather
  straps is covered in bloodstains.  On the walls there are diagrams of human
  anatomy and in a case near the door are a set of strangely-shaped blades.
  There are notches in the doorframe.  The only exit is through a door on the
  southern wall.
mapsymbol: #
biome: house
tags: [dark, indoors]
exits:
  south:
    roomid: 20101
    lock:
      difficulty: 2
nouns:
  blades: "The strong case houses a variety of strange looking torture blades.  They
are very sharp, you'd better not touch them..."
  bloodstains: "The wicked looking, iron spikes and blades are covered in old, dry blood."
  diagram: "The diagrams show anatomical differences between the races and methods of
interrogation.  They are quite distressing."
  door: "A hallway."
  notches: "Someone is keeping track of something... there are about 300 marks."
  rack: "The rack is a large wooden device with leather straps and long iron spikes.
Iron cables run through gears below the rack -- it appears that the rack can
be stretched."

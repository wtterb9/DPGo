nouns:
  book: "The collection of books is second to none; fiction, non-fiction, reference
books, encyclopedias of magic and everything else under the sun.  This
library makes the one in the castle look like a sad joke.  What's that?
No you can't take any!  The Mage's collection is not for lending."

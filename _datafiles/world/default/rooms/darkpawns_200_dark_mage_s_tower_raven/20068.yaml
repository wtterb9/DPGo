roomid: 20068
zone: Dark Mage's Tower (Raven)
title: "In the Great Library"
description: |-
  You are near the center of the legendary Great Library -- largest collection
  of books in the known world.  There are small tables around the area for
  studying and sturdy wooden ladders that are used to retrieve books from
  shelves too high to reach unaided.  The Dark Mage has all manner of books
  in his collection, antiquarian and contemporary.  It is rumored that there
  are ancient manuscripts from forgotten ages that have survived no where else
  but inside this mystical tower.  The library continues both south and north
  from here.

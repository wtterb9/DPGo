roomid: 20054
zone: Dark Mage's Tower (Raven)
title: "The Marble Hallway"
description: |-
  This is the most beautiful part of the marble hallway.  On the floor is a
  geometric meandering pattern of grey, white and black marble tiles, but the
  walls to the north and east are made of pure, transparent crystal.  The
  marble hall leads to the west and another hallway begins just south of here.

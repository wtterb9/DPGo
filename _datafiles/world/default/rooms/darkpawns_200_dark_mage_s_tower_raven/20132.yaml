zone: Dark Mage's Tower (Raven)
title: "Private Study"
description: |-
  This room is a cozy, private study which probably belongs to the Apprentice
  Mage.  An elegant, leather chair sits in front of a large fireplace in which
  a roaring fire blazes despite the fact that it has no apparent fuel.  Black
  candles around the room light up as you walk in the door and illuminate the
  impressive collection of spellbooks stored neatly on the shelves here.  On
  the plaster ceiling, high overhead, is a great mural which is so beautiful
  it must have taken years to complete.  An opening in the eastern wall leads
  into the darkness.

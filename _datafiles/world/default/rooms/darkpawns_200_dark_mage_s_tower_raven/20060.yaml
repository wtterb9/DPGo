roomid: 20060
zone: Dark Mage's Tower (Raven)
title: "Near the Reflecting Pool"
description: |-
  You are on a large platform just east of a large pool of still water.  The
  water does not appear to be very deep but it is so cold that you feel a
  chill just standing near it.  Powerful runes have been scorched into the
  pool itself and you assume that this pool is used as a divining aide by
  the Dark Mage on occasion.  By going west you can wade out into the pool,
  there is another exit to the east.

roomid: 20076
zone: Dark Mage's Tower (Raven)
title: "Southern End of the Great Library"
description: |-
  You are surrounded by books.  This is the southern end of the Dark Mage's
  Great Library, the largest collection of knowledge in the known world.
  Books literally line every wall, from floor to ceiling.  To the north,
  the library continues as far as you can see.  There is a small door on the
  eastern wall.
mapsymbol: #
biome: house

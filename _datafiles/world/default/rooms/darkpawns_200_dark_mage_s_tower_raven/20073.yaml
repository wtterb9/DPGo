zone: Dark Mage's Tower (Raven)
title: "The Eastern Hallway"
description: |-
  The reflective walls of black ebonstone and the carefully made plaster
  pillars give this hallway a regal ambiance.  A large picture has been
  framed and hung on the western wall and the hallway itself continues
  both to the north and south.

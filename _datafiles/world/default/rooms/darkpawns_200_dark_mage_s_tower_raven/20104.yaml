roomid: 20104
zone: Dark Mage's Tower (Raven)
title: "Graak's Room"
description: |-
  This is not a fancy room, but it is much nicer than the cells in the other
  parts of this dungeon.  A medium sized, functional bed is pushed up against
  the western wall and a nice writing desk sits perpendicular to the bed.  A
  torch bolted into the wall lights the entire room.  Anatomical charts have
  been hung from the walls and diagrams of standard torture techniques are
  taped to the desk.  The only exit is through a door to the east.
mapsymbol: #
biome: house
tags: [indoors]
exits:
  east:
    roomid: 20105
    lock:
      difficulty: 2
nouns:
  bed: "There is a neatly made bed against the wall.  There seems to be a plastic
tarp under the sheet, maybe someone has a bed-wetting problem...?"
  desk: "There is a letter addressed \"Dear Mommy\" on the desk.  It seems to be
written in blood."
  diagram: "The posters show some standard torture methods and the anatomy of the
different races.  There are glosses and notes penned in on many of them."
  torch: "It is just an ordinary, standard issue torch.  Its bolted down so that YOU
can't take it!"
spawninfo:

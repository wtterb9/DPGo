  ebony: "You see a maze through the door."
  etching: "The marks on the crystal surface of the doors were clearly done by a
talented artist.  The etchings on the white gate are a tribute to the gods,
and depict a creation scene; those on the black gate are a prayer to the
Fire Lord and depict a scene in hell; Upon the red gate are pictures of all
the great heroes of old."
  etchings: ":etching"
  gate: "The doors are breathtaking!  The white one glows so brilliantly that, at

roomid: 20043
zone: Dark Mage's Tower (Raven)
title: "Northern End of Entry Hall"
description: |-
  This is a large, ornate hallway with highly polished walls of fine, black
  ebonstone and a high, vaulted ceiling.  A deep-red carpet leads south, to
  the other end of this large room, and matching tapestries of the finest silk
  hang here on the blackened walls.  Three crystal doors are set into the
  walls here; a beautiful door of crimson crystal lies to the north, a large
  door of ebony crystal is set in the western wall, and a glowing door of
  white, gleaming crystal hangs on the eastern wall.  The hall continues to
  the south.

title: "The Marble Hallway"
description: |-
  Your footsteps resound against the marble tiled floor and echo through this
  glorious hallway.  The ceiling, high overhead, is supported by thick, ionic
  pillars and the walls here are made of highly polished black marble.  A
  large metal sculpture dominates the center of this room.  The hallway itself
  continues both east and west while a small door leads northward.

zone: Dark Mage's Tower (Raven)
title: "Small Hallway"
description: |-
  This is a comfortable, well-decorated hallway with fine wood paneling on the
  walls and a thick carpeting on the floor.  On the northern wall, in an
  elegant frame, there is a skillfully painted portrait.  You seem to be at a
  T-intersection; to the south, under a high arch, is a dark room, the hallway
  itself continues both east and west.

roomid: 20051
zone: Dark Mage's Tower (Raven)
title: "The Marble Hallway"
description: |-
  This is an immense hallway all done in marble.  Large ionic columns stretch
  up to the ceiling, far above and the floor is a meandering pattern of many
  marble tiles.  The walls are made of highly polished black marble that
  shines as it reflects your light.  Neatly arranged around the hallway are
  colorful paintings framed with grey marble.  A small room lies north of
  here, the hallway continues to the east and west.

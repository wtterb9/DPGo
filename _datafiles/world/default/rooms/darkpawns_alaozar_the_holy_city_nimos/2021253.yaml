title: West Perimeter Road
description: |-
  This is West Perimeter Road, an old cobblestone way that has run beside the
  walls of this town for centuries.  The immense, newly-improved walls block
  your way to the west and a large building prevents you from moving to the
  east, but this road continues both north and south from this point.

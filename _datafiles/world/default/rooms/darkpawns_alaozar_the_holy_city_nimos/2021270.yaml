zone: DarkPawns Alaozar, the Holy City (Nimos)
title: Sleepy Hollow Court
description: |-
  This is a well-paved little court on which people have built some rather
  large, beautiful mansions.  While you could enter the homes from this point,
  you rather suspect that the town guards would be summoned to take you away
  rather quickly; rich folk like these do not take lightly to trespassers.
  Perimeter Road is to the south.

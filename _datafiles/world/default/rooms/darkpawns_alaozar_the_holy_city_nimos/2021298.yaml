zone: DarkPawns Alaozar, the Holy City (Nimos)
title: Raven's Office
description: |-
  This is Raven's office, a large, spacious room with a hardwood floor and a
  huge mahogany desk in the center.  The north and west walls are made entirely
  of fine, transparent crystal and the view they offer is spectacular.  You can
  almost see the entire world from this room.  The eastern wall is completely
  covered with thousands of books on a large bookcase.  A plush elven run par-
  tially covers the floor and upon the desk are papers describing the laws of
  the universe -- there are editing marks and notes in the margins.  A door
  hangs on the southern wall and offers the only exit from this room.

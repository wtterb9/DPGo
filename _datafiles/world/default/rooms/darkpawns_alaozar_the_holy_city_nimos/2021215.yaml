title: North Perimeter Road
description: |-
  This is a broad street that runs parallel to the town walls.  You are on the
  northern side of Alaozar and the city walls block your passage to the north.
  Perimeter Road leads east-west while a small, stone building with a picture
  of a scroll and a magic wand upon the sign can be entered to the south.

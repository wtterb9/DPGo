title: The Portals
description: |-
  You are standing in the portal room of Alaozar, a place where travelers can
  magically travel across the lands quickly and safely. The stone walls of
  this building have strange runes of power burned into them and, upon the
  ceiling, is a large circle with magical writing within it. To the west lies
  Main Street.

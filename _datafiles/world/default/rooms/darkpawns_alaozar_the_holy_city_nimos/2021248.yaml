title: Southern End of the Ardyn Park.
description: |-
  You are standing in a large, beautiful park.  Large trees with leaves of
  silver tower high above you and several benches and tables have been spread
  around the area.  A large bronze statue stands here, pointing northward.  Just
  south of here, through golden gates, Main Street continues towards the southern
  edge of town.  To the north, the immense park continues and to the west a
  narrow roadway called Guild Street West leads into the distance.

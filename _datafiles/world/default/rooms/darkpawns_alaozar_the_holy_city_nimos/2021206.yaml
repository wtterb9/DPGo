zone: DarkPawns Alaozar, the Holy City (Nimos)
title: Atop the Southeast Watch Tower
description: |-
  It appears that this watch tower was once a prison, for, unlike the others
  around town, it has bars across the windows. A fire pit has been cut into the
  stone floor so that guards on duty can build small fires to remain warm. Arrow
  slits have also been chiseled into the walls so that defenders of Alaozar can
  rain deadly arrows upon their foes from above. The only exit is back down a
  long, wooden ladder.

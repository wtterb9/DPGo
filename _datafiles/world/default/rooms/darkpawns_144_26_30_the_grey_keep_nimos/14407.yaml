roomid: 14407
zone: (26-30) The Grey Keep (Nimos)
title: "Before the Castle"
description: |-
  The castle wall before you is made up of a strange grey material, which gives
  it an oddly forbidding appearance. Thin arrow slits line the wall to the north
  and the side of the mountain to the west has been worked smooth. As you look
  up you are amazed at how tall the castle is, although it is not nearly as tall
  as the wall slightly to your south. Green, knee-high grass rubs against you
  as you move around.

roomid: 14422
zone: (26-30) The Grey Keep (Nimos)
title: "Nimos' Chamber"
description: |-
  Nimos didn't need much room, so unlike some of Gil-Glash's other generals, he
  only asked for one small chamber without servants. The room is more like a
  cluttered attic than the abode of a powerful warlock. All sorts of books and
  scrolls litter the floor of the room, even the bed is partially covered with
  papers. Shelves, bolted into the stone walls, line every wall but the north
  one, which is dominated by a massive stone bookshelf which happens to be the
  most organized part of the room. A large mirror stands in the south-east
  corner, reflecting everything in the room at you.

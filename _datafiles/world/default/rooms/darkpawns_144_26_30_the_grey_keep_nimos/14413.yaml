roomid: 14413
zone: (26-30) The Grey Keep (Nimos)
title: "The Throne Room"
description: |-
  An enormous room opens before you, stretching well over a hundred feet to the
  other end. The ceiling is higher than all but the tallest trees. The walls and
  ceiling are layered in hammered gold, finely filigreed and delicately painted.
  Rich silk tapestries hang from the walls. The far end of the room appears to be
  one huge, red velvet curtain. Centered against the backdrop of the curtain is
  a monolithic throne. The chair itself sits atop a raised, stepped stage as tall
  as a man. The throne itself is sized to seat a giant, not a man. It is worked
  in silver and inlaid with sapphires and emeralds.

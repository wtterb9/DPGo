zone: (26-30) The Grey Keep (Nimos)
title: "The Shrine"
description: |-
  This is Hisczdrezzez's sacred shrine to the snake goddess that once spawned
  the yuan-ti race. He lets no one enter this room, and only Gil-Glash if he
  specifically demands it. There is a huge, jade statue against the western wall,
  in front of a shallow dip in the center of the floor. There is an inscription
  near the bottom of the statue.

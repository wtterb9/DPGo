zone: Xixieqi Ocean Waters (Aralius)
title: "On the Ocean"
description: |-
  Here, otters and terns circle, splashing happily into the 
  ocean.  You marvel at the schools of fish that streak through 
  the ocean as though they were birds sailing in the air.  Gales 
  rush past you, pummeling you with spray and bits of flotsam. 
     A small platform rises just above the surface of the water
  to the north.

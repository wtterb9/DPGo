zone: Xixieqi Ocean Waters (Aralius)
title: "A Rocky Coast"
description: |-
  Here, whales and sea lions sail, splashing purposely into the 
  sea.  Your ears sting as the spray highlights you, bringing tears 
  of pain to your eyes.  In the distance, you can see the foam of a 
  broken ocean eddies and waves smash into the rocky southern coast.
  The force of the gales and the waves prevent you from any kind of
  safe landing to the south.

title: "On the Ocean"
description: |-
  The wide ocean spans across your sight, making you lose all 
  sense of direction.  As you float above the surface, currents 
  crash into you, forcing you to pay attention to the water's 
  motion.  Breezes rush past you, spraying you with bits of red
  seaweed.
     A small pier lies to the south, where the ocean meets the
  coastline.  A city rises high above the pier, where foreign
  ships dock and disembark, loading and unloading their wares.

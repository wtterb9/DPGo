description: |-
  To the north you can hear the sound of water coming from the western
  passage. It sounds similar to that of a brook, yet less audible. The laughter
  of young women is barely discernable from the western passage also, arousing
  curiosity. The floor is adorned with thick sheets of white marble, and centered
  upon the wall is a battle-shield painted with the Inner Sanctum's crest.

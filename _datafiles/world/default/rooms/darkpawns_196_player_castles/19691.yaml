title: "Spare"
description: |-
  Dark marble with silver lining covers the walkway, yet the ceiling here is
  constructed with white marble. It is as if the floor is an inverse of the
  ceiling. Where there is white below, there is black above, and the converse
  is true for the ceiling relative to the floor. The overall effect is one of
  opposition; however, all of the contrasting elements make up the whole of the
  fortress, which carries an implicit significance.

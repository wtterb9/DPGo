title: "Spare"
description: |-
  An archway is draped with black cloth to the west, and one side of the
  drapery is pulled aside to allow passage. Peering through the drawn curtain,
  you can perceive the reflections of blue light cast upon unlit walls, and the
  sounds of splashing water. East of here is the focal point of the entire
  complex  the council of the Inner Sanctum. The floor here, too, is designed
  with black marble.

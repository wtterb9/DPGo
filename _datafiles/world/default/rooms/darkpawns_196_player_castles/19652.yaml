title: "The Room of Portals"
description: |-
  You enter a rather sparse room which holds no interest whatsoever apart
  from the glowing portals on the western, northern and eastern walls. Each
  reflects all sources of light creating an interesting effect within the room
  as if the light itself were alive and dancing around you. Above the northern
  portal is a small wooden sign.

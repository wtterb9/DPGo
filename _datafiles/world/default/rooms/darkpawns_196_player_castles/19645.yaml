zone: Player Castles
title: "The Sacrifical Altar"
description: |-
  Large, cathedral-styled windows line the walls of this bleak, stone-furnished
  room.  Instead of the usual primitive religious art staining the glass of these
  windows, black, blood-stained sheets have been crudely nailed into the frames
  and blot out nearly all outside light.  Books containing arcane knowledge with
  titles written in forgotten languages seem to be scattered haphazardly around
  the bare stone floor.  In the center of the room is a granite table marked with
  an array of mysterious and ominous symbols.  A thick, red liquid, possibly
  blood, flows down grooves carved into the side of the table into a rusted metal
  grating in the floor.  Through it, the screams of tormented souls who met
  torturous ends at the hands of a skilled assassin can be heard.  A flash of
  lightning briefly illuminates the room and a message scrawled in 
  blood on the far wall helps provide insight into the feverish madness of a man
  vainly chasing the specter of immortality.

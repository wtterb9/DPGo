title: "An Array of Treasures"
description: |-
  The room glitters of treasures from far off lands - priceless jewels and
  rubies overflow a large wooden chest in the corner. Along the wall, swords
  and weapons of all shapes and sizes are displayed along a large rack.
  The materials with which many of these weapons are forged are new to you
  and you wince at the thought of any of these actually causing pain to you. Off
  to the side are full suits of armor worn on wooden mannequins.

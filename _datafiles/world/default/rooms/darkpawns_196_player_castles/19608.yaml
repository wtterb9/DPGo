roomid: 19608
zone: Player Castles
title: "A Long Tunnel"
description: |-
  You enter a long tunnel lined with portraits of what you guess to be old
  dead people. Your curiousity takes over you and you feel the impulse to look
  at each one. To the west, you swear you hear a man yell "Hey Ma!" To the east,
  you can sense the void of a large open cavern.
mapsymbol: #
biome: house
tags: [indoors, notrack]
exits:
  east:
    roomid: 19607
  west:
    roomid: 19609
nouns:
  2.portrait: "A holy man with battle scars accenting kind eyes. He holds a scourge in his
hands and you ponder whether it was a tool of creation or a weapon of
destruction."
  3.portrait: "A powerful Asian man with the look of craze and chaos in his eyes. His look
of brash makes you unsure of whether he could have been your greatest ally or
enemy. And damn his muscles are big!"
  4.portrait: "A heavy warrior with an unshaven face. Numerous unwanted battles have left
this warrior's eyes dark and weary, and yet a glimmer of hope still lingers
for future tranquility."
  5.portrait: "A ninja robed in black garments whose deadly eyes seem alert and alive even
in a still painting. He wields no weapon, yet his hands seem deadly, stained
in the blood of his enemies."
  6.portrait: "Clad in armor plated in both gold and silver, this warrior seems to bear the
wisdom of the ages. Although the armor would seem to burden even the strongest
of men, it lies lightly upon his broad shoulders. In callused hands laid
across his lap is a huge broadsword with blossomed flowers along its hilt."
  7.portrait: "Holding two black daggers of eternal flame, his entire body seems to be built
for death. Yet his face tells a different story, with soft eyes of
understanding and a scar of remorse."
  8.portrait: "This last portrait seems different from the others. In it stands two elven
kids, standing over the body of what looks like a giant argent slug. One
holds two daggers, which with closer inspection both appear to have the words
\"Property of Torak\" inscribed along them. The other has a blade shaped in a
strange fashion. Their childish complexion and long ears make them look quite
proud of themselves - bearing large smiles, they appear on top of the world."
  portrait: "A dark elf with black hair and pointy ears. He wields a living dagger, almost
as sharp as the evil gleam in his eyes."

nouns:
  archaic: "Some abstract looking symbols, made up of strange curves and lines which you
find oddly appealing."
  bed: "A simple, yet very cozy looking bed."
  chair: "The leather looks very worn in, and as you run your hand over it you are
amazed at its softness."
  desk: "A well built desk made out of oak, its design looks very peculiar and you
guess that it must be centuries older than what its condition suggests.
Scattered across the top are pieces of paper, some rudimentary writing
equipment, and several half burnt out candles."

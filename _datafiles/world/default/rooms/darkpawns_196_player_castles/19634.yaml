title: "Spare"
description: |-
  Descending down the stairs, you see two sconces with lit candles flanking
  either side of the enormous stone door providing seemingly endless
  illumination. Everything here looks very old and the smell of decay is
  overwhelming. Water leaks from the ceiling in some places, bringing with it
  a monotonous dripping noise while puddles form in the corners of the room.
  Faint light glows upon moss creeping up the cold walls, producing the only
  color in this desolate black and grey environment.
     Exits lead up the stairs back into the Pyramid and south deeper into the
  tomb.

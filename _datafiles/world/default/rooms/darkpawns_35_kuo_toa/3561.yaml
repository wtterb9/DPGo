title: "Hibernator"
description: |-
  From this point, you can see a red, glowing ring at the peak of the
  center-beam. You look closer and notice that it is a heat source, and
  the water within the center of the beam is boiling. Small holes in the
  beam open up, venting steam into the chamber. This must be used to
  maintain a constant climate for proper sleeping conditions.

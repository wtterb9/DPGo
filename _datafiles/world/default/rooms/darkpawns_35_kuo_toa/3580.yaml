zone: Kuo-toa
title: "A Sandy Shore"
description: |-
  In the distance to your north and south, you see towering black cliffs 
  that form a small lagoon to the east. The cliffs provide shelter from the 
  raging waters, and have allowed the formation of this sandy inlet. Pale 
  water surges onto the shore after each breaking wave, leaving white film 
  behind at the contour of its reach. The sand is opaque, which in turn 
  absorbs the heat from the sun, making your feet noticeably warmer. To your 
  west is a thick, topical jungle.

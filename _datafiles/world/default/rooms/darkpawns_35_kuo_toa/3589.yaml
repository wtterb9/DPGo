title: "A Lush Jungle"
description: |-
  A large tropical tree juts out of the earth here, and covering its trunk
  are thousands of intertwined roots that twist about to the trunks. You see 
  some monkeys springing from one branch to the next above you, and to the 
  north a bit is a patch of rubber trees and bamboo.

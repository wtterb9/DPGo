title: "Underwater Walkway"
description: |-
  The angle that you must ascend increases dramatically, and the whole
  walkway is lifted even higher from the seafloor, almost to the point where
  it's no longer visible. The water is darker here, making it difficult to see
  with any depth, though you catch sight of a few fish when they swim close to
  the tubing.

title: "Hibernation Chamber"
description: |-
  From a porthole in the upper loft, a thick, organic ladder stretches to
  the floor. When placing your hand on the organic substance, it slowly bends
  about your hand, providing a strong grasp for climbing. Eerie light ebbs in
  and out, and for a moment everything is visible. Then suddenly, the light
  dissipates, leaving you motionless in darkness.

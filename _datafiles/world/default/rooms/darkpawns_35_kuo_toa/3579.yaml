zone: Kuo-toa
title: "A Lagoon"
description: |-
  There's an abundance of beautiful fish, including harmless sand-sharks, 
  that glide about within the clear lagoon. You see a thin, white fish with 
  yellow bands and silky threaded fins dart underneath some rocks on the 
  lagoon's floor as you pass. To the west is a black-sand beach that 
  stretches across to each crags' base.

zone: Kuo-toa
title: "A lush Jungle"
description: |-
  A boar's hide has been strung up on a tree here to dry along with some
  kelp. To the east you can make out a small clearing, and thin paths are 
  torn through the jungle in every other direction. A few ant beds rise up
  from the ground, and you realize that you've been treading over a bed of 
  ants the whole while.

title: "Southeast within the Hive"
description: |-
  Being carful not to step on any of the creatures, you painstakingly edge
  your way to the southeast corner of the Hive. The walls and ground are damp 
  and claylike, making it easy for the crablike creatures to burrow within the 
  walls for the use of storage and reproduction. Small piles of kelp are
  heaped in the corner here, proabably used as a food source.

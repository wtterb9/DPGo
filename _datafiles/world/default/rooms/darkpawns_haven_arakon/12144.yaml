zone: DarkPawns Haven (Arakon)
title: On the Docks of Haven
description: |-
  The end of the dock marks the eastern most point of the town of Haven.
  Further to the east, you can see numerous rocks and boulders which have
  been painstakingly moved here to form a breakwater and thus protect the
  shipping fleet within the bay.

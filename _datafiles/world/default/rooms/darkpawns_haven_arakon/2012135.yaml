zone: DarkPawns Haven (Arakon)
title: The Pawn Shop
description: |-
  This store is full of little trinkets and pieces of jewelry that have
  been "acquired" by the merchant, most of them cheap and damaged in some
  respect. Sailors wander in, most of them drunk, looking for something that
  could possibly be sold elsewhere for more gold than it was purchased with.
     The sounds of the dock enter through the door to the south as another
  ship arrives to offload cargo.

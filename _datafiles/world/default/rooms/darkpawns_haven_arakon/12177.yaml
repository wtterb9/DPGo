roomid: 12177
zone: DarkPawns Haven (Arakon)
title: A Narrow Dirt Path
description: |-
  The path takes a quick turn to the west and ends at the foot of an
  abandoned lighthouse. From this height, you have a fantastic view of the
  ocean to the south and of Haven bay and the town itself to the east. People
  scurry about on the docks and if weren't for the color of the roof tops, you
  may not even have noticed the town was there. It blends in almost perfectly
  with the surrounding forest which perhaps was the intention when Haven was
  first built.

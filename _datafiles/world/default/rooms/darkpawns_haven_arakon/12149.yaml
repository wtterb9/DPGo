title: Walking Down the Back Streets of Haven
description: |-
  On more than one occasion, you trip and fall on the uneven street. You
  are more concerned with keeping your footing than really watching where you
  are going, but you look up to see that the street heads east as well as to
  the south. A disused store is to the west.

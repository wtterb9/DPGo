zone: DarkPawns Haven (Arakon)
title: On the Docks of Haven
description: |-
  Sailors fill this stretch of the dock, hauling large crates and bales full
  of unknown goods. Seagulls swoop down and scavenge every morsel of food that
  is carelessly dropped. To the north, merchants line the boardwalk trying
  to sell enough to keep there stores open. The dock continues to the south.

zone: DarkPawns Haven (Arakon)
title: A Cobblestone Road in Haven
description: |-
  Merchants pass you by as you walk along the cobblestone road, some of them
  more concerned with the storage of their goods than with harassing you. To
  the east and west, a large warehouse holds the trade goods before they are
  transported out of the town and to the south, you can see the docks of Haven,
  the backbone of the town.

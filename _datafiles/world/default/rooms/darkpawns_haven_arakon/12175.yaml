roomid: 12175
zone: DarkPawns Haven (Arakon)
title: Walking Down the Back Streets of Haven
description: |-
  The street abruptly ends here, becoming a narrow dirt path that winds its
  way to the south and up towards the entrance to Haven bay. A lighthouse can
  just be seen at the very end of the path although it doesn't appear to be
  operating at this time. You have one of two choices; continue onwards to the
  lighthouse or return to the streets.

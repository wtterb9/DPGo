zone: DarkPawns Haven (Arakon)
title: At the Foot of an Abandoned Lighthouse
description: |-
  It has been many years since this lighthouse saw action, judging by the
  condition of the building and the fact that the door before you is boarded
  up to prevent people from entering. The lighthouse probably saved many a ship
  from crashing into the rocks and would have prevented countless deaths. You're
  not sure why it's no longer used, but the ships continue to sail to this port
  without hitting trouble.
     The dirt path leads back down to the town.

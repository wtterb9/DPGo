title: Walking Down the Back Streets of Haven
description: |-
  The further you walk down the street, the less used and more hastily
  prepared the area becomes. Pooling water has turned the street into a mud-
  like substance that clings to your boots and clothing. To the south, a
  curtained doorway prevents you from seeing into the building that is there.

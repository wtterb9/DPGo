title: The Sleeping Quarters
description: |-
  With the lack of use, the inn keeper no longer pays for the upkeep of these
  rooms which is evident by the rubbish which litters the floor and the filthy
  mattress in the corner of the room. It's a wonder that anyone would chose to
  stay here at all but you are unlikely to be disturbed should you wish to do
  so. The only exit from the room is to the east.

zone: DarkPawns Haven (Arakon)
title: A Sandy Path
description: "You trudge your way along a sandy path that initially heads east towards\nthe
  coast before sloping down to a small beach to the south. A cobblestone\nroad to
  the west simply begins and marks the eastern entrance to the port\ntown of Haven.\n
  \  At times, you are forced to cover your face as sand is whipped up by \nstrong
  gusts of wind. The piercing shrieks of seagulls are the only sounds\nyou can hear
  above the wind."

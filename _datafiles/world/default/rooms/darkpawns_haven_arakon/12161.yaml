zone: DarkPawns Haven (Arakon)
title: Haven Bay
description: |-
  You find yourself paddling in Haven bay between two of the Haven docks.
  Sailors with no care for the environment have tossed garbage into the bay
  over the years and the majority of it is now floating alongside you. Seagulls
  dive down to pick the more tasty morsels from the bay's grasp before returning
  to their heights.

roomid: 2012173
zone: DarkPawns Haven (Arakon)
title: Haven Bay
description: |-
  As you wade through the shallows, you drift closer to the breakwater to
  your east. Although the majority of the rocks have been smoothed over time,
  the odd one or two is still quite sharp and poses some risk. The bay stretches
  away to the west or you can return to land to the north.

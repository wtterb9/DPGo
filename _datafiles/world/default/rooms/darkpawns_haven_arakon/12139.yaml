zone: DarkPawns Haven (Arakon)
title: On the Docks of Haven
description: |-
  As you walk out onto the western dock, Haven bay splashes by below you.
  Seagulls float around on unseen currents of air, enjoying the attention they
  will soon be getting when old fish are thrown out to make way for new stock.
  The dock continues to the south while the town's boardwalk is to your north.

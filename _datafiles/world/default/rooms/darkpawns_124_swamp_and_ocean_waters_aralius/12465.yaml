zone: Swamp and Ocean Waters (Aralius)
title: "On the Ocean"
description: |-
  Here, porpoises and manatees swim, splashing happily into the 
  water.  You marvel at the schools of trout that streak through
  the sea as though they were birds coasting in the air.  In the 
  distance, you can see the foam broken water currents as they
  dash against coral reefs.

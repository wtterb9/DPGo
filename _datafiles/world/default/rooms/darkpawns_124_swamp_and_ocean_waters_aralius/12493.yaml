zone: Swamp and Ocean Waters (Aralius)
title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the water. 
  You marvel at the schools of mackerel that streak through the ocean
  as though they were birds sailing in the air.  In the distance, you
  can see the foam of broken ocean currents.

zone: Swamp and Ocean Waters (Aralius)
title: "On the Ocean"
description: |-
  You are floating above the listless surface of the water.  You 
  marvel at the schools of salmon that streak through the sea as 
  though they were birds coating in the air.  Gales blow into you,
  spraying you with algae and bits of seamoss.

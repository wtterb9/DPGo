roomid: 12474
zone: Swamp and Ocean Waters (Aralius)
title: "On the Ocean"
description: |-
  Here, otters and manatees circle, splashing purposely into the 
  sea.  You marvel at the schools of salmon that streak through the 
  sea as though they were birds coasting in the air.  In the distance,
  you can see the foam of broken sea waves whiten the surface of the
  water and crash against the tall vertical cliffs of a small island
  to the southeast.

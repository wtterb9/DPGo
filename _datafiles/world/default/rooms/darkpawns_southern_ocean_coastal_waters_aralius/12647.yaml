title: On the Ocean
description: "You are floating above the churning surface of the sea.  You \nmarvel
  at the schools of tuna that streak through the water as \nthough they were birds
  sailing in the air.  In the distance to\nthe west, you can see the spewing of water
  from a blowhole of a\nwhale.\n   To the east, rising majestically from the ocean,
  the tall \nsheer walls of a cliff define the impassible border of a small\nisland."

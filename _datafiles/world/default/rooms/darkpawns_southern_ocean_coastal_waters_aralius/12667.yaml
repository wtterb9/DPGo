title: On the Ocean
description: "Here, porpoises and otters swim, splashing happily into the clear\nwater.
  \ You marvel at the schools of sea trout that streak through\nthe sea as though
  they were birds coasting in the air.  \n   To the north and west, you see the high
  cliffs of an island rising\nhundreds of feet into the sky.  The cliffs appear smooth
  and a bit\nweather-worn as they take the brunt of southern storms."

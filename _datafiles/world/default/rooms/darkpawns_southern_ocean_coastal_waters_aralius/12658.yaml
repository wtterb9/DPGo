title: On the Ocean
description: "Here, porpoises and manatees skim, splashing happily into the \nwater.
  \ You marvel at the schools of sea trout that streak through\nthe sea as though
  they were birds coasting in the air.  \n   Just to the south and west, you see the
  high cliffs of an island\nrising hundreds of feet into the sky.  The cliffs appear
  polished,\nas though there were created and smoothed by hand, rather than\nshaped
  by ocean winds and crashing waves."

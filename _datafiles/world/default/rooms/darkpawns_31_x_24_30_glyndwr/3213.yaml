title: "The Forest"
description: |-
  You are standing amidst tall pines and firs.  A few birds and forest
  foragers rustle about the ground, stirring leaves and twigs as they
  rush about in frolic.
     To the southeast lies the walls of a small town, the center of which
  houses a rather stately castle. South of here you can see a gate in the
  wall, and in all other directions lies forest.

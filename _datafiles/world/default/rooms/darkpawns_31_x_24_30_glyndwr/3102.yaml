title: "A Dirt Road through the Forest"
description: |-
  The forest crowds in around you, as if eager to reclaim the path you are
  travelling upon.  In some places the brush is so thick that you are forced to
  hack your way through.  In one such section, your efforts reveal a decrepit
  building just to your east.  You can still see remnants of the path to your 
  north and south.

title: "A Dirt Road through the Forest"
description: |-
  The ironwood trees begin to thin out, giving way to huge ancient willows 
  and oaks festooned with spanish moss.  The effect is eerie.  A trail running
  roughly north and south can be barely made out, and a narrow path to the east
  leads behind some tall ironwood trees.
     As you scan the trail to the south, you make out a set of gates, mostly
  obscured by the branches that jut out into the path.

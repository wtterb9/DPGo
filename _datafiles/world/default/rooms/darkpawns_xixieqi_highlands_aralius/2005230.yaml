title: Cliff Face
description: |-
  You are standing atop a hill, just below a near-vertical cliff face.
  The view from here is extraordinary, as you look out over the rolling
  hills to the south and east.
     To the west outcroppings of tectonic plate shifts have thrust up from
  the surface and prevented traveling in that direction, while to the south,
  the cliff face provides an even more impassible climb, as the faint rushing
  of gusting winds prevent you from even flying to the top.

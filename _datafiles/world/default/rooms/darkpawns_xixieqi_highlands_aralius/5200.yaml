zone: DarkPawns Xixieqi Highlands (Aralius)
title: Sloping Hills
description: |-
  You are wandering in some tall grass, just south of a hillock that shows
  evidence of long-waged battles.  The yellow-green reeds of grain grow tall
  here, and seem to deepen into a richer, brighter hue as you head south, up
  the face of the sloping hills and into the wilderness beyond.
     Hills of greenery continue all around you, save north, where a defensable
  hillock looks out over the northern desert, and west, where outcroppings of
  basalt appear to have been blasted out of the ground at odd angles.

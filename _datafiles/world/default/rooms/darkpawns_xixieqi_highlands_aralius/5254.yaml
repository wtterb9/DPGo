zone: DarkPawns Xixieqi Highlands (Aralius)
title: A Mountain Road
description: "You are standing on a steep road, surrounded by tall pines.  The view\nfrom
  here is lovely and to the north you can look out and see the desert\nacross the
  northern horizon.\n   Mossy rocks lie to either side of the road, their green faces
  showing\nwhich way is north, while their lichens point out the western direction\nof
  the mountain.\n   The road descends into the lower elevations to the north and climbs\nhigh
  into the clouds to the south.  Rocks and trees lie too dense to \ntravel anywhere
  else."

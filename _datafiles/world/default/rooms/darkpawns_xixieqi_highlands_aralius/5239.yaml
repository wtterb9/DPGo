zone: DarkPawns Xixieqi Highlands (Aralius)
title: Some Wooded Paths
description: "You are standing on a hill of high grass, just west of a dense thicket\nof
  impenetrable undergrowth.  It appears that this is the eastern border\nof the grassy
  foothills, where it stops amid a cluster of tall, leafy\ntrees and mountain-rainforest-type
  shrubs.\n   To the north you can see the path stop abruptly at a tall shelf of \nrock,
  while to the south, you can barely make out the trail that winds\nthrough the sloping
  hills.\n   The hills continue at this elevation to the west, though you have to\nhack
  your way through some brush to get through it."

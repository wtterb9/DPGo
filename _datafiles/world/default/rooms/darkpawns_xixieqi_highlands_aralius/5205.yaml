title: Sloping Hills
description: |-
  You are wandering in some tall grass, just east of a road that splits
  these foothills into separate tracts of land.  Though the grass and reeds
  around you are chest-high, you can make out the desert to the south and
  catch the faintest sound of a screeching hawk on the breeze.
     Grasses sway all around you, save west, where a road offers some sense
  of direction.

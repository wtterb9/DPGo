title: Grassy, Sloping Hills
description: |-
  You are wandering in some tall grass, just west of a road that splits
  these foothills into separate tracts of land.  Though the grass and reeds
  around you are chest-high, you can make out the desert in the far, far
  distance to the south.
     The hills continue all around you, save east, where a road offers some
  sense of direction.

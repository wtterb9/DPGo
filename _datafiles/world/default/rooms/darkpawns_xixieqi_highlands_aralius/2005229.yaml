roomid: 2005229
zone: DarkPawns Xixieqi Highlands (Aralius)
title: Some Wooded Paths
description: |-
  You are standing on a hill of high grass, just west of a dense thicket
  of impenetrable undergrowth.  It appears that this is the eastern border
  of the grassy foothills, where it stops amid a cluster of tall, leafy
  trees and mountain-rainforest-type shrubs.
     To the north you can see the path wind through down the shrub-covered
  slope toward more open ground, while to the south, you can barely make out
  the trail that continues through the sloping hills.
     The hills continue at this elevation to the west, though you have to
  hack your way through some brush to get through it.

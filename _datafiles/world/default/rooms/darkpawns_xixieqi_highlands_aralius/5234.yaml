title: A Road Through The Hills
description: |-
  You are standing on a gravel road that winds though the rolling hills
  all around you.  Trees and shrubs dot the grassy terrain while patches
  of moss and lichens adorn their trunks and stems.
     The hills continue to the east and west, while the road ascends to
  the south and flows through the rolling terrain to the south.

title: A Carved Cliff
description: "You stand below a vertical cliff, looking out over the northern\nhorizon,
  across fields and rolling hills of tall grass.  \n   Here, someone has taken the
  time to chisel into the rock the head\nof a serpent - a companion to the one across
  the road to the east.\nIt appears that gems or glass were once in place in the carving's\neyes,
  but have long since vanished.\n   The hills continue to the west and north, while
  a road appears\nto scale the mountains to the east.  Only the cliff face appears
  to\nthe south and there seems no way to scale it."

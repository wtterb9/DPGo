title: A Road Through The Hills
description: "The road widens here into a large circular lot as the northern caravan\ntrail
  through the forest meets this lane that comes straight out of the \nhills to the
  south.\n   A few empty, broken crates litter the ground here, perhaps evidence of\nan
  accident, or a past enchange of goods between those who dwell in the\nmountains
  and those who live on the coast and in the desert.\n   Hills and fields span to
  the eastern and western horizons, while the\nroad continues north and south."

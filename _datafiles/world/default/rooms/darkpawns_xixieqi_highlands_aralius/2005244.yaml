zone: DarkPawns Xixieqi Highlands (Aralius)
title: A Road Through The Hills
description: |-
  You are standing on a rough gravel road where the sloping hills begin
  their ascent into the snow-capped peaks to the south.  Rocks and tall,
  leafy trees blanket the terrain and surround the road while offering a
  bit of shelter to the noisy groundling birds and squirrels that chitter
  at your approach.
     The hills continue to the east and west, while the road ascends to
  the south and flows through the rolling terrain to the south.

title: A Narrow Space Between Mountains
description: |-
  You are on a thin trail that lies between two mountains. If attacked here, the
  space would be hard to defend, but you feel safe here, and for some reason
  believe that the danger is all ahead. To the north the trail continues and to
  the south lies the forest.

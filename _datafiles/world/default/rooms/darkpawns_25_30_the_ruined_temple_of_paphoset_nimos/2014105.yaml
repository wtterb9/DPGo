zone: DarkPawns (25-30) The Ruined Temple of Paphoset (Nimos)
title: Archives
description: "This chamber was designed to house books, scrolls, and artwork glorifying\nPaphoset,
  and to preserve detailed records of his words and deeds as a god.\nObviously, this
  room was not used for long, for Paphoset never reached his \ngoal of divine ascension.
  All books glorifying the king at the expense of Set\nand other gods were destroyed
  long ago. The room is now barren."

title: The Ballroom
description: "Apparently, whoever designed this crypt thought that dead men entertained,\nbecause
  this room is set up as a nice ballroom. Giant candle chandeliers \ndangle from the
  ceiling. The candles are unlit but the candle holders \nglow with an unearthly,
  dark light. There are no furnishings in this room\nbut the walls are decorated with
  more faded paintings, showing more of\nLothar's brave deeds."

zone: DarkPawns (25-30) The Ruined Temple of Paphoset (Nimos)
title: The Grand Hall
description: "This room is decked out as a great banquet hall, a place for Lothar
  and his\nnoble companions to have great feasts in the afterlife. There is a long\ntable
  in the center of the room with twelve stout, wooden chairs. The table\nand the chairs
  are all lavishly decorated with carvings of wild game. The \nwalls contain displays
  of weapons and shields. The displays are old and\nrusting, and it is obvious that
  there is nothing of any value there."

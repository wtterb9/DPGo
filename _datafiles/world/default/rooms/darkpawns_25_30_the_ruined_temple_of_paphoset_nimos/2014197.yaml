roomid: 2014197
zone: DarkPawns (25-30) The Ruined Temple of Paphoset (Nimos)
title: The Atrium
description: "The narrow crawlspace suddenly opens up in to this dimly lit atrium.
  \nThis room is completely circular, with walls covered in heiroglyphs carved\nin
  bas-relief.  The ceiling here is a smooth, unadorned dome, what little\nlight there
  is appears to come from recessed sources above the lip of\nthe walls and is reflected
  faintly by the dome.  What is most disturbing\nabout this place is the total lack
  of any signs of life.  It is eeriely quiet,\nand the air seems cooler than that
  in the rest of the temple.  In stark\ncontrast to the rest of the temple, this room
  apears to be dust-free.\nTo the north, there appears to be another chamber whose
  entrance is covered\nby a tattered velvet curtain."

zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: The Well of Souls
description: |-
  Serapis' most horrific creatures are sprung into existence here, in the depths
  of the brackish pool that fills the center of the room. A ball of light hangs
  suspended by magick in the air above the pool, filling the room with a soft
  glow that seems to make more shadows than it dispels. The entrance to the west
  seems to have disappeared.

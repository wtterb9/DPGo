zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: Edge Of A Canyon
description: |-
  You stand on the very edge of a canyon.  The horizon on the other side is
  dotted with trees and other signs of flourishing life, but the deadly drop to
  the south makes it far out of your reach.  A sandstorm to the west threatens
  to overtake you as you look out over the ravine.

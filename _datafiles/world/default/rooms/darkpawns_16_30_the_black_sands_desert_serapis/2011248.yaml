zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: A Path Along the Wall
description: |-
  Rakshasan citizens travel along this path, ignoring you as they go about
  their business.  You notice the blandness of the decorations and the lack of
  vegetation of the village, and begin to wonder why they would choose this
  area in which to live.
     To the west you see a large hut.  The path leads east through the village.

title: Behind the Heathen Altar
description: |-
  Blood and gore cover the walls in this den of putrid evil.  You wonder to
  yourself what has led you to proceed into this mausoleum, and the dark shape
  that seems to rise endlessly from the floor makes you wonder if this will be
  your final resting place.

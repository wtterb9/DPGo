title: Before the Sphinx
description: |-
  Perhaps what would be the only shade from the daytime sun for miles
  lies here.  Beside the base of stone that rises well above you, a dark
  statue rises into the desert sky.
     A massive dune towers to the northwest, while other marble figures
  can be seen to the north and west.

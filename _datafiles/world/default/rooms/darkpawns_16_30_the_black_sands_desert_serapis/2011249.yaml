title: Inside The Gate
description: |-
  You see Rakshasan citizens scurry along the road to their destinations,
  seeming to be in a hurry to complete their tasks.
     From here you can make out the details of the village: the wide, dusty
  streets, the windowless straw and mud huts, the dry, cracked village walls,
  and the general lack of vegetation in the area.
     The road leads east, south, and west through the village and out to the
  desert to the north.

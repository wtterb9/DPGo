title: The Entrance to a Dark Magic Shop
description: |-
  This unlit shop smells strongly of herbs and decaying flesh.  The shadows
  are thick and you become aware of a Rakshasan watching you from the corner as
  you examine the wares around you.
     To the east is a door and to the west is the main street.

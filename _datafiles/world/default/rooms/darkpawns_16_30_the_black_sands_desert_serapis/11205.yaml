title: A Dusty Road Through The Desert
description: "This worn trail can barely be called a road.  It has seen little use
  and\nthreatens to be turned back into desert.\n   To the north, a basalt monolith
  blocks passage in that direction.  You \ncan hear sounds of spewing sand behind
  it and are thankful for the defense."

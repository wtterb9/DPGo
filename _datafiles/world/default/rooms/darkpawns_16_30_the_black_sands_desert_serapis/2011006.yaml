zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: The Desert
description: |-
  Sweat streams down your body as you trudge through the heat-retaining
  sands.  Only thoughts of water and shelter from the sun fill your mind.
     A row of basalt monoliths streak from the surface to the north, much
  to steep and wind-smoothed to climb.

zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: The Barrows
description: |-
  You stand ankle-deep in a trench of loose sand.  The edges of the ditch are
  about eye level, and you could scale them, even though it would be difficult.
  Below you opens an enormous hole into which you can easily descend, but it is
  quite dark and may require an external light source.

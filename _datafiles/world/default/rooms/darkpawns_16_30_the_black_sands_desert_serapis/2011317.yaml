title: A Straw Hut
description: |-
  This is where the Rakshasan citizens live.  The hut is made of a straw and
  mud mixture and displays only a rug on the floor and a table in the corner.
  On the table are some bones, though it is hard to make out whether they are
  the bones of humans or some animal.
     To the west an exit leads to the street.

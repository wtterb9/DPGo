title: The Desert
description: |-
  A tall man clad in white appears on the horizon, then vanishes as you
  blink, leaving you wondering if it was real or yet another mirage.
     What is most definitely not a mirage is the gaping sandhole to the
  west that seems to grow as the desert sands are swallowed by it.
     Realizing what a rapid death that would be, you reconsider your other
  options of travel.

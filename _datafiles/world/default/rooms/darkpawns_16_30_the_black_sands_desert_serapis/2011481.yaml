title: In the Abandoned Citadel
description: |-
  The spiral stairway rises above you, fading into darkness before you can see
  the roof. An enormous pile of bleached bones has built up in the middle of the
  stair's spiral, obviously having been flung down from above. Insects crawl all
  about, living off of this macabre spectacle.

zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: In the Desert
description: |-
  The dryness of the air flakes your skin and makes you mouth so dry it
  seems to crack even the inner walls of your cheeks.  Looking southward,
  you see a large dune rise against the horizon.  Elsewhere you see only
  dark sand.

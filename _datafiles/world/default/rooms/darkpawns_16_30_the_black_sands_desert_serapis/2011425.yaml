zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: The Bottom of the Slide
description: |-
  Your feet slip out from under you as you try to climb down the treacherous
  incline, and a startled scream slips from between your clenched teeth. After
  a short rough ride, you stand dazed and battered at the bottom of the slide.
  Judging from the bones sticking up out of the mud, you're not the only one
  to have been trapped here.

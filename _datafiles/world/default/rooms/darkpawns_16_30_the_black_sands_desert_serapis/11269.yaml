roomid: 11269
zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: A Dark Weapons Shop
description: |-
  Candles on the wall illuminate the room just enough for you to see all the
  full weapons' racks on the walls.  Apparently the Rakshasa aren't a peaceful
  bunch.  You cannot seem to find the keeper of all these weapons, so you are
  wary, careful not to turn your back for too long to the dark corner of the
  room.  He may be hiding there.  A large sign hangs on the wall.  There is
  a door to the east.
exits:

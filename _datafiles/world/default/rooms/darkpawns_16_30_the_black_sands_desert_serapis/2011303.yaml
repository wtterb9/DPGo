title: The Temple Altar
description: |-
  In the center of the room, you see a black marble altar shaped like a huge
  tiger claw.  There are bloodstains all around the room, not just on the altar.
  There have obviously been many sacrifices to the Brown Dragon in this room.
  You can almost hear the screams of those who have been tortured here.
     To the north and west you can see the chamber lead away from the altar.

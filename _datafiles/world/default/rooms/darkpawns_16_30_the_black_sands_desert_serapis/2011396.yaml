title: The Second Cavern
description: |-
  Your boots crunch on something as you enter the cavern, and you look down
  to see the bones and trappings of some poor desert nomad.  Shining your light
  around, you can't see the floor due to the myriad other shiny skeletons that
  litter the floor.  In the shadows, you sense that the cause of all the death
  looms before you.

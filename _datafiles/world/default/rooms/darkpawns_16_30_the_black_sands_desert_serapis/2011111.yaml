zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: The Oasis
description: |-
  A well of water springs forth from deep within the desert here.  A
  few ragged palms and shrubs huddle near to the life-giving pool, but the
  harsh sun keeps anything from flourishing beyond the tight ring of green
  growth.  Tracks of many undefinable animals can be seen near the edge of
  the water.

roomid: 11376
zone: DarkPawns (16-30) The Black Sands Desert (Serapis)
title: A Step Into The Canyon
description: |-
  You seem to be caught in some sort of cross wind as you make your plunge
  into the canyon. Suddenly, you realize that not even a magical ward of flying
  would be sufficient to stop the winds from dashing you into the hard, sharp
  surface of the canyon walls that pierce and batter you.
     Mercifully, you begin to lose consciousness before you reach the thrusting
  spire below you and you take consolation in the fact that your death is not
  a slow one.

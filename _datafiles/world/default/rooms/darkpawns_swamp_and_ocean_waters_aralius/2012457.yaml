title: On the Ocean
description: "Here, otters and terns circle, splashing happily into the \nocean.  You
  marvel at the schools of mackereal that streak through \nthe ocean as though they
  were birds sailing in the air.  Gales \nrush past you, pummeling you with spray
  and bits of flotsam."

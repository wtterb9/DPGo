title: On the Ocean
description: |-
  The wide sea spans fills your perception, making you lose all
  sense of direction.  Your wrists sting as the spray bites into
  you, bringing tears of pain to your eyes.  A broken buoy floats
  here, tossed along at the mercy of the sea.

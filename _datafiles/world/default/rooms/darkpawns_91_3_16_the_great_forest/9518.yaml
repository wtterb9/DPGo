zone: (3-16) The Great Forest
title: "Deep within the Forest"
description: |-
  While traveling through the forest, you suddenly notice how deathly quiet
  it is. It seems as though the thick, twisted branches have swallowed up all
  signs of animal life and plunged you deep into an alien world of green.
     Glancing around you, you can barely make out the peaks of tall mountains
  peeking through the occasional breaks in the tree limbs.

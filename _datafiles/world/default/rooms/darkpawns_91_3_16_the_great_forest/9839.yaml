zone: (3-16) The Great Forest
title: "On the River"
description: |-
  You are in the middle of the river. Here, it curves, forming small
  eddys that quickly vanish and reappear elsewhere. To the north, the 
  river flows in from the east and heads south where it quickly whips
  into the banks and sloshes westward.
     Thick forest flanks the river to the east and west, providing a
  safe location to land.

description: |-
  The trees grow thick in this part of the woods, swallowing the natural
  light from above and throwing the forest floor into shadow.  Between the
  breaks in the trees, you can sometimes make out a few dark, snow-covered
  peaks.
     You can push through the underbrush in any direction.

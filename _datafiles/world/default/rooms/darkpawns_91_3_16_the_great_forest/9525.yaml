title: "Deep within the Forest"
description: |-
  While traveling through the forest, you suddenly notice how deathly quiet
  it is. It seems almost as if the thick, twisted branches and roots have 
  swallowed up all signs of animal life and plunged you deep into another
  alien world of green. All around, you see a huge mountain range rising high
  into the sky.

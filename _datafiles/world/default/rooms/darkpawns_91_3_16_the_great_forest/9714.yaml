title: "Inside the Lakeshore Tavern"
description: |-
  You are standing just inside the Lakeshore Tavern, gathering place of many
  heroes and adventurers of legend. The common room that you are standing in 
  has a warm friendly look. The rough stone walls hold portraits of many of the
  famous people who have patronized this place at some time or another. Tables
  and chairs surround you to the north and east, some filled with chattering
  people.  
     South of here, some stairs lead to what must be the guestrooms, while the
  bar lies to the southeast.

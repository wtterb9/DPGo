title: "The Coast"
description: |-
  You stand at the edge of the great forest on the coast of an ocean that
  spreads as far as the eye can see.  A lighthouse stands behind a tall rock
  outcropping that blocks the shoreline and forms a formidable breakwater
  against stormy tides.
     The ocean lies to the south.

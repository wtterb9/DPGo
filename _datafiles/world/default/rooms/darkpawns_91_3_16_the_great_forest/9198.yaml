title: "The Forest"
description: |-
  You are standing in the great forest.  Here, a small path winds down a
  small ravine.  Thick underbrush obscures most of what can be seen down
  there, but you feel certain that you can make out moving figures.
     The forest continues in all directions, though the ravine seems to 
  conceal a hidden valley below you.

title: A Small Room
description: |-
  There are no pictures on the walls here, instead there are a number
  of shelves lining the walls.  On these shelves there are various forms of
  pottery and utensils made from clay.  These must have belonged to whoever is
  buried in this tomb.  The only exit lies to the south.

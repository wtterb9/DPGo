title: The Entrance To The Tomb
description: |-
  You now stand in a room of sorts with some of the walls being solid
  rock and other walls appearing to be manmade.  These walls consist mostly of
  large blocks of rock stacked upon each other.  You wonder how it is possible
  to stack these inside of a mountain.  Exits lie to the north, south and to
  the west.

title: In The Mines
description: |-
  You now stand inside the entrance to the mine.  The interior is
  extremely dark and there is a rather pungent odor within the confines of
  these mines.  You notice many footprints scattered about the floor of the
  mine, indicating that you are not alone in here.  To the west is the exit to
  the desert, and to the north and south lie passages that continue on into
  the depths of the mine.

roomid: 12201
zone: (8-17) The Swamp
title: "In a Marsh"
description: |-
  The ground becomes ever softer and yeilds and springs with every step.
  Mosquitoes buzz in your ear and find even the smallest chink in your armor to
  bite at the tender flesh underneath. A nauseating stench comes from the 
  south, heralding the start of a swamp. To the east and west huge ironwood 
  trees can be seen rising up into the sky.

title: "A Safe Haven"
description: |-
  This ancient room whispers of unfathomable history and wealth.  Intricate 
  marble carvings interlace and entwine within themselves along the thick
  columns that line the walls.  Brass-leaf lanterns hang suspended from the
  ceiling, bathing everything in an ethereal glow.  Rich, plush rugs cover
  the black marble floor, scattered with silken and velvet pillows.  Above,
  three cresent moons have been carved from the cathedral ceiling to gaze
  upon the heavens above.

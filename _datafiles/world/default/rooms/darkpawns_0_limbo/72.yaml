title: "Nevyn's Room"
description: |-
  The room before you reeks of the sharp, clean smell of plants, spring
  growth, rotting leaves, and biting nettles. A large iron cauldron stands in
  the center of the room cooking over redly glowing coals. Steam rises from
  under the cauldron's lid. The walls are crammed with boxes; the ceiling is
  hung with bunches of strange herbs, many of them still fresh. You hear a
  sudden scuttling noise, and one of the boxes falls from a shelf, spilling
  black seeds over the dirt floor.

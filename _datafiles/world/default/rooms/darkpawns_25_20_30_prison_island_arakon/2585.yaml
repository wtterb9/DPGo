title: "A Narrow Dirt Path"
description: |-
  You stand at a junction in a narrow dirt path that winds its way
  through the overgrowth to the north and east. Large trees and all manner of
  plant-life surround the path which would make travel difficult. There is
  a large, open gate to the west which allows entry into a paved courtyard.

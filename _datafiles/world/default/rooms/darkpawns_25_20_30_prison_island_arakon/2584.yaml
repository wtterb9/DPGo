title: "A Paved Courtyard"
description: |-
  You stand at the entrance to a rather grand looking, if not run down,
  collection of wooden buildings shielded from the majority of island overgrowth
  by large walls. Cracked and mouldy cobblestones cover the ground, adding to
  the sense of decay which strikes you. To the east, open gates lead back into
  the wilderness while small walkways lead to the west and south.

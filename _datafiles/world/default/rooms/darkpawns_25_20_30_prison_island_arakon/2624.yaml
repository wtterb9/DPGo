title: "An Enclosed Compound"
description: |-
  You stand at the entrance of a wide, open area enclosed within wooden
  walls. Someone has gone to a great effort to both clear this place of
  vegetation and ensure it remains clear. Ramshackle huts sit in the corners
  to the west, east and further away to the southwest and southeast. A narrow
  dirt path leads away to the north into the dense jungle.

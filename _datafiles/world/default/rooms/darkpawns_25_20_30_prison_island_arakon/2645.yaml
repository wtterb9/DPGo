roomid: 2645
zone: (20-30) Prison Island (Arakon)
title: "The Top of the Bell Tower"
description: |-
  You are offered a remarkable 360 degree view of the island and surrounding
  ocean. Rough waves crash into the cliff faces, an extensive reef preventing
  anything from coming remotely close to the island. There is, however, a
  sandbar on the northern side which would allow a ship to dock if it were
  careful enough.
     You're almost blown from your vantage point by the now strong wind which
  cuts through your armor and clothes. The bell that hangs here is no more than
  a rusted shell, incapable of creating very much noise. Stairs are the only
  exit from the top of the tower.

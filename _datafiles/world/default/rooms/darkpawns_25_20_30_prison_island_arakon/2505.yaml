zone: (20-30) Prison Island (Arakon)
title: "A Dense Jungle"
description: |-
  You emerge from the thickness to the south and the view before you leaves
  you breathless. Standing at the top of an 80-foot cliff, the world around
  you is amazing to say the least. Ocean waves crash against the cliff face
  to the west while the waters of the island lagoon lap calmly to the east.
  Behind you, the island you find yourself on is covered in all forms of
  plant-life which make travel look difficult.
     Towards the southwestern corner of the island you can see a fairly large
  wooden structure but you have no idea on how you're going to get there.

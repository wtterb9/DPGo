title: "A Prison Cell"
description: |-
  The cell is very small and is in no way comfortable - although you would
  expect prisoners would not be afforded the luxuries of law abiding citizens.
  The eastern wall is made simply of iron bars which show the signs of
  corrosion, a likely effect of the sea air. A small window on the western
  wall, again with bars to prevent escape, allows you to view the vastness
  of the ocean which surrounds the island.

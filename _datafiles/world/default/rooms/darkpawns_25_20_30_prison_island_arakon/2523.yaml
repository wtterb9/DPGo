roomid: 2523
zone: (20-30) Prison Island (Arakon)
title: "A Dense Jungle"
description: |-
  The lushness of this area stops suddenly as you stand on the edge of a
  large cliff. The ocean lies before you to the west and waves crash against
  the cliff face with an almighty force. A narrow walkway exists to the south
  which appears to follow the ridgeline above the cliff and is free from the
  undergrowth which dominates the rest of the island.

title: Sulfur Fur Forest
description: |-
  You stand below a canopy of tall hemlock trees.  Around you, high
  mountain walls and pine branches meet to prevent light and heavy winds
  from touching the ground here.  To the north and west, mountain walls
  impede your travel while to the south and east, more of the forest
  allows easy passage.

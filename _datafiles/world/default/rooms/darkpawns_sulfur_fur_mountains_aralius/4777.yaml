zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: The Base of the Cliff
description: |-
  You are standing at the bottom of a steep cliff.  A climbable trail curves
  up the cliff face to the west to an opening in the cliff.  All around you,
  sulfurous moss grows on pale trees and shrubs.  You feel very, very warm,
  and the ash on the ground indicates some volcanic activity nearby.  An
  outcropping of rocks, perhaps the face of a new mountain, blocks the way
  to the east, while clear trails run north and south from here.

zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: An Open Cavern
description: "You are standing in a closed canyon.  At one point in the past, this\nplace
  obviously had a ceiling, but much of it appears to have collapsed\ninto the stalagmites
  around you.  Above you, you can see the dark smoke\nwhich blots out the sunlight,
  leaving the area in eternal dusk.  To the\nnorth, a trickle of water breaks through
  a crack in the wall while to the\nsouth and west, the cavern continues.  The lichen-covered
  wall to the \neast looks smooth and unmarred by the collapse."

title: An Antali Guardhouse
description: |-
  You are standing in a massive stone fortification.  High walls of dark
  stone surround you.  Several Antali guards are here, talking quietly and
  stoking the hearth which rests in the southern wall.  The walls and floors
  are spartan, as though the guards need only the chairs and the tables
  they converse at to fulfill their duties.

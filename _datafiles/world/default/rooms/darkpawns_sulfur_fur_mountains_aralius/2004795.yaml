zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: A Mountain Cave
description: |-
  The frigid winds of the mountains outside are absent here among the
  stalactites of ice and stone.  Around you, bones and scraps of fur
  litter the cavern floor.  There are solid walls to both the north and
  south, impeding progress in those directions.  To the west, the cave
  leads deeper into the mountain, while back to the east, the cave entrance
  is becoming covered with snow.

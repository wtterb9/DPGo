title: A Canyon Floor
description: "You are standing at the bottom of an ash-filled canyon.  Smooth yellow\ncliff
  walls rise high to the east and west, forming a smooth north-\nsouth path.  To the
  north and south, the canyon seems to stretch\nforever.  You feel tired as you plow
  your way through knee-high \nsulfurous ash."

title: A Smoldering Valley
description: "Ash covers the moist gound here.  All around you, the haze and smoke
  of\nrecent volcanic activity make you cover your mouth to breathe. To the north\nand
  east, the valley floor continues, while to the west, a break in the\ncanyon wall
  seems to lead to some sort of open cavern.  To the south, \na massive cliff wall
  extends sharply out of the ground.  Bits of patchy\nyellow moss cling to its surface."

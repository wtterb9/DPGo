title: Snow Mage's Sanctuary
description: |-
  Skulls and bones litter the floor around you as you step through the
  cluttered room of parchment and skins.  An enormous cot rests against
  the northwestern corner, providing a comfortable resting place for
  the holy mage of the tribe.
  To the north lies a door made of ice -- you guess it to be at least
  three feet thick.

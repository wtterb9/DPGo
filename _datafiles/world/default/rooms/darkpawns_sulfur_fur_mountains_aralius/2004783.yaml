zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: The Training Yard
description: |-
  You are standing in a pile of snow.  Here, outside the Mead Hall, young
  warriors practice their skills on animated snowmen with wooden weapons.
  Occasionally, you see the scurrying of an enchanted snow rabbit which is
  a common target for young Antali archers.  Around you, three stout cliffs
  wall you inside the training yard.  The only exit lies back to the west.

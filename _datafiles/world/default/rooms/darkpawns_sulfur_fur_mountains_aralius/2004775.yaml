zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: A Mountain Trail
description: "You are on a snowy mountain path that winds its way northward into the\npeaks
  above.  Here and there, enormous clawmarks mar the exposed stone\nof the cliff walls,
  as though they had been scratches by an enormous\nbeast who wished to keep its claws
  in prime condition.  To the west, \nthe trail continues into the mountains, while
  to the east, the trail\nmeets a junction of other paths."

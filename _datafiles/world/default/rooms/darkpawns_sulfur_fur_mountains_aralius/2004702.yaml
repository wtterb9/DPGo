zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: Dense Underbrush
description: |-
  You are being torn apart by wild roses and thorns.  All around you, wild
  vines and foul-smelling flowers curl and wind their way around the pines
  and rocks.  You cannot travel any further to the south or west, so thick
  are the trees and growth.  The brush to the north and east seems to offer
  some relief from the tearing vines.

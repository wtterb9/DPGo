zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: An Antali Home
description: |-
  This stone and mortar dwelling serves as a small fortress against the
  cold and the driving winds that tend to ravage the village.  Skins of
  snow leopards and tigers almost completely cover the cold stone floor
  of this one-room house whose walls display the trophies of those whose
  skins blanket the floor.  A lone hearth stands against the western wall,
  its fire within cracking cheerfully.

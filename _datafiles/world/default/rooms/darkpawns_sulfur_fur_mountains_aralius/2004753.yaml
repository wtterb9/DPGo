title: An Antali Home
description: "This stone and mortar stronghouse serves as resistance against the\ncold
  and driving winds that tend to ravage the village.  Skins of\nsnow leopards and
  tigers almost completely cover the cold stone floor\nof this house whose walls boast
  the heads of those beasts whose skins\nblanket the floor.  A lone hearth stands
  against the eastern wall, \nstone cold."

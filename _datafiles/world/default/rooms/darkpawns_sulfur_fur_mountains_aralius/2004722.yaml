roomid: 2004722
zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: Entry to Sulfur Fur Forest
description: |-
  You are standing at the base of an enormous pine forest.  Evergreens and
  hemlocks stand silently, offering their subtle, woodsy scent to the crisp,
  cold air.  Scattered here and there across the ground, a yellow, almost
  furry moss grows in heaps on rocks emitting the faint scent of rotten eggs.
  To the north and east, this forest continues while to the west, a tril
  leads up the slope.  To the south, a few rocks and underbrush slow and
  eventually impede your progress.

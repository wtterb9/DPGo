zone: DarkPawns Sulfur Fur Mountains (Aralius)
title: A Smoldering Valley
description: |-
  Ash and patches of yellow moss cover the moist gound here.  All around you,
  the haze and smoke of recent volcanic activity make you cover your mouth
  to breathe.  To the north and south, the valley floor continues, while to
  the east and west, cliffs of basalt and hardened lava impede your travel.

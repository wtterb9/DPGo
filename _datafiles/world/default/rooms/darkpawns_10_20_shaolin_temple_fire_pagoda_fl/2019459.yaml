roomid: 2019459
zone: DarkPawns (10-20) Shaolin Temple / Fire Pagoda. (FL)
title: Fire Pagoda
description: |-
  This corner of the pagoda is abnormally damp, as if moisture was
  allowed to collect here for some period of time.  The dampness is
  more than likely a result of the open stairway to your west, and the
  burning column of fire in the centre of the room does little to
  alleviate the dampness and darkness here.  There is even a surprising
  lack of torches and the like.
     Upon closer inspection, you notice that the wax-like substance that
  covers the rest of the walls and floor is practically non-existent
  here.  Perhaps this room isn't safe for open flame right now.

title: The Temple Court Yard
description: |-
  You stand in the court yard of the temple. The mountain rises high into
  the skies above you. The top of the mountain is shrouded in clouds, making
  it difficult to see what lies above. The courtyard extends in all directions
  and the main temple lies to the north.

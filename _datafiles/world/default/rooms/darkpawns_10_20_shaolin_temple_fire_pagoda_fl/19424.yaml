zone: DarkPawns (10-20) Shaolin Temple / Fire Pagoda. (FL)
title: Before The Master
description: "You stand at the northernmost end of the temple sanctorum.  Several\nwell-used
  mats lie strewn across the floor for meditation purposes.\nBeneath a cyclopean sandstone
  sculpture of the Buddha, there is a \nsimple raised wooden platform. It is from
  here that the master of the \ntemple leads the others in meditation and reflection.
  \ In the dim \ncandlelight of this end of the sanctorum, you notice robed figures\nmoving
  about with a sense of purpose in the darkness.  Even from here\nyou can still hear
  the endless chanting echoing off the walls and\nceilings of this place."

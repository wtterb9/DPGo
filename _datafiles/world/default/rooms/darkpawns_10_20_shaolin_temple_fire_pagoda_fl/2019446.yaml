title: Inside the Fire Pagoda
description: "You are in the southeast corner of what appears to be the only chamber
  \non the ground floor of this pagoda.  Many torches line the walls of this \nchamber,
  but it doesn't seem to help the light any; it is as if the walls \nabsorb the torches
  energy inside of allowing it to radiate into the room.  \nHot, fibrous refuse drips
  continually from the torches, and you wonder \nhow they can possibly afford to have
  a wooden floor with all this open \nflame around.  Upon closer inspection of the
  floor, however, you notice \nthat it has been treated with a wax-like substance
  which is apparently \nfireproof, judging by the condition of the wood.  Men in crimson
  robes \nattend to the torches ceaselessly, their cowls pulled up over their faces."

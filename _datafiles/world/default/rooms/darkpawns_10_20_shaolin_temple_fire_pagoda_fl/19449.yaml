title: Inside the Fire Pagoda
description: |-
  This is the northern section of the first floor of the Fire Pagoda.
  A flight of flanked stone steps leads upward to the next level, each
  step bearing a tall candle at each end.  The shadows and flickering
  generated by all the open flames in this chamber, though limited, still
  sends an eerie chill down your spine.  The men in crimson robes walk
  about this chamber with great urgency, chanting eerily as they do so.

title: Inside the Fire Pagoda
description: |-
  You stand in the northwestern section of the first level of the Fire
  Pagoda.  From here you can clearly see that there must be hundreds of
  thousands of torches, candles, and braziers in this one chamber alone.
  The building itself seems to be absorbing the energy from these torches
  as the walls seem fairly warm to the touch.  Perhaps these torches are
  what is fueling the flaming aura that surrounds the outside of this
  place.

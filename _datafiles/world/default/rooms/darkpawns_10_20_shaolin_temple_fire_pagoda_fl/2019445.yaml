title: Inside the Fire Pagoda
description: "You are just beyond the entrance of the Fire Pagoda, in a large room
  \nobviously used for assembling large groups of people, but as for what\npurpose,
  you cannot tell.  The floor is made of a highly polished wood,\npossibly teak, and
  creaks and flexes as you walk on it, as though it is\nsuspended above the natural
  flooring. Giant basalt pillars hold up the\nceiling; you wonder how the floor can
  possibly support their weight.\nA broad flight of stone steps leads upward in the
  northern part of this \nroom, and the rest of the room extends in all directions."

title: Inside The Temple
description: |-
  You stand just inside this magnificent and ancient temple.  A
  small mat rests in front of a tiny stone altar presumably used for
  prayer. The room is lit by four ornate bronze braziers. The chanting
  of what can only be monks reverberates through the room and seems to
  have no end.

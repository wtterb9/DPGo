title: Fire Pagoda
description: "The second level of the pagoda seems to be much the same as the first,
  \nexcept that this level seems unnaturally warm.  Perhaps it is because of \nthe
  large column of flame that leaps from the floor to the southeast of \nhere, almost
  in the exact centre of the room.  Torches, smudge pots, \nbraziers, and all manner
  of other devices designed to protect fire are \nscattered haphazardly about this
  chamber, tended by the Servants and \ntheir acolytes."

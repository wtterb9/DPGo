title: The Temple Courtyard
description: |-
  You stand in the center of the temple's courtyard. From here you can
  see the mountain rise high into skies above you. The top of the mountain
  is still difficult to see because of the clouds shrouding it.  Looking
  around you, you see the elaborate structure of the main temple as it is
  framed against the sharp rise of the mountain, your breath catching in
  your throat by its splendor.

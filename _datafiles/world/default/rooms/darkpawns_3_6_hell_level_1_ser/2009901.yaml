title: At the Gates of Hell
description: |-
  You are standing at a set of massive iron gates.  The gates lie open,
  almost inviting you inside, tempting your dark curioisities of what Hell
  really is.
     As you peer east, through the gates, a wave of rancid, foul air wafts
  over you, carrying the faint sound of tortured screams and wicked, evil
  laughter.  A sense of dread overcomes you as you stare into the gates of
  Hell itself.

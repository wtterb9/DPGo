title: A Vast Cavern
description: |-
  The source of the putrid smell in this room is evident here, as you view
  the struggling shapes under the morass of insects. Millions of roaches swarm
  over a pile of gelatinous substance that has the consistancy of mucous. As
  you watch in horror, an arm juts out of the pile.. an obviously elven arm,
  with the slim tapering fingers covered in snot, shit, and eagerly biting
  beetles with inch-long black pincers.

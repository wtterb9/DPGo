description: "I am in a secret fourfold word, the blasphemy against all gods of men.
  \nCurse them! Curse them! Curse them! With my Hawk's head I peck at the eyes of\nJesus
  as he hangs upon the cross. I flap my wings in the face of Mohammed &\nblind him.
  With my claws I tear out the flesh of the Indian and the Buddhist,\nMongol and Din.
  Bahlasti! Ompehda! I spit on your crapulous creeds. Let Mary\ninviolate be torn
  upon wheels: for her sake let all chaste women be utterly\ndespised among you! Also
  for beauty's sake and love's! Despise also all\ncowards; professional soldiers who
  dare not fight, but play; all fools despise!\nBut the keen and the proud, the royal
  and the lofty; ye are brothers! As\nbrothers fight ye! There is no law beyond Do
  what thou wilt.\n   As you recall your classical teachings about Hell, you consider
  what\nlies at either end of the tunnel. Could an archdemon or devil lurk there?\n
  \  The Hellish tunnel continues to the east and west."

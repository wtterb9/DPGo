zone: DarkPawns (3-6) Hell, Level 1 (Ser)
title: AL II:22-23
description: "I am the Snake that giveth Knowledge & Delight and bright glory, and
  stir\nthe hearts of men with drunkenness. To worship me take wine and strange drugs\nwhereof
  I will tell my prophet, & be drunk thereof! They shall not harm ye at\nall. It is
  a lie, this folly against self. The exposure of innocence is a lie.\nBe strong,
  o man! lust, enjoy all things of sense and rapture: fear not that\nany God shall
  deny thee for this. I am alone: there is no God where I am. \n   The visions of
  what you have read of Hell pass as you stroll down this\nsearing tunnel that leads
  both east and west."

title: In the Valley of Death
description: |-
  You are standing in a cavern.  Mottled red shadows dart between dark
  spires as you gaze high into the air you see black forms shifting among
  the slalactites on the cave ceiling far overhead.
     Almost unnoticed, a dark shapes flits past you, and you shiver as you
  realize the shadow grazed you with a touch of death.

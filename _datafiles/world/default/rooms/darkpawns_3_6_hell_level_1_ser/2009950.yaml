title: The Room Of Gluttony
description: |-
  Filled with buzzing flies, this chamber's floor is littered with rotten
  meats, fruits, and vegetables. An ironwood table takes up the center of the
  room, and piled onto it in a great heap rots more of the same foods.
     Narrow tunnels lead into darkness to the east and west.

title: The Room Of Lust
description: |-
  Harsh screams ring in your ears as you behold the scene before you.
  The walls are decorated with people - mostly male humans - dressed in
  straps of leather and bound by chains.  Blood coats the walls, and its
  source is obviously the barbed silver hooks that hold the poor souls to
  the wall.  They scream in both agony and ecstacy for at the foot of each
  living corpse stands a demonic imp, performing oral feats on the tortured
  victim with a mouth full of sharp teeth.
     All this is secondary however, to the black altar in the center of the
  room.  A male and female demon stand there, naked but with exaggerated
  genitalia (and breasts in the female's case).  As you watch, a mortal is
  pulled from the wall and thrown onto the altar.
     With piercing shrieks, the demons set in, abusing his every orifice
  with their teeth, nails, ripping horns, and over-sized penises that shoot
  from their bodies like stilettos.
     As the mortal is torn to shreds, the scene vanishes, leaving you in
  darkness.

title: The Swamp
description: "The solid ground of the forest gives way to a wet spongy terrain. The\nground
  squishes under each footfall and the thoguht of falling through is\nfirst in mind.
  The trees are becoming slightly more spread out, but the\nmaze of roots coming from
  them more than makes up for any difference in \nease of passage. The sounds of moving
  water come from the east. To the south\nthe swamp seems to be getting more dense."

roomid: 2005020
zone: DarkPawns Xixieqi Sands (Aralius)
title: Dunes
description: |-
  Sands shift and move in waves here as the strong desert winds pile
  the burning grains into amorphous dunes.
     Beneath the moving dunes, a few desert rodents leave raised paths
  that make the surface of the sands apear to be alive with pulsing
  veins and arteries.
     To the north, you can see an overturned wagon.  Sand has sloped gently
  against it, forming an artificial drift, a haven for scorpions and other
  hazards.  You quickly decide to avoid it.  To the south and west, the
  desert stretches into near-infinity, while far to the east, a caravan
  trail leads into the city to the northeast.

zone: DarkPawns Xixieqi Sands (Aralius)
title: Savanna Grasses
description: |-
  You are standing on the edge of a desert where rich savanna grasses
  form the border between the rugged sandy desert and the scrub of the
  grasslands.  The sounds of groundling birds and animals seem to offer
  the last signs of life before entering the western desert.
     The desert continues to the west, while the thick savanna grasses
  continue to the north, south, and east.

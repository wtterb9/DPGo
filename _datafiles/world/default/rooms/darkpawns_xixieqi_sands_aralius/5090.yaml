zone: DarkPawns Xixieqi Sands (Aralius)
title: The Peak Of The Monolith
description: |-
  Though still several hundred feet below the top of the spire, you have
  reached the highest point in the hollow interior.  Here, a small platform,
  perhaps once carved by dwarven hands, looks out over the floor below.
     A few old bones litter the floor here, some with unfinished carvings,
  as though some desert wandered tried to whittle away some time during the
  desert night.
     Below you, a set of carved stairs leads down into the main floor of the
  spire.

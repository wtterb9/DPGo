title: Parched Sands
description: "Strange sandstone monoliths appear on the northern horizon as you\ntraverse
  this patch of dry sand.  A few wind clouds blast into you,\nfilling your nose and
  ears with stinging grains as hot winds draw\nthe energy from your body.\n   The
  desert continues to the west and south, and seems to slope \ngently upward as it
  ends at the hills to the west."

zone: DarkPawns Xixieqi Sands (Aralius)
title: Sandstone Monoliths
description: |-
  You are standing in a desert valley.  All around you, gigantic pillars
  of weathered sandstone spike high into the air, casting cooler shadows
  on the groundling pear cacti beneath them.
     Looking around you, you notice that water-weathered rocks line this
  valley, as though this was an ancient streambed that was consumed by
  desert heat.
     The monoliths themselves are wonderous.  Rising nearly a thousand
  feet in the air, these red and yellow-banded titans are all that
  remain of a prehistoric mountain range, judging by the symmetry of the
  remaining spires.  Time, weather, and wind appear to have blown
  holes through these ancient mountain walls, leaving the banded monoliths
  you see throughout the east.
     To the north the desert gives way to the ocean, where more of the
  monolithic spires rise against you, while to the south and west, the
  sandstone pillars decay into the desert sands.  The scent of the sea is
  powerful here.  The ocean must lay to the north, behind the sandstone giants.

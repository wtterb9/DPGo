zone: DarkPawns Xixieqi Sands (Aralius)
title: Salt Flats
description: "Here, the desert sands and silt have given way to broad flats of\nnatural
  salt and, to the east, wide fields of grass.  Chunks of the\nhardened salt bricks
  lay caked across the desert to the west and south,\nsome cracked and rising above
  the surface to form hazardous obstacles\nacross which to walk.\n   The desert continues
  to the north and northwest while the salt flats\ncontinues to the south and southwest.
  \n   A grassy field lies to the east."

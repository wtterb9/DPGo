zone: DarkPawns Xixieqi Sands (Aralius)
title: Grassy Fields
description: |-
  You are standing in a grassy field, where the desert to the north meets
  the foothills to the far south.  The breezes are both warm and damp here,
  indications that this place receives a fair amount of downhill rains and
  runoff.
     Immediately to the north salt flats have made plant growth impossible
  as it forms an effective barrier against flora for the desert.  To the
  east and west, the grassy field continues, adding a freshness to the air
  that sweeps down from the hills to the south.

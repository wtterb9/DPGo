title: Burning Sands
description: "You stand parched amidst the shifting, burning sands just southwest
  of\nthe walled city of Xixieqi.\n   Here, an occasional scorpion digs itself out
  from the sand to chitter\nat other insects while eyeless desert voles leave ridged
  paths just beneath\nthe surface of the sand which extends in all directions.\n   To
  the north only burnt-sienna sands can be seen, making travel in that\ndirection
  rather pointless, as it appears to be only a wasteland and dump\nfor the city to
  the northeast.  To the south, the desert stretches into wave\nlike dunes, matched
  only by the stetches of desert to the east.  A beach \nappears to the west, leading
  into the ocean."

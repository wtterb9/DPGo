zone: DarkPawns Xixieqi Sands (Aralius)
title: Parched Sands
description: |-
  Warm winds blow as you scan the desert, wary of desert raiders and
  unexpected dust storms.  The desert stretches to the north, south, and
  west, offering nothing in terms of comfort or relief from a parched
  throat or throbbing feet.
     The desert gives way to rich savanna grasses to the east.

zone: DarkPawns Xixieqi Sands (Aralius)
title: Dunes
description: |-
  Sands shift and move in waves here as the strong desert winds pile
  the burning grains into shapeless dunes.
     There is no sign of life here, only bleak, burnished sands and dead,
  rotting tumbleweed.
     The desert continues in all directions.

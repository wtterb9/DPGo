title: Parched Sands
description: "Strange sandstone monoliths appear just to the east as you trudge\nthrough
  this patch of dry sand.  A few bursts of hot wind blast into\nyou, filling your
  nose and stinging your eyes with sand as the desert\nzephyrs draw the energy from
  your body.\n   The desert stretches in all directions, save northwest, where a \ncity
  appears on the horizon, and the distant west, where a caravan\nroad leads north
  and south through the desert.\n   To the north lies a vest stretch of yellowish
  sand that seems to\nrun parallel to the northwestern city and leads to the coast.
  \ Even\nfrom here you can smell the brine of sea salt."

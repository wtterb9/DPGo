zone: DarkPawns Xixieqi Sands (Aralius)
title: Burning Sands
description: |-
  You stand parched amidst the shifting, searing sands of Xixieqi.
  Here, a few desert cacti provide meager shade for the white eyeless
  desert voles that live within their spiny, pulpy interiors.
     In all directions, the desert stretches to the horizon, offering
  little change in scenery.

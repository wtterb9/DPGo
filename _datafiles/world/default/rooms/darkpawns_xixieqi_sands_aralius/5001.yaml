zone: DarkPawns Xixieqi Sands (Aralius)
title: Burning Coastal Sands
description: |-
  You stand parched amidst the shifting, burning sands of Xixieqi.  Here,
  a few desert cacti provide meager shade for the white, eyeless desert voles
  that live within the spiny, pulpy interior.
     To the north, south, and east, the desert continues, while to the west,
  the burnt-sienna sands stretch toward the ocean, where the salt-saturated
  waters pound the sandy coast and destroy any plant life.

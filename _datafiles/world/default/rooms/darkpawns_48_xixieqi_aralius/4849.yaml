zone: Xixieqi (Aralius)
title: "Maojeng Lane"
description: |-
  This is little more than a crudely gravelled road which runs towards
  the seedier section of town.  Homes continue to line the streets, though
  here and there, a warehouse appears between them, throwing shadows on
  the smaller dwellings around them.
     To the north, you can see a shop of some sort, perhaps a glassblower's
  shop judging by the amounts of stained glass and windchimes in the front
  of the shop.
     To the south, you see a guardhouse, obviously used to monitor traffic
  in and out of the southern gates of the city just to the southeast.
     The street continues to the east and west.

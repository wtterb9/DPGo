title: "Lin Chao's Brine Delights Bar"
description: |-
  Before you stands the bar.  A lanky, yellow-skinned man stands
  behind the bar, pouring rice and wheat whiskey into a small class.
  On the bar is a registry book.  It appears that the barman is also
  the innkeeper here.
     To the north and west, the inn continues, while to the east, 
  behind the bar, you can hear the sounds of sizzling food and 
  clanging pots.  The southern wall is solid, but boasts an elegant,
  if not tattered, silk tapestry.

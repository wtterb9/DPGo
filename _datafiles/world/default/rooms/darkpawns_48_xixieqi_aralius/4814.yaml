title: "Hrenchao's Herbs And Potions"
description: |-
  You stand dizzily as this room's powerful scent of cloying herbs
  and sweet roots assail your senses.  All around you, flowers, pollen,
  odd leaves, and vapourous potions line shelves and fill open crates
  that occupy this tiny shop.
     There is a door to the west, leading to the street and a smaller
  one to the east, most likely leading to this shop's storeroom or
  second floor.

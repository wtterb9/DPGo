roomid: 4865
zone: Xixieqi (Aralius)
title: "Chiang Street"
description: |-
  You are standing on crude cobblestones in the middle of the street.
  A few people ignore you as you walk by, though most look upon your odd
  skin colour and wonder about your origins.
      To the north, you can see the entrance to some sort of shop.  Its
  window boasts stained glass depictions of dragons and its sign appears
  to bear some sort of compact bottle.  To the south, a tall establishment
  boasts a wide set of wooden, not bamboo, doors.  No signs appear near
  nor on the door itself to give a clue as to what the place is.
      The street continues to the east, where it offers more shops, and
  west, where it appears to meet a junction.

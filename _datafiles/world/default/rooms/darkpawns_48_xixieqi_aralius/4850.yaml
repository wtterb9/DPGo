title: "Guardhouse"
description: |-
  You are standing in a guardhouse.  Through the eastern window, you
  see yellow-skinned guards inspect and question those who enter and exit
  the city.
     Here, in the shade of the guardhouse, guards sit around a table, 
  playing bones, polishing weapons, and swearing as they gamble and lose
  to their companions.
     The only exit is to the north.

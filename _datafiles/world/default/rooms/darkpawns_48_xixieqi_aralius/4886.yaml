title: "Temple of the Ice Dragon"
description: |-
  You appear to be standing in a cult temple.  Here, yellow-skinned men
  kneel, cloaked in white robes, bowing before an obsidian altar.  The room
  is domed, clearing showing constellations of the familiar summer sky on
  its curved ceiling.  
     You notice one constellation in particular: that of the Ice Dragon, a
  mythological beast that swallows worlds with hellish flames and searing
  gases.
     All around you, carving and statues of Pan-Lung, the fabled dragon
  adorn the statues, walls, and even the exit door to the north.

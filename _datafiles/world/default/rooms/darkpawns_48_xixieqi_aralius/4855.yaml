title: "Qing Crossing"
description: |-
  You stand at the junction of three streets.  Here, a strange red-brick
  tavern greets you with the sounds of fluted songs and the clinking of
  glasses coming through its door to the north.
     To the east and south, roughly cobbled streets extend into city,
  while to the west, the street runs smoothly on crushed gravel and well-
  maintained cobblestone slabs.

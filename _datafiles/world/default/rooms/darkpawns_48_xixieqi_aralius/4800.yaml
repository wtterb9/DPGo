title: "The Docks of XiXieqi"
description: |-
  You are standing on the docks of an active seaside village.  Fishmongers
  and fishermen haggle over the prices of the seafood in their junks as they
  inhale the saline stench of the ocean and the sea life.  Everywhere, 
  citizens rush to make purchases of fresh food and imported goods to take
  home to their awaiting families.  To the south, east, and west, the docks
  continue, while to the north, the open sea invites you for a long sea
  journey.

title: A Dense Jungle
description: |-
  The lushness of this area stops suddenly as you stand on the edge of a
  large cliff. The ocean lies before you to the north and waves crash against
  the cliff face with an almighty force. A narrow walkway exists to the west
  and the east which follows the ridgeline for a short distance.

zone: DarkPawns (20-30) Prison Island (Arakon)
title: A Rickety Jetty
description: |-
  Perhaps in its day this may have been a suitable area for landing a ship.
  Now, the ocean has literally torn the jetty apart and what little remains
  does so out of spite! You can carefully move your way to the north or south
  along the jetty or plunge into the ocean to the east or west.

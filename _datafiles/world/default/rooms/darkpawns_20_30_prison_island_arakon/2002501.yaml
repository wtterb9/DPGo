zone: DarkPawns (20-30) Prison Island (Arakon)
title: Standing on a Sandbar
description: |-
  This is the western tip of a small sandbar at what looks like the entrance
  to a larger bay to the south. Although the sandbar is high enough to keep
  you dry, the sand itself is quite moist and is difficult to move through.

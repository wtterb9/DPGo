title: Standing on a Sandbar
description: |-
  You are on a narrow strip of sand which runs east-west. Further to the
  east you can see a wooden jetty which may have berthed one or two ships in
  its time. To the south, the calmer waters of a large bay look slightly more
  inviting than the ocean waves.

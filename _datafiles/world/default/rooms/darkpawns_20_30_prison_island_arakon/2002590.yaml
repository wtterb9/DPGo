title: A Prison Cell
description: |-
  The cell is very small and is in no way comfortable - although you would
  expect prisoners would not be afforded the luxuries of law abiding citizens.
  The eastern wall is made simply of iron bars which show the severe signs of
  corrosion. A skeleton has been nailed to the western wall, sharp metal spikes
  through its hands and feet.

zone: DarkPawns (20-30) Prison Island (Arakon)
title: A Shallow Lagoon
description: |-
  You are now waist deep in the calm waters of this lagoon. It is quite
  temperate and you could certainly swim around in it to relieve the pressures
  of your travels. A sandbar to the north provides adequate protection from
  the ocean while cliffs further to the west and east shelter the lagoon from
  the harsh ocean winds.

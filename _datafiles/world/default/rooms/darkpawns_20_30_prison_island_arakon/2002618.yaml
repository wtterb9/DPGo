title: Along a Ridgeline
description: |-
  You can make your way to the east or west along the ridgeline. The ocean
  thunders away below you to the south, although to reach it would mean suicide
  from this height. The wooden wall parallels the ridgeline and you have no
  way of getting into the structure from here.

zone: DarkPawns (20-30) Prison Island (Arakon)
title: A Jungle
description: |-
  The view before you is absolutely breathtaking. Standing at the top of an
  80 foot cliff, the world around you is amazing to say the least. Ocean waves
  crash against the cliff face to the east while waters of the island lagoon
  lap calmly to the west. Behind you, the island you find yourself on is
  covered in all forms of plant-life and you imagine travel will be difficult
  in those areas.

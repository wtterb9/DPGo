zone: DarkPawns (20-30) Prison Island (Arakon)
title: A Shallow Lagoon
description: |-
  The center of the lagoon offers a good view of the surrounding landscape;
  to the north lies a small sandbar which blocks the entrance from ocean waves,
  to the south the lagoon narrows as cliff faces converge at what looks like
  a beach while to the east and west the lagoon continues.

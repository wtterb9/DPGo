zone: DarkPawns (20-30) Prison Island (Arakon)
title: A Shallow Lagoon
description: |-
  You find it slightly difficult to walk in the lagoon given the sandy
  bottom and the waist deep water you are in. You can make your way slowly
  to the west or north to remain in the lagoon or to the south where a small
  beach offers a place to dry off.

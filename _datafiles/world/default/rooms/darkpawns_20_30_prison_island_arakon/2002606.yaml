zone: DarkPawns (20-30) Prison Island (Arakon)
title: A Small Walkway
description: |-
  The walkway curves here and you can continue to the north or west. The
  sound of the ocean calls to you from the distance and a number of bird calls
  add life to this place. Skeletons with shreds of clothing have been strung
  up on the southern wall, sharp wooden stakes still evident protruding through
  various parts of their once whole bodies.

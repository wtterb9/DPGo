zone: DarkPawns (20-30) Prison Island (Arakon)
title: An Enclosed Compound
description: |-
  This is the center of the compound, an area that was perhaps used for
  storage at one time or another but now is home to some of the island
  inhabitants. This place is well travelled given the number of footprints on
  the ground and you think you can hear voices coming from the hut to the north
  west.

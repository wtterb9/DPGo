zone: DarkPawns (20-30) Prison Island (Arakon)
title: A Rickety Jetty
description: |-
  You stand on the end of a barely recognisable wooden jetty. Rotten ropes
  still remain tied to the support posts which are about the only thing holding
  the jetty together. You can travel along the jetty to the south where you
  can see a small sandbar or into the ocean in any other direction.

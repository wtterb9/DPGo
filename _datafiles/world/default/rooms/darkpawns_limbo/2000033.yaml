title: A Safe Haven
description: "This ancient room whispers of unfathomable history and wealth.  Intricate
  \nmarble carvings interlace and entwine within themselves along the thick\ncolumns
  that line the walls.  Brass-leaf lanterns hang suspended from the\nceiling, bathing
  everything in an ethereal glow.  Rich, plush rugs cover\nthe black marble floor,
  scattered with silken and velvet pillows.  Above,\nthree cresent moons have been
  carved from the cathedral ceiling to gaze\nupon the heavens above."

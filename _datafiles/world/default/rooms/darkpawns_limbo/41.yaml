roomid: 41
zone: DarkPawns Limbo
title: The Immortal Conference Room
description: |-
  You are in a huge stone room.  The walls are made of huge grey-stone blocks
  that seem to reach to the sky.  In the center of the room is a huge wooden
  table that is perfectly round.  In the center of the table is a large
  fire that lights most of the room.  There are torches along the walls that
  provide even more light.  There are huge wooden chairs around the room that
  allow all of the pantheon to assemble in some sort of order.

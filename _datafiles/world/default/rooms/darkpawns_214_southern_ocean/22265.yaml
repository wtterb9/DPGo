title: "On the Ocean"
description: |-
  The wide ocean spans across your vision, making you lose all 
  sense of direction.  You marvel at the schools of mackereal that 
  streak through the sea as though they were birds sailing in the 
  air.  Gusts rush past you, blasting you with froth and bits of 
  kelp.

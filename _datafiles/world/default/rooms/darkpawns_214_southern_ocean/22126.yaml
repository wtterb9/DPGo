title: "On the Ocean"
description: |-
  The wide water spans across your sight, making you lose all 
  sense of direction.  You marvel at the schools of salmon that 
  streak through the ocean as though they were birds flying in the 
  air.  On the ocean's surface, you note flotsam floating gently 
  beside you.

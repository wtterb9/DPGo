title: "On the Ocean"
description: |-
  The wide water spans across your sight, making you lose all 
  sense of direction.  As you float across the water's surface, you 
  note your reflection below, waving with the eddies.  On the 
  ocean's surface, you note seaweed floating at the mercy of the sea 
  beside you.

title: "On the Ocean"
description: |-
  Here, porpoises and terns skim, splashing intentionally into 
  the sea.  As you float above the surface, waves crash into you, 
  forcing you to pay attention to the water's motion.  Gales rush 
  past you, hitting you with froth and bits of driftwood.

title: "On the Ocean"
description: |-
  Here, dolphins and gulls skim, splashing intentionally into the 
  water.  You marvel at the schools of salmon that streak through 
  the water as though they were birds sailing in the air.  The piece 
  of driftwood seems to be rotted with age.

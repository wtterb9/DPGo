title: "On the Ocean"
description: |-
  The wide water spans across your perception, making you lose 
  all sense of direction.  You marvel at the schools of salmon that 
  streak through the water as though they were birds coating in the 
  air.  Gales rush past you, hitting you with froth and bits of 
  driftwood.

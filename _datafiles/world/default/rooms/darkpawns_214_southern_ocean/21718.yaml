title: "On the Ocean"
description: |-
  Here, porpoises and manatees sail, splashing purposely into the 
  water.  You marvel at the schools of salmon that streak through 
  the sea as though they were birds sailing in the air.  On the 
  ocean's surface, you note kelp floating gently beside you.

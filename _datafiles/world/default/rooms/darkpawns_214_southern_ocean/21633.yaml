title: "On the Ocean"
description: |-
  Here, dolphins and terns circle, splashing purposely into the 
  water.  You marvel at the schools of sharks that streak through 
  the sea as though they were birds coating in the air.  In the 
  distance, you can see the foam of a broken sea eddies.

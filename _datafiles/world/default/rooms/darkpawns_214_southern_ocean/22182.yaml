title: "On the Ocean"
description: |-
  You are floating above the churning surface of the water.  You 
  marvel at the schools of salmon that streak through the water as 
  though they were birds flying in the air.  On the sea's surface, 
  you note driftwood floating at the mercy of the sea beside you.

title: "On the Ocean"
description: |-
  The wide ocean spans across your perception, making you lose 
  all sense of direction.  You marvel at the schools of sharks that 
  streak through the water as though they were birds flying in the 
  air.  On the water's surface, you note flotsam floating at the 
  mercy of the sea beside you.

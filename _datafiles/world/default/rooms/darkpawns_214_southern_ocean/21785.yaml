title: "On the Ocean"
description: |-
  The wide ocean spans across your sight, making you lose all 
  sense of direction.  You marvel at the schools of mackereal that 
  streak through the ocean as though they were birds sailing in the 
  air.  In the distance, you can see the foam of a broken sea 
  currents.

title: "On the Ocean"
description: |-
  The wide sea spans across your sight, making you lose all sense 
  of direction.  As you float above the surface, waves crash into 
  you, forcing you to pay attention to the water's motion.  Zephyrs 
  rush past you, blasting you with froth and bits of driftwood.

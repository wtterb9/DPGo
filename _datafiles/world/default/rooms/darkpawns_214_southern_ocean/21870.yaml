title: "On the Ocean"
description: |-
  The wide water spans across your vision, making you lose all 
  sense of direction.  You marvel at the schools of sharks that 
  streak through the ocean as though they were birds flying in the 
  air.  Gusts rush past you, hitting you with mist and bits of 
  driftwood.

title: "On the Ocean"
description: |-
  Here, otters and sea lions swim, splashing intentionally into 
  the ocean.  As you float above the surface, eddies crash into you, 
  forcing you to pay attention to the water's motion.  Breezes rush 
  past you, pummeling you with froth and bits of flotsam.

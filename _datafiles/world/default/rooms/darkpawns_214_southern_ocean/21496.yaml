description: |-
  The wide water spans across your perception, making you lose 
  all sense of direction.  You marvel at the schools of tuna that 
  streak through the ocean as though they were birds flying in the 
  air.  Breezes rush past you, spraying you with crest and bits of 
  driftwood.

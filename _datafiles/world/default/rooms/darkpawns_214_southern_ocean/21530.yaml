title: "On the Ocean"
description: |-
  You are floating above the restless surface of the ocean.  You 
  marvel at the schools of salmon that streak through the sea as 
  though they were birds sailing in the air.  Gusts rush past you, 
  pummeling you with foam and bits of driftwood.

title: "On the Ocean"
description: |-
  You are floating above the listless surface of the sea.  You 
  marvel at the schools of mackereal that streak through the water 
  as though they were birds coating in the air.  Zephyrs rush past 
  you, blasting you with froth and bits of driftwood.

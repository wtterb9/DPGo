title: "On the Ocean"
description: |-
  Here, otters and manatees skim, splashing purposely into the 
  sea.  As you float above the surface, eddies crash into you, 
  forcing you to pay attention to the water's motion.  On the sea's 
  surface, you note driftwood floating gently beside you.

title: "On the Ocean"
description: |-
  Here, otters and gulls float, splashing purposely into the 
  water.  You marvel at the schools of salmon that streak through 
  the ocean as though they were birds sailing in the air.  In the 
  distance, you can see the foam of a broken sea eddies.

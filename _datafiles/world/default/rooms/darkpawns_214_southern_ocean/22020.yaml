title: "On the Ocean"
description: |-
  The wide sea spans across your sight, making you lose all sense 
  of direction.  As you float above the surface, eddies crash into 
  you, forcing you to pay attention to the water's motion.  On the 
  ocean's surface, you note driftwood floating erratically beside 
  you.

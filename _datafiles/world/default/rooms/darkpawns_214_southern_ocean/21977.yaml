zone: Southern Ocean
title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the ocean. 
   You marvel at the schools of mackereal that streak through the 
  water as though they were birds flying in the air.  Breezes rush 
  past you, spraying you with froth and bits of seaweed.

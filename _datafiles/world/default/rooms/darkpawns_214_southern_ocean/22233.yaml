zone: Southern Ocean
title: "On the Ocean"
description: |-
  Here, otters and gulls skim, splashing dutifully into the 
  water.  You marvel at the schools of sharks that streak through 
  the ocean as though they were birds coating in the air.  On the 
  sea's surface, you note driftwood floating at the mercy of the sea 
  beside you.

title: "On the Ocean"
description: |-
  Here, whales and terns skim, splashing intentionally into the 
  sea.  You marvel at the schools of sharks that streak through the 
  water as though they were birds coating in the air.  On the 
  water's surface, you note seaweed floating at the mercy of the sea 
  beside you.

title: "On the Ocean"
description: |-
  The wide ocean spans across your perception, making you lose 
  all sense of direction.  You marvel at the schools of trout that 
  streak through the ocean as though they were birds sailing in the 
  air.  On the sea's surface, you note flotsam floating gently 
  beside you.

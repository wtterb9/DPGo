title: "On the Ocean"
description: |-
  The wide sea spans across your vision, making you lose all 
  sense of direction.  You marvel at the schools of sharks that 
  streak through the water as though they were birds sailing in the 
  air.  Gales rush past you, spraying you with foam and bits of 
  seaweed.

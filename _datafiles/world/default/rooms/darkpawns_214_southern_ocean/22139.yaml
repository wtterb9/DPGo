zone: Southern Ocean
title: "Rocky Desert Surf"
description: |-
  Here, porpoises and gulls float, splashing purposely into the 
  water.  Your nostrils sting as the crest shimmers you, bringing 
  tears of pain to your eyes.  Breezes rush past you, spraying you 
  with spray and bits of driftwood that seem to bounce off the cliff
  walls to the west.

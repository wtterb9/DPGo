title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the water. 
  You marvel at the schools of mackereal that streak through the 
  water as though they were birds sailing in the air.  In the 
  distance, you can see the foam of a broken water waves. To the south,
  a lone island breaks the surface of the waves.

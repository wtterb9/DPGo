title: "On the Ocean"
description: |-
  Here, otters and manatees sail, splashing freely into the 
  ocean.  You marvel at the schools of salmon that streak through 
  the sea as though they were birds flying in the air.  Gusts rush 
  past you, blasting you with crest and bits of seamoss.

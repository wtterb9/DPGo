title: "On the Ocean"
description: |-
  You are floating above the restless surface of the ocean.  You 
  marvel at the schools of sharks that streak through the sea as 
  though they were birds sailing in the air.  Breezes rush past you, 
  blasting you with spray and bits of seamoss.

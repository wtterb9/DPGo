title: "On the Ocean"
description: |-
  Here, porpoises and terns swim, splashing purposely into the 
  ocean.  Your nostrils sting as the mist pools you, bringing tears 
  of pain to your eyes.  Breezes rush past you, hitting you with 
  foam and bits of kelp.

zone: Southern Ocean
title: "On the Ocean"
description: |-
  The wide water spans across your vision, making you lose all 
  sense of direction.  You marvel at the schools of trout that 
  streak through the sea as though they were birds flying in the 
  air.  On the sea's surface, you note seaweed floating at the mercy 
  of the sea beside you.

title: "On the Ocean"
description: |-
  Here, porpoises and sea lions swim, splashing happily into the 
  ocean.  You marvel at the schools of trout that streak through the 
  ocean as though they were birds coating in the air.  In the 
  distance, you can see the foam of a broken sea currents.

title: "On the Ocean"
description: |-
  Here, whales and terns sail, splashing dutifully into the 
  ocean.  Your nostrils sting as the crest whisps you, bringing 
  tears of pain to your eyes.  On the sea's surface, you note 
  driftwood floating at the mercy of the sea beside you.

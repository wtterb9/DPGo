title: "On the Ocean"
description: |-
  The wide water spans across your sight, making you lose all 
  sense of direction.  As you float across the sea's surface, you 
  note your reflection below, waving with the eddies.  Gales rush 
  past you, pummeling you with froth and bits of seamoss.

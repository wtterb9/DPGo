title: "On the Ocean"
description: |-
  Here, dolphins and manatees circle, splashing dutifully into 
  the ocean.  Your ears sting as the froth blasts into you, bringing
  tears of pain to your eyes.
     To the east along the coast, a the walls of a small city receed
  into the distance, as though anxious to get away from the ocean
  surf to the north, south, and west.

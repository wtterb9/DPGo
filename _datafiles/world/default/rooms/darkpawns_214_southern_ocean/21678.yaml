title: "On the Ocean"
description: |-
  Here, dolphins and terns sail, splashing freely into the sea.  
  Your nostrils sting as the foam shimmers you, bringing tears of 
  pain to your eyes.  On the water's surface, you note seaweed 
  floating at the mercy of the sea beside you. 
     To the east tall sheer cliffs rise out of the ocean to form a
  small island.

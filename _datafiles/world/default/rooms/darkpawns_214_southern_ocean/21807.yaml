title: "On the Ocean"
description: |-
  Here, otters and terns circle, splashing intentionally into the 
  ocean.  You marvel at the schools of trout that streak through the 
  water as though they were birds flying in the air.  On the water's 
  surface, you note seamoss floating erratically beside you.

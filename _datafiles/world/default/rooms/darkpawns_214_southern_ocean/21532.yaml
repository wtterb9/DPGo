title: "On the Ocean"
description: |-
  You are floating above the restless surface of the water.  You 
  marvel at the schools of salmon that streak through the sea as 
  though they were birds coasting in the air.  
     To the east a solid wall of rock rises from the ocean floor,
  forming an impassible barrier to a small island.

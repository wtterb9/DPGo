title: "On the Ocean"
description: |-
  The wide ocean spans across your vision, making you lose all 
  sense of direction.  You marvel at the schools of trout that 
  streak through the water as though they were birds sailing in the 
  air.  On the ocean's surface, you note kelp floating at the mercy 
  of the sea beside you.

title: "On the Ocean"
description: |-
  Here, whales and terns circle, splashing dutifully into the 
  water.  As you travel across the sea's surface, you note your 
  reflection below, waving with the waves.  Zephyrs rush past you, 
  hitting you with crest and bits of driftwood.

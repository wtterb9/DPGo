zone: Southern Ocean
title: "On the Ocean"
description: |-
  Here, porpoises and manatees float, splashing dutifully into 
  the water.  You marvel at the schools of trout that streak through 
  the sea as though they were birds flying in the air.  On the 
  ocean's surface, you note driftwood floating erratically beside 
  you.

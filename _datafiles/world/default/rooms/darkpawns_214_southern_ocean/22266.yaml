title: "On the Ocean"
description: |-
  You are floating above the turbulent surface of the water.  You 
  marvel at the schools of trout that streak through the ocean as 
  though they were birds flying in the air.  Gales rush past you, 
  pummeling you with crest and bits of flotsam.

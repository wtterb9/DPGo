title: "On the Ocean"
description: |-
  Here, otters and gulls skim, splashing purposely into the 
  water.  You marvel at the schools of mackereal that streak through 
  the water as though they were birds flying in the air.  Gusts rush 
  past you, hitting you with crest and bits of flotsam.

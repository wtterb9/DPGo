zone: Southern Ocean
title: "Ocean Coast"
description: |-
  Here, otters and manatees float, splashing purposely into the 
  water.  You marvel at the schools of tuna that streak through the 
  ocean as though they were birds sailing in the air.  In the 
  distance to the north and west, you can see the foam of a broken
  waves as they crash and meld into the surf.
     To the east lies a rocky coast upon which a small town has been
  built.  There is no dock from this side, though you can see plenty
  of activity on the streets above you.

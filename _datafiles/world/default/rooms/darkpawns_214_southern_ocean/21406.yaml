title: "On the Ocean"
description: |-
  Here, porpoises and sea lions circle, splashing dutifully into 
  the sea.  As you float above the surface, eddies crash into you, 
  forcing you to pay attention to the water's motion.  Gales rush 
  past you, blasting you with spray and bits of kelp.

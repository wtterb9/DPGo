title: "On the Ocean"
description: |-
  Here, otters and manatees circle, splashing intentionally into 
  the water.  You marvel at the schools of sharks that streak 
  through the ocean as though they were birds flying in the air.  
  Gales rush past you, spraying you with froth and bits of 
  driftwood.

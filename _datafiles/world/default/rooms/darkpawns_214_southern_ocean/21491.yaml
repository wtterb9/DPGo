title: "On the Ocean"
description: |-
  Here, whales and terns swim, splashing purposely into the 
  water.  As you travel across the sea's surface, you note your 
  reflection below, fading with the eddies.  Breezes rush past you, 
  blasting you with mist and bits of seaweed.

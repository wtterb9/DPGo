title: "On the Ocean"
description: |-
  The wide sea spans across your sight, making you lose all sense 
  of direction.  You marvel at the schools of tuna that streak 
  through the water as though they were birds flying in the air.  In 
  the distance, you can see the foam of a broken ocean currents.

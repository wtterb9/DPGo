title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the sea.  
  You marvel at the schools of mackereal that streak through the 
  ocean as though they were birds coating in the air.  Gusts rush 
  past you, pummeling you with foam and bits of seaweed.

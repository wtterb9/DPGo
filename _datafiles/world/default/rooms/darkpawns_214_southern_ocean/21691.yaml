title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the ocean. 
   You marvel at the schools of sharks that streak through the ocean 
  as though they were birds flying in the air.  Gusts rush past you, 
  pummeling you with crest and bits of kelp.

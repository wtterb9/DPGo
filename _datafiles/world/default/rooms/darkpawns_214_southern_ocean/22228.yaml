title: "On the Ocean"
description: |-
  Here, whales and sea lions float, splashing happily into the 
  sea.  You marvel at the schools of mackereal that streak through 
  the water as though they were birds coating in the air.  Breezes 
  rush past you, hitting you with foam and bits of seaweed.

title: "On the Ocean"
description: |-
  Here, dolphins and terns skim, splashing intentionally into the 
  ocean.  Your nostrils sting as the foam shimmers you, bringing 
  tears of pain to your eyes.  Zephyrs rush past you, pummeling you 
  with mist and bits of driftwood.

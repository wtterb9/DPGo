title: "On the Ocean"
description: |-
  You are floating above the listless surface of the ocean.  As 
  you voyage across the water's surface, you note your shadow below, 
  distorting with the currents.  Zephyrs rush past you, hitting you 
  with foam and bits of driftwood.

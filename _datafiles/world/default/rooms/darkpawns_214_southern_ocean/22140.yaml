title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the water. 
   You marvel at the schools of mackereal that streak through the 
  sea as though they were birds sailing in the air.  On the ocean's 
  surface, you note seaweed floating at the mercy of the sea beside 
  you.

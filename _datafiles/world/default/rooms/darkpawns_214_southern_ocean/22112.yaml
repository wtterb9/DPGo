title: "On the Ocean"
description: |-
  The wide water spans across your vision, making you lose all 
  sense of direction.  As you float above the surface, eddies crash 
  into you, forcing you to pay attention to the water's motion.  On 
  the sea's surface, you note kelp floating at the mercy of the sea 
  beside you.

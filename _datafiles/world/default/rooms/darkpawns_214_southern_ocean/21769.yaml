title: "On the Ocean"
description: |-
  Here, porpoises and manatees swim, splashing dutifully into the 
  ocean.  As you float above the surface, eddies crash into you, 
  forcing you to pay attention to the water's motion.  Gales rush 
  past you, blasting you with crest and bits of seamoss.

title: "On the Ocean"
description: |-
  Here, dolphins and manatees skim, splashing freely into the 
  sea.  You marvel at the schools of mackereal that streak through 
  the ocean as though they were birds flying in the air.  On the 
  water's surface, you note driftwood floating erratically beside 
  you.

title: "On the Ocean"
description: |-
  The wide water spans across your vision, making you lose all 
  sense of direction.  You marvel at the schools of mackereal that 
  streak through the ocean as though they were birds flying in the 
  air.  On the sea's surface, you note kelp floating gently beside 
  you.

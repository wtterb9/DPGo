title: "On the Ocean"
description: |-
  Here, otters and gulls float, splashing intentionally into the 
  water.  You marvel at the schools of mackereal that streak through 
  the sea as though they were birds coating in the air.  Zephyrs 
  rush past you, hitting you with crest and bits of kelp.

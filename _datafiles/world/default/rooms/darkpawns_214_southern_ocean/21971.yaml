title: "On the Ocean"
description: |-
  Here, otters and gulls sail, splashing dutifully into the 
  water.  You marvel at the schools of mackereal that streak through 
  the ocean as though they were birds sailing in the air.  The buoy 
  seems to be rotted with churning water.

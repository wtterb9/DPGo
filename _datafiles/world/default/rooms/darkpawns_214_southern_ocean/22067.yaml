title: "On the Ocean"
description: |-
  The wide sea spans across your perception, making you lose all 
  sense of direction.  You marvel at the schools of salmon that 
  streak through the water as though they were birds flying in the 
  air.  On the ocean's surface, you note kelp floating at the mercy 
  of the sea beside you.

title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the ocean. 
   As you float above the surface, eddies crash into you, forcing 
  you to pay attention to the water's motion.  Gales rush past you, 
  pummeling you with crest and bits of driftwood.

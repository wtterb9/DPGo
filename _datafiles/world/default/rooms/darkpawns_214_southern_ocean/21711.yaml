title: "On the Ocean"
description: |-
  You are floating above the turbulent surface of the ocean.  You 
  marvel at the schools of salmon that streak through the ocean as 
  though they were birds sailing in the air.  Gusts rush past you, 
  blasting you with crest and bits of flotsam.

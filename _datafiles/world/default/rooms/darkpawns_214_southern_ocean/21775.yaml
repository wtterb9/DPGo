title: "On the Ocean"
description: |-
  Here, porpoises and terns sail, splashing dutifully into the 
  sea.  You marvel at the schools of salmon that streak through the 
  ocean as though they were birds flying in the air.  On the water's 
  surface, you note seaweed floating at the mercy of the sea beside 
  you.

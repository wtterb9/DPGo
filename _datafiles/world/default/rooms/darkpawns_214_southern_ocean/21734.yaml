title: "On the Ocean"
description: |-
  Here, otters and sea lions circle, splashing purposely into the 
  ocean.  You marvel at the schools of mackereal that streak through 
  the sea as though they were birds flying in the air.  In the 
  distance, you can see the foam of a broken sea currents.

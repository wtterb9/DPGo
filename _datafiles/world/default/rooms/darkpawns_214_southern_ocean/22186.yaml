title: "On the Ocean"
description: |-
  You are floating above the churning surface of the sea.  You 
  marvel at the schools of tuna that streak through the sea as 
  though they were birds flying in the air.  On the sea's surface, 
  you note seaweed floating at the mercy of the sea beside you.

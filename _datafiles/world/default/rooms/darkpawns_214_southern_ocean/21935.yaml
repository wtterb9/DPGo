title: "Rocky Ocean Coast"
description: |-
  You are floating above the churning surface of the ocean.  As 
  you venture across the sea's surface, you note your shadow below, 
  waving with the eddies that crash into the rocky coast to the east.
     Looking above you toward land, you notice a stone wall blocking
  out part of a city road that heads northward along the coast to
  parallel the sea.  There is no way to approach the land from here.

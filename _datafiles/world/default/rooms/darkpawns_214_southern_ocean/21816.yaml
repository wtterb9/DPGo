title: "On the Ocean"
description: |-
  You are floating without direction on the surface of the water. 
   You marvel at the schools of sharks that streak through the sea 
  as though they were birds sailing in the air.  Gusts rush past 
  you, blasting you with mist and bits of driftwood.

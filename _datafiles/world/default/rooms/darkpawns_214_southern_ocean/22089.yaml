title: "On the Ocean"
description: |-
  Here, dolphins and terns skim, splashing dutifully into the 
  ocean.  As you float above the surface, currents crash into you, 
  forcing you to pay attention to the water's motion.  On the 
  ocean's surface, you note seaweed floating at the mercy of the sea 
  beside you.

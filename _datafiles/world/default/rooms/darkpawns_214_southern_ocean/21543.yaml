title: "On the Ocean"
description: |-
  Here, otters and manatees skim, splashing intentionally into 
  the water.  As you float above the surface, eddies crash into you, 
  forcing you to pay attention to the water's motion.  Breezes rush 
  past you, spraying you with mist and bits of driftwood.

title: "On the Ocean"
description: |-
  The wide ocean spans across your perception, making you lose 
  all sense of direction.  You marvel at the schools of trout that 
  streak through the sea as though they were birds coating in the 
  air.  On the ocean's surface, you note seamoss floating gently 
  beside you.

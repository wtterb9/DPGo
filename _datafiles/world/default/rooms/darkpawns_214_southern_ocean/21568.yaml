title: "On the Ocean"
description: |-
  Here, dolphins and gulls skim, splashing intentionally into the 
  water.  You marvel at the schools of trout that streak through the 
  sea as though they were birds coating in the air.  On the ocean's 
  surface, you note seaweed floating at the mercy of the sea beside 
  you.

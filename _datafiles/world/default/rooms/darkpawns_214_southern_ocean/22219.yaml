description: |-
  Here, porpoises and sea lions skim, splashing intentionally 
  into the sea.  As you voyage across the water's surface, you note 
  your reflection below, fading with the waves.  On the ocean's 
  surface, you note kelp floating at the mercy of the sea beside 
  you.

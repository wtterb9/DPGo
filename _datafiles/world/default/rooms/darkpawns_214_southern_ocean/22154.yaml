title: "On the Ocean"
description: |-
  Here, porpoises and manatees swim, splashing happily into the 
  sea.  As you float above the surface, waves crash into you, 
  forcing you to pay attention to the water's motion.  On the 
  ocean's surface, you note driftwood floating erratically beside 
  you.

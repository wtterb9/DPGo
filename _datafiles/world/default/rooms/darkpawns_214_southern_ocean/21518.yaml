zone: Southern Ocean
title: "On the Ocean"
description: |-
  The wide water spans across your vision, making you lose all 
  sense of direction.  You marvel at the schools of trout that 
  streak through the water as though they were birds flying in the 
  air.  Breezes rush past you, pummeling you with foam and bits of 
  seaweed.

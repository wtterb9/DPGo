title: "On the Ocean"
description: |-
  Here, otters and manatees circle, splashing purposely into the 
  ocean.  As you float above the surface, eddies crash into you, 
  forcing you to pay attention to the water's motion.  On the 
  water's surface, you note driftwood floating gently beside you.

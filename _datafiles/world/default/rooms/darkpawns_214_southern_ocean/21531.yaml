title: "On the Ocean"
description: |-
  You are floating above the listless surface of the sea.  You 
  marvel at the schools of mackereal that streak through the ocean 
  as though they were birds flying in the air.  On the ocean's 
  surface, you note driftwood floating gently beside you.

description: "A stone thrower rests upon a raised parapet, ready to fire.

This strong, compact onager was fashioned by Cedric's engineers
to fire projectiles upon any group of men who might breach the
palisade around Cedric's lands.  In the basket at the end of the
engine's arm is a diseased yak, intended to both infect and
demoralize anyone so unfortunate as to attack wily Cedric's
manor house."

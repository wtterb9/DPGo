itemid: 19605
name: "a shimmering violet portal"
namesimple: "violet"
description: "A shimmering portal of violet light hovers in the middle of the room.

The statue is an interpretation of the Goddess Nat. Due to its holy
magnifecence, you are unable to determine the material from which it has been
made. She is dressed in nothing but a flowing white robe, her lithe figure
outlined in its silky material. Her long brown hair lies lazily down her back.
She is the quintessence of perfection - she holds in one hand a broken sword
representing peace and in the other hand, three smaller statues.

One is a divine figure drssed in white, wielding a sacred sword with the
writings of Nat inscribed along its shimmering blade. Another, its counterpart,
is dressed in black and wields a long thin blade which appears to be as cold
as ice. The third portrays a younger character whose leather whip drapes at
his side as he looks at you with the eyes of youthful experience and
compassion."

name: "a marble sarcophogus"
namesimple: "sarcophogus"
description: "An extravagant sarcophogus lies here.

A sarcophagus carved out of the finest white marble and the strongest sandstone
is here.  It seems to be latched closed with multiple hinges made of some 
unkown metal.  In the center is a strange keyhole perhaps this is the secret to
opening it, who knows what treasure may lie hidden inside."

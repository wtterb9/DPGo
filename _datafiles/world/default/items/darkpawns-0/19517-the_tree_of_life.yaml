itemid: 19517
name: "the tree of life"
namesimple: "tree"
description: "A massive tree is here teeming with life.

The tree before you is massive, never has there been one like it nor will
there ever be.  Its branches begin well out of reach around thirty feet above
the ground.  Succulent fruits can be seen hanging from its boughs up high, none
of which seem to have ever dropped to the ground.  Squirrels, owls and other
various birds and animals have made their homes in its higher branches.  The
tree seems to \"kiss the sky\" and its top disappears into the clouds."

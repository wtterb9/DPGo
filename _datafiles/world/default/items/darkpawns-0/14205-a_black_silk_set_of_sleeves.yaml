name: "a black silk set of sleeves"
namesimple: "sleeves"
description: "A black silk set of sleeves lies folded here.

A pair of elegant black sleeves which cover your arms with silky
smoothness. Lightweight and highly decorative, the sleeves afford their
wearer a certain dark elegance at the cost of protection.  Inverted 
crosses sacrilegiously adorn the sides, mocking the Gods and all their
worshippers."

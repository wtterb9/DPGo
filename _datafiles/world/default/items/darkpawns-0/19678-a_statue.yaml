name: "a statue"
namesimple: "statue"
description: "A Statue of the Great Serpent Montezuma stands here.

This once cursed monster ruled the seas, from the far east oceans of Zepcaca
to the west of Fentero. Led by Sidious, a crew of Titans vanquished the
powerful creature.

After such a fierce battle, only a few dozen remained standing, their comrades
slain. The corpse of the foul beast was buried within a deep cave never to
be seen again.

It wasn't until 10 years later that the Titans began building a magnificient
castle within this damned, hellish cave."

description: "A book labeled, 'The Battle of Lost Souls' lies here.

The Battle of Lost Souls was a great war fought between the evil Gil-Glash's
armies and the armies of the now dead Lothar, who in his time was a very
powerful warrior. Now, no one knows why the battle was started except perhaps
Gil-Glash, who after three centuries still lives, but most think Lothar finally
grew tired of Gil-Glash's reign of tyranny and wanted to put an end to it. But
what is in the past stays in the past, that is not true when dealing with the
battleground the Battle of Lost Souls was fought on, for everywhere lies the
stench of death and travellers that have wandered through tell stories of
great horrors that come out of the earth, pursuing them until they leave the
battleground."

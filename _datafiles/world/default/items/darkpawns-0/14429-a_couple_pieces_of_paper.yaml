name: "a couple pieces of paper"
namesimple: "paper"
description: "A couple pieces of paper are here.

Although I am loathe to give you what you want and betray Nimos' trust in me,
it is for the good of my race. Keep in mind that Lady Amber would have better
instructions, for she has done it herself, but I was only guided and even then
was blindfolded. Should you still wish to enter the Citadel despite my warnings
note that it is well protected and has many dead ends, labrynths and endless
corridors. Follow the instructions I give here to the letter, lest your dark
soul be in peril.
First, the Citadel itself is accessable only through a pair of great iron doors
which cannot be opened by any means known to man save with the following
incantation, 'Hovas Nar. Kandra Mil. Volas Nar. Hilasha Mil. Dhrovik!'
These words cause the doors to open. As soon as you enter the Citadel, care
must be taken to say the following word, 'Nyphar' If this word is not 
pronounced upon entry into the Citadel, the place's guards will magically
appear.

The Paths of the Doomed are what leads to Nimos' mansion. They are labyrinthine
and confusing, their exact layout uncertain to me as I was always blindfolded
and sometimes magically incapacitated while we traveled there and I can only
pass on a few of the things which I experienced.
Throughout the maze strange voices jabbered and alien words were given tongue.
In many places I heard the words, barely recognizable, 'In whose name do you
come here?' or 'By what god do you swear?' In most cases the answer was by
fire (or water or earth depending upon the location in the labyrinth), I come
in the name of Nimos. The god worshiped was Nevyn.

In a chamber filled with the sound of rushing water, I heard the word, 
'thralliq' then the word 'ekkala' Later, in a room that was so hot and stifling
as to be barely habitable, I heart Nimos shout 'khalos' on one occasion and
'olash' soon after. In a room that seemed to be composed of fire I heard,
'Hala vill thora' and the flames ceased to caress my skin. Other phrases and
counter phrases are lost now, swpt away by the memory of the horror which lurks
beyond the Devouring Portal and all the monstrous acts to which I was 
compelled.
This is all I can remember. Again I warn against visiting this cursed place,
but perhaps my description will provide some assistance, already I feel the
weight of the rebirth of my race upon my shoulders.

There is a FIRST page, a SECOND page, and a THIRD page..."

description: "A black cauldron filled with a tomato-onion mixture rests here.

This cauldron contains one of Cedric's favorite mixtures for
his specialty dishes for rare guests.  Tomato, onion, dill,
garlic, paprika, and rutabaga seed mix in a bubbling hot pool
within this cauldron, set over an open flame and awaiting
the call of the chefs."

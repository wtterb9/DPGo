description: "An elaborate stone bird bath rests in the middle of the garden.

Sculpted from pure sandstone from the desert canyon, this bird bath
memorializes the great adventurers who have fallen to the depths of the gorge. 
The purest mineral water is pumped into this sculpture through an underground
well, providing quality refreshment to the birds and the friars."

description: "A bottle of evil Shenanigans lies here.

It just LOOKS like it will give you a very hard night.

This bottle just looks like a long night and a bad headache
waiting to happen.  On the label of the bottle is a crazy
jester with mad eyes.  He has a big grin and an outrageous
outfit, and invites you to join him in some tomfoolery."

character:
  name: "the nightmare beast"
  description: "It is at least twenty feet tall and must weigh a couple tons. It has four
legs, all which end in sharp claws. Its dark purple skin looks extremely
thick and tough. Its large, red eyes glow with an evil light. The beast's
teeth are very long, more than half a foot in length, and look sharp enough
to cut through solid stone with ease. Two pairs of its teeth are nearly twice
as long as the rest, one is set in the upper jaw, the other in the lower jaw.
It has two large, tusk-like horns on its head. The nightmare beast was set
against the Grey Keep by one of Gil-Glash's more powerful enemies, but Lady
Amber took it upon herself to defend the Keep against the horrid creature.
They fought for hours and hours, neither seeming to tire, but in the end Lady
Amber prevailed and she hath incapacitated the beast, and had Nimos teleport
its stunned form into the second dungeon."

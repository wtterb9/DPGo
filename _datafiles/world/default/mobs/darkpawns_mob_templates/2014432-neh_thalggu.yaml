character:
  name: neh-thalggu
  description: |-
    Summoned from another plane one day by Gil-Glash, after studying the neh-
    thalggu for a few weeks, he became overjoyed at such an accidental find and
    had it locked away so that he could unleash it when the time came. It has a
    yellowish-orange, bloated, oily and amorphous body with dozens of short,
    writhing tentacles. Half a dozen crablike legs allow it to scuttle about. Four
    large, yellow, bulging eyes and a tooth-filled maw are set into its bulbous
    head.

character:
  name: rampager
  description: "The rampager is a huge, six-legged creature with grey scales covering
    its whole\nbody. Its four rear legs are large round pads, while the two front
    legs have\nclaws as long as dagger. Its face is out of a nightmare, with long,
    dirty fangs\nand glowing red eyes. Its nose is similar to a vestigal horn, and
    it has small,\nrounded ears. A druidic magickal spell gone awry created the rampager,
    and the\nminute Gil-Glash heard of it's destructive capabilities, he sent Hisczdrezzez\nto
    obtain it. The yuan-ti was overjoyed at finally having something to do other\nthan
    roam around the Grey Keep, and took his job very seriously. It took a \nyear and
    a few months of tracking and several failed attempts at capture, but\nHisczdrezzez
    finally brought it back to his leige."

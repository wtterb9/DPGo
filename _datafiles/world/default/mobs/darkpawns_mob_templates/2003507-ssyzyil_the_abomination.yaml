character:
  name: Ssyzyil, the Abomination
  description: |-
    Until now, you though that yuan-ti existed only in books and the nightmares
    of children.  Indeed, Ssyzyil appears to be a living, breathing nightmare,
    his thirteen foot black-bloated body raising up before you.  His humanoid
    body from his torso up is equally black and bloated and covered in a
    mixture of skin and scales.  The abomination's face is dominated by black,
    lidless eyes which cannot conceal the rage that burns within him.
    Ssyzyil smiles at you, his mouth full of sharp fangs as well as more
    human looking teeth.
